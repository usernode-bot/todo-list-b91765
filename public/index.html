    // (full-swipe territory).
    function setSwipeOffset(wrap, off) {
      wrap._off = off;
      const front = wrap.querySelector('.swipe-front');
      const actions = wrap.querySelector('.swipe-actions');
      if (front) front.style.transform = off ? 'translateX(' + off + 'px)' : '';
      if (actions) actions.style.transform = 'translateX(' + Math.max(0, trayW(wrap) + off) + 'px)';
    }
    function springSwipe(wrap, to, velocity, onRest) {
      if (wrap._spring) wrap._spring.stop();
      wrap._spring = spring(x => setSwipeOffset(wrap, x), {
        from: wrap._off || 0, to, velocity, stiffness: 500, damping: 45,
        onRest: () => { wrap._spring = null; if (onRest) onRest(); },
      });
    }
    function closeOpenSwipe() {
      if (!openSwipe) return;
      if (openSwipe.isConnected) springSwipe(openSwipe, 0, 0);
      openSwipe = null;
    }
    function suppressNextTap() {
      suppressTap = true;
      setTimeout(() => { suppressTap = false; }, 350);
    }

    // Full-swipe delete: slide the row off-screen with the release momentum,
    // collapse its height, remove it, THEN do the API call (which repaints —
    // and restores the row if the delete failed).
    function commitFullSwipe(wrap, velocity) {
      const row = wrap.querySelector('.item-row');
      if (!row) return;
      const id = +row.dataset.item;
      if (openSwipe === wrap) openSwipe = null;
      springSwipe(wrap, -wrap.offsetWidth - 40, Math.min(velocity, -800), () => {
        wrap.style.height = wrap.offsetHeight + 'px';
        requestAnimationFrame(() => {
          wrap.classList.add('collapsing');
          wrap.style.height = '0px';
          let fired = false;
          const finish = () => {
            if (fired) return;
            fired = true;
            deleteItem(id);
          };
          wrap.addEventListener('transitionend', finish, { once: true });
          setTimeout(finish, 350);
        });
      });
    }

    // Pull-to-refresh state (page-level scroller — we own the gesture, so
    // window.scrollY is the arm condition).
    const PTR_THRESHOLD = 70, PTR_HOLD = 56;
    let ptr = null;          // in-flight pull: { startX, startY, active, armed, samples }
    let ptrY = 0;
    let ptrSpring = null;
    let ptrRefreshing = false;

    function setPull(y) {
      ptrY = y;
      appEl.style.transform = y ? 'translateY(' + y + 'px)' : '';
      const puck = document.getElementById('ptr-puck');
      const p = Math.min(1, y / PTR_THRESHOLD);
      puck.style.opacity = p;
      puck.style.transform = 'translate(-50%, ' + (y * 0.6 - 48) + 'px) rotate(' + y * 2 + 'deg) scale(' + (0.6 + 0.4 * p) + ')';
    }
    function ptrSettle(to, velocity) {
      if (ptrSpring) ptrSpring.stop();
      ptrSpring = spring(setPull, {
        from: ptrY, to, velocity: velocity || 0, stiffness: 250, damping: 28,
        onRest: () => { ptrSpring = null; },
      });
    }
    function ptrMove(clientY) {
      const raw = clientY - ptr.startY;
      const y = raw <= 0 ? 0 : rubberband(raw, 150, 0.5);
      setPull(y);
      ptr.samples.push({ t: performance.now(), x: y });
      if (ptr.samples.length > 24) ptr.samples.shift();
      const armed = y >= PTR_THRESHOLD;
      if (armed !== ptr.armed) {
        ptr.armed = armed;
        document.getElementById('ptr-puck').classList.toggle('armed', armed);
        haptic();
      }
    }
    async function startPtrRefresh(velocity) {
      ptrRefreshing = true;
      const puck = document.getElementById('ptr-puck');
      puck.classList.add('refreshing');
      ptrSettle(PTR_HOLD, velocity);
      try { await (current ? refreshList() : refreshHome()); } catch (e) { toast(e.message); }
      ptrRefreshing = false;
      puck.classList.remove('refreshing', 'armed');
      ptrSettle(0, 0);
    }

    appEl.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return;
      const t = e.touches[0];
      const wrap = e.target.closest && e.target.closest('.swipe-wrap');
      swipe = wrap ? {
        wrap,
        startX: t.clientX, startY: t.clientY, mode: null,
        base: wrap._off || 0, armed: false,
        samples: [{ t: e.timeStamp, x: wrap._off || 0 }],
      } : null;
      if (swipe && wrap._spring) {
        // Interrupt: grab the row at its rendered position + velocity.
        const cur = wrap._spring.current();
        wrap._spring.stop();
        wrap._spring = null;
        swipe.base = cur.x;
        swipe.samples = [{ t: e.timeStamp - 16, x: cur.x - cur.v * 0.016 }, { t: e.timeStamp, x: cur.x }];
        setSwipeOffset(wrap, cur.x);
      }
      // Pull-to-refresh candidacy: page at the very top, nothing refreshing.
      ptr = (IS_TOUCH && !ptrRefreshing && !ptrSpring && window.scrollY <= 0)
        ? { startX: t.clientX, startY: t.clientY, active: false, armed: false, samples: [] }
        : null;
      clearTimeout(lpTimer);
      if (e.target.closest && e.target.closest('button, input, a')) return;
      const row = e.target.closest && e.target.closest('.item-row');
      const head = e.target.closest && e.target.closest('.cat-head');
      let info = null;
      if (row) info = { type: 'item', id: +row.dataset.item, catId: +row.dataset.cat, checked: row.dataset.checked === '1', el: row };
      else if (head) {
        const sec = head.closest('.cat-section');
        if (sec) info = { type: 'cat', id: +sec.dataset.cat, el: sec };
      }
      if (info && !searchActive()) { // long-press drag is disabled while filtered too
        lpTimer = setTimeout(() => {
          if (swipe && swipe.mode) return;       // already swiping
          if (ptr && ptr.active) return;         // already pulling
          touchDragging = true;
          drag = info;
          info.el.classList.add('dragging');
          closeOpenSwipe();
          haptic();
          dragX = t.clientX; dragY = t.clientY;
          startAutoScroll();
        }, 400);
      }
    }, { passive: true });

    appEl.addEventListener('touchmove', e => {
      const t = e.touches[0];
      if (touchDragging) {
        e.preventDefault(); // keep the page from scrolling under the drag
        dragX = t.clientX; dragY = t.clientY;
        const el = document.elementFromPoint(t.clientX, t.clientY);
        cueFromPoint(el, t.clientY);
        return;
      }
      if (ptr && ptr.active) {
        e.preventDefault();
        ptrMove(t.clientY);
        return;
      }
      if (swipe) {
        const dx = t.clientX - swipe.startX;
        const dy = t.clientY - swipe.startY;
        if (!swipe.mode) {
          if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy) * 1.2) {
            swipe.mode = 'h';
            clearTimeout(lpTimer);
            ptr = null;
          } else if (Math.abs(dy) > 10) {
            clearTimeout(lpTimer);
            // Vertical: pull-to-refresh claims a downward pull from the top;
            // anything else is a plain scroll — hands off.
            if (ptr && dy > 0 && window.scrollY <= 0) {
              ptr.active = true;
              ptr.startY = t.clientY;
              swipe = null;
              e.preventDefault();
              ptrMove(t.clientY);
            } else {
              swipe = null;
              ptr = null;
            }
            return;
          } else if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
            clearTimeout(lpTimer); // moved too much for a long-press
          }
        }
        if (swipe && swipe.mode === 'h') {
          e.preventDefault();
          const wrap = swipe.wrap;
          const tw = trayW(wrap);
          const isItem = !!wrap.querySelector('.item-row');
          const raw = swipe.base + dx;
          let off;
          if (raw > 0) off = rubberband(raw, 40);                       // elastic give to the right
          else if (isItem) off = raw;                                   // 1:1 into full-swipe territory
          else off = raw >= -tw ? raw : -tw - rubberband(-(raw + tw), 60); // headers rubber-band past the tray
          setSwipeOffset(wrap, off);
          swipe.samples.push({ t: e.timeStamp, x: off });
          if (swipe.samples.length > 24) swipe.samples.shift();
          if (isItem) {
            const armed = off <= -0.6 * wrap.offsetWidth;
            if (armed !== swipe.armed) {
              swipe.armed = armed;
              wrap.classList.toggle('commit-armed', armed);
              haptic();
            }
          }
        }
        return;
      }
      // No swipe row under the finger (home screen, headers, gaps): a
      // downward pull from the top still starts pull-to-refresh.
      if (ptr && !ptr.active) {
        const dx = t.clientX - ptr.startX;
        const dy = t.clientY - ptr.startY;
        if (dy > 10 && Math.abs(dy) > Math.abs(dx) && window.scrollY <= 0) {
          ptr.active = true;
          ptr.startY = t.clientY;
          e.preventDefault();
          ptrMove(t.clientY);
        } else if (Math.abs(dx) > 10 || dy < -10) {
          ptr = null;
        }
      }
    }, { passive: false });

    appEl.addEventListener('touchend', e => {
      clearTimeout(lpTimer);
      if (touchDragging) {
        touchDragging = false;
        stopAutoScroll();
        suppressNextTap();
        document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
        const d = drag, cue = dropCue;
        drag = null;
        clearDropCue();
        if (d && cue) (d.type === 'item' ? applyItemReorder(d, cue) : applyCategoryReorder(d, cue));
        swipe = null;
        ptr = null;
        return;
      }
      if (ptr && ptr.active) {
        ptr.samples.push({ t: performance.now(), x: ptrY });
        const v = estimateVelocity(ptr.samples);
        if (ptr.armed) startPtrRefresh(v);
        else ptrSettle(0, v);
        ptr = null;
        swipe = null;
        suppressNextTap();
        return;
      }
      if (swipe && swipe.mode === 'h') {
        const wrap = swipe.wrap;
        const tw = trayW(wrap);
        const isItem = !!wrap.querySelector('.item-row');
        swipe.samples.push({ t: e.timeStamp, x: wrap._off || 0 });
        const v = estimateVelocity(swipe.samples);
        // Momentum commit: decide by the velocity-projected resting point, so
        // a hard flick opens/closes without crossing the midpoint, and
        // drifting back past the line cancels.
        const proj = (wrap._off || 0) + v * 0.12;
        if (openSwipe && openSwipe !== wrap) closeOpenSwipe();
        if (isItem && swipe.armed) {
          haptic();
          commitFullSwipe(wrap, v);
        } else if (proj < -tw / 2) {
          wrap.classList.remove('commit-armed');
          springSwipe(wrap, -tw, v);
          openSwipe = wrap;
        } else {
          wrap.classList.remove('commit-armed');
          springSwipe(wrap, 0, v);
          if (openSwipe === wrap) openSwipe = null;
        }
        suppressNextTap();
      }
      swipe = null;
      ptr = null;
    }, { passive: true });

    appEl.addEventListener('touchcancel', () => {
      clearTimeout(lpTimer);
      if (touchDragging) {
        touchDragging = false;
        stopAutoScroll();
        document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
        drag = null;
        clearDropCue();
      }
      if (ptr && ptr.active) ptrSettle(0, 0);
      if (swipe && swipe.mode === 'h') {
        swipe.wrap.classList.remove('commit-armed');
        springSwipe(swipe.wrap, openSwipe === swipe.wrap ? -trayW(swipe.wrap) : 0, 0);
      }
      swipe = null;
      ptr = null;
    }, { passive: true });

    // Handles both same-category reorders and cross-category moves. The item
    // lands in the target category's matching checked/unchecked section, at
    // the cue position (or the end for whole-section drops).
    async function applyItemReorder(d, cue) {
      const sameCat = cue.catId === d.catId;
      const item = current.items.find(i => i.id === d.id);
      if (!item) return;
      const ids = sectionItems(cue.catId, d.checked).map(i => i.id).filter(id => id !== d.id);
      let to;
      if (cue.end || cue.id == null) {
        to = ids.length;
      } else {
        to = ids.indexOf(cue.id);
        if (to === -1) return;
        if (cue.after) to++;
      }
      if (sameCat && cue.end) {
        // No-op if it's already last in its section.
        const before = sectionItems(d.catId, d.checked).map(i => i.id);
        if (before[before.length - 1] === d.id) return;
      }
      const affected = sameCat ? [d.catId] : [d.catId, cue.catId];
      ids.splice(to, 0, d.id);
      item.category_id = cue.catId;
      ids.forEach((id, idx) => {
        const it = current.items.find(i => i.id === id);
        if (it) it.sort_order = idx + 1;
      });
      affected.forEach(repaintCategory);
      try {
        if (!sameCat) {
          await api('/api/items/' + d.id, { method: 'PATCH', body: JSON.stringify({ category_id: cue.catId }) });
        }
        await api('/api/categories/' + cue.catId + '/reorder-items', { method: 'POST', body: JSON.stringify({ itemIds: ids }) });
      } catch (e) { toast(e.message); refreshList(); }
    }

    async function applyCategoryReorder(d, cue) {
      const ids = current.categories.map(c => c.id);
      const from = ids.indexOf(d.id);
      if (from === -1) return;
      ids.splice(from, 1);
      let to = ids.indexOf(cue.id);
      if (to === -1) return;
      if (cue.after) to++;
      ids.splice(to, 0, d.id);
      current.categories.sort((a, b) => ids.indexOf(a.id) - ids.indexOf(b.id));
      current.categories.forEach((c, idx) => { c.sort_order = idx; });
      repaintAllCategories();
      try {
        await api('/api/lists/' + current.list.id + '/reorder-categories', { method: 'POST', body: JSON.stringify({ categoryIds: ids }) });
      } catch (e) { toast(e.message); refreshList(); }
    }

    // --- markdown import / export ------------------------------------------------
    // Google Keep-ish format: title as `# **Name**`, categories as top-level
    // bullets, items as nested bullets. Active items come first; a `---`
    // divider precedes the completed block, where items are ~~struck~~ and
    // category names repeat (struck too when the category is fully done).

    function buildMarkdown() {
      const active = [], done = [];
      for (const c of current.categories) {
        const un = sectionItems(c.id, false);
        const ch = sectionItems(c.id, true);
        if (un.length || !ch.length) {
          active.push('* ' + c.name);
          un.forEach(i => active.push('  * ' + i.text));
        }
        if (ch.length) {
          done.push('* ' + (un.length ? c.name : '~~' + c.name + '~~'));
          ch.forEach(i => done.push('  * ~~' + i.text + '~~'));
        }
      }
      const lines = ['# **' + current.list.name + '**', '', ...active];
      if (done.length) lines.push('', '---', '', ...done);
      return lines.join('\n') + '\n';
    }

    function stripMd(s) {
      return s.replace(/\*\*/g, '').replace(/~~/g, '').trim();
    }

    function parseMarkdown(md) {
      let name = null;
      const categories = [];
      const byKey = new Map(); // duplicate category names (active vs done block) merge
      let cur = null;
      for (const raw of md.split(/\r?\n/)) {
        const line = raw.replace(/\s+$/, '');
        if (!line.trim() || /^-{3,}$/.test(line.trim())) continue;
        const h = line.match(/^#+\s+(.*)$/);
        if (h) { if (!name) name = stripMd(h[1]); continue; }
        const m = line.match(/^(\s*)[*+-]\s+(.*)$/);
        if (!m) continue;
        const indent = m[1].replace(/\t/g, '  ').length;
        let text = m[2].trim();
        let checked = false;
        const struck = text.match(/^~~(.*)~~$/s);
        if (struck) { checked = true; text = struck[1].trim(); }
        text = text.replace(/\*\*/g, '').trim();
        if (!text) continue;
        if (indent === 0) {
          const key = text.toLowerCase();
          cur = byKey.get(key);
          if (!cur) {
            cur = { name: text, items: [] };
            byKey.set(key, cur);
            categories.push(cur);
          }
        } else {
          if (!cur) {
            cur = { name: 'General', items: [] };
            byKey.set('general', cur);
            categories.push(cur);
          }
          cur.items.push({ text, checked });
        }
      }
      return { name, categories };
    }

    function openMd({ title, hint, text, readonly, actionsHtml }) {
      document.getElementById('md-title').textContent = title;
      document.getElementById('md-hint').textContent = hint;
      const ta = document.getElementById('md-text');
      ta.value = text;
      ta.readOnly = !!readonly;
      ta.placeholder = readonly ? '' : '# **My List**\n\n* Category\n  * item\n  * ~~done item~~';
      document.getElementById('md-actions').innerHTML = actionsHtml;
      document.getElementById('md-modal').classList.remove('hidden');
      if (!readonly) setTimeout(() => ta.focus(), 0);
    }
    function closeMd() {
      document.getElementById('md-modal').classList.add('hidden');
    }
    document.getElementById('md-modal').addEventListener('click', ev => {
      if (ev.target === document.getElementById('md-modal')) closeMd();
    });

    function openExport() {
      openMd({
        title: 'Export markdown',
        hint: 'Copy this markdown or download it as a file.',
        text: buildMarkdown(),
        readonly: true,
        actionsHtml: `
          <button onclick="copyMd()" class="text-sm px-3 py-1.5 rounded-lg ${BTN_SOFT}">Copy</button>
          <button onclick="downloadMd()" class="text-sm px-3 py-1.5 rounded-lg bg-violet-600 hover:bg-violet-500 text-white">Download .md</button>`,
      });
    }

    async function copyMd() {
      const ta = document.getElementById('md-text');
      try {
        await navigator.clipboard.writeText(ta.value);
        toast('Copied to clipboard');
      } catch (_) {
        ta.select();
        document.execCommand('copy');
        toast('Copied to clipboard');
      }
    }

    function downloadMd() {
      const blob = new Blob([document.getElementById('md-text').value], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (current ? current.list.name.replace(/[^\w\d-]+/g, '-').replace(/^-+|-+$/g, '') || 'list' : 'list') + '.md';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    }

    // mode 'new' (from Home: create a list) or 'merge' (into the current list,
    // which offers both add and replace).
    function openImport(mode) {
      openMd({
        title: 'Import markdown',
        hint: mode === 'new'
          ? 'Paste markdown to create a new list. ~~Strikethrough~~ items import as completed.'
          : 'Paste markdown to import into this list. Add merges into matching categories; Replace clears the list first. ~~Strikethrough~~ items import as completed.',
        text: '',
        readonly: false,
        actionsHtml: mode === 'new' ? `
          <button onclick="closeMd()" class="text-sm px-3 py-1.5 rounded-lg ${BTN_SOFT}">Cancel</button>
          <button onclick="runImport('new')" class="text-sm px-3 py-1.5 rounded-lg bg-violet-600 hover:bg-violet-500 text-white">Import</button>` : `
          <button onclick="closeMd()" class="text-sm px-3 py-1.5 rounded-lg ${BTN_SOFT}">Cancel</button>
          <button onclick="runImport('replace')" class="text-sm px-3 py-1.5 rounded-lg bg-red-600 hover:bg-red-500 text-white">Import (replace)</button>
          <button onclick="runImport('add')" class="text-sm px-3 py-1.5 rounded-lg bg-violet-600 hover:bg-violet-500 text-white">Import (add)</button>`,
      });
    }

    async function runImport(mode) {
      const md = document.getElementById('md-text').value;
      const { name, categories } = parseMarkdown(md);
      if (!categories.length || !categories.some(c => c.items.length)) {
        return toast('Nothing to import — expected bullets like "* Category" with "  * item" beneath');
      }
      try {
        if (mode === 'new') {
          const { list } = await api('/api/lists/import', {
            method: 'POST',
            body: JSON.stringify({ name: name || 'Imported list', categories }),
          });
          closeMd();
          if (location.hash === '#/list/' + list.id) loadList(list.id);
          else location.hash = '#/list/' + list.id;
        } else {
          if (mode === 'replace' &&
              !await askConfirm('Replace everything in "' + current.list.name + '" with the imported content?', 'Replace')) {
            return;
          }
          await api('/api/lists/' + current.list.id + '/import', {
            method: 'POST',
            body: JSON.stringify({ categories, mode }),
          });
          closeMd();
          toast(mode === 'replace' ? 'List replaced' : 'Imported');
          refreshList();
        }
      } catch (e) { toast(e.message); }
    }

    // --- members modal ----------------------------------------------------------------
    function openMembers() {
      renderMembers();
      document.getElementById('modal-backdrop').classList.remove('hidden');
      document.getElementById('members-modal').classList.remove('hidden');
    }
    function closeMembers() {
      document.getElementById('modal-backdrop').classList.add('hidden');
      document.getElementById('members-modal').classList.add('hidden');
    }
    document.getElementById('modal-backdrop').addEventListener('click', closeMembers);

    function renderMembers() {
      const isOwner = current.role === 'owner';
      const body = document.getElementById('members-body');
      body.innerHTML = `
        <div class="space-y-1.5 mb-4">
          <div class="flex items-center justify-between px-2 py-1.5 rounded-lg bg-zinc-200/60 dark:bg-zinc-800/50">
            <span class="text-sm">@${esc(current.list.owner_username)}</span>
            <span class="text-[11px] uppercase tracking-wide text-violet-600 dark:text-violet-400">Owner</span>
          </div>
          ${current.members.map(m => `
            <div class="flex items-center justify-between px-2 py-1.5 rounded-lg hover:bg-zinc-200/50 dark:hover:bg-zinc-800/50">
              <span class="text-sm">@${esc(m.username)}</span>
              ${isOwner ? `<button onclick="removeMember(${m.id})" class="text-zinc-400 dark:text-zinc-500 hover:text-red-500 dark:hover:text-red-400 text-xs">Remove</button>` : ''}
            </div>`).join('')}
          ${!current.members.length ? '<p class="text-xs text-zinc-400 dark:text-zinc-600 px-2 py-1 flex items-center gap-1.5">' + lockSvg(11) + 'This list is private — only you can see it. Invite someone below to share it.</p>' : ''}
        </div>
        ${isOwner ? `
          <form onsubmit="return inviteMember(event)" class="flex gap-2">
            <input name="username" placeholder="Invite by username…" autocomplete="off"
                   class="flex-1 rounded-lg px-3 py-2 text-sm focus:outline-none"
                   style="background: var(--fill); color: var(--label); border: 1px solid var(--separator)">
            <button class="text-sm px-3 py-2 rounded-lg bg-violet-600 hover:bg-violet-500 text-white">Invite</button>
          </form>
          <p class="text-[11px] text-zinc-400 dark:text-zinc-600 mt-2">Invites take effect immediately — the user will see this list next time they open the app.</p>`
        : '<p class="text-xs text-zinc-400 dark:text-zinc-600">Only the owner can manage members.</p>'}
      `;
    }

    async function inviteMember(ev) {
      ev.preventDefault();
      const input = ev.target.elements.username;
      const username = input.value.trim();
      if (!username) return false;
      try {
        await api('/api/lists/' + current.list.id + '/members', { method: 'POST', body: JSON.stringify({ username }) });
        current = await api('/api/lists/' + current.list.id);
        renderList(current);
        openMembers();
        toast('@' + username.replace(/^@/, '') + ' added');
      } catch (e) { toast(e.message); }
      return false;
    }

    async function removeMember(memberId) {
      try {
        await api('/api/lists/' + current.list.id + '/members/' + memberId, { method: 'DELETE' });
        current = await api('/api/lists/' + current.list.id);
        renderList(current);
        openMembers();
      } catch (e) { toast(e.message); }
    }

    applyTheme();
    route();
  </script>
</body>
</html>
