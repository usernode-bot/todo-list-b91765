<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>
  <title>Todo List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script>
    // Apply the theme before first paint to avoid a flash. Explicit choice in
    // localStorage wins; otherwise follow the system preference.
    (function () {
      try {
        var pref = localStorage.getItem('todo:theme');
        var dark = pref === 'dark' ||
          (pref !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', dark);
      } catch (_) {}
    })();
  </script>
  <style>
    .pencil-host .pencil { opacity: 0; transition: opacity .12s; }
    .pencil-host:hover .pencil { opacity: 1; }
    .cat-head .cat-del { opacity: 0; transition: opacity .12s; }
    .cat-head:hover .cat-del { opacity: 1; }
    .drag-handle { cursor: grab; touch-action: none; }
    .drag-handle:active { cursor: grabbing; }
    /* iOS-style swipe-to-reveal actions (mobile). The front layer and the
       action buttons translate together: the buttons ride in from the right
       edge with the gesture and ride back out when it closes. */
    .swipe-wrap { touch-action: pan-y; }
    .swipe-front { position: relative; transition: transform .18s ease-out; }
    .swipe-actions { transform: translateX(100%); transition: transform .18s ease-out; }
    /* Long-press is a gesture (drag / swipe), not a text-selection trigger. */
    .item-row, .cat-head {
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }
    /* Mobile Safari zooms the whole viewport when focusing a field whose
       font is under 16px — that's the screen "bounce" on tapping an input.
       Bump fields to 16px on touch devices so focusing never zooms. */
    @media (hover: none) and (pointer: coarse) {
      input, textarea, select { font-size: 16px !important; }
    }
    input, textarea, button { touch-action: manipulation; }
    /* Touch devices: no drag handles (long-press drags instead) and no
       hover-revealed buttons (swipe left reveals rename/delete instead). */
    @media (hover: none) and (pointer: coarse) {
      .drag-handle, .hover-action, .cat-del { display: none !important; }
    }
    .drop-before { box-shadow: 0 -2px 0 0 #8b5cf6; }
    .drop-after { box-shadow: 0 2px 0 0 #8b5cf6; }
    .drop-into { box-shadow: inset 0 0 0 1px rgba(139, 92, 246, 0.6); border-radius: 0.5rem; }
    .dragging { opacity: 0.4; }
    /* Custom checkbox — native ones render a washed-out light box in dark mode. */
    .todo-check {
      appearance: none; -webkit-appearance: none;
      width: 1.05rem; height: 1.05rem;
      border-radius: 0.3rem;
      border: 1.5px solid #a1a1aa;        /* zinc-400 */
      background: #ffffff;
      cursor: pointer; position: relative; flex-shrink: 0;
      transition: background .1s, border-color .1s;
    }
    .dark .todo-check {
      border-color: #52525b;              /* zinc-600 */
      background: rgba(255, 255, 255, 0.05);
    }
    .todo-check:hover { border-color: #8b5cf6; }
    .todo-check:checked { background: #7c3aed; border-color: #7c3aed; }
    .todo-check:checked::after {
      content: ''; position: absolute;
      left: 4.5px; top: 1.5px; width: 5px; height: 9px;
      border: solid #fff; border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
  </style>
</head>
<body class="bg-zinc-100 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 min-h-screen">
  <div id="app" class="max-w-2xl mx-auto p-4 pb-24"></div>

  <!-- Members modal -->
  <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/40 dark:bg-black/60 z-40"></div>
  <div id="members-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 pointer-events-none">
    <div class="pointer-events-auto bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl w-full max-w-sm p-5 shadow-xl">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-lg">Members</h2>
        <button onclick="closeMembers()" class="text-zinc-400 hover:text-zinc-700 dark:text-zinc-500 dark:hover:text-zinc-200 text-xl leading-none px-1">&times;</button>
      </div>
      <div id="members-body"></div>
    </div>
  </div>

  <!-- Markdown import/export modal -->
  <div id="md-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 dark:bg-black/60">
    <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl w-full max-w-lg p-5 shadow-xl flex flex-col gap-3 max-h-[90vh]">
      <div class="flex items-center justify-between">
        <h2 id="md-title" class="font-semibold text-lg"></h2>
        <button onclick="closeMd()" class="text-zinc-400 hover:text-zinc-700 dark:text-zinc-500 dark:hover:text-zinc-200 text-xl leading-none px-1">&times;</button>
      </div>
      <p id="md-hint" class="text-xs text-zinc-500"></p>
      <textarea id="md-text" rows="14" spellcheck="false"
                class="w-full flex-1 bg-zinc-100 dark:bg-zinc-950 border border-zinc-300 dark:border-zinc-800 rounded-lg p-3 text-xs font-mono text-zinc-700 dark:text-zinc-300 placeholder-zinc-400 dark:placeholder-zinc-700 focus:outline-none focus:border-violet-600 resize-none"></textarea>
      <div id="md-actions" class="flex justify-end gap-2"></div>
    </div>
  </div>

  <!-- Prompt/confirm/choice dialog (native prompt/confirm can be blocked in sandboxed iframes) -->
  <div id="dialog" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 dark:bg-black/60">
    <form id="dialog-form" class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl w-full max-w-sm p-5 shadow-xl">
      <p id="dialog-title" class="text-sm text-zinc-700 dark:text-zinc-300 mb-3"></p>
      <input id="dialog-input" autocomplete="off"
             class="w-full bg-zinc-100 dark:bg-zinc-950 border border-zinc-300 dark:border-zinc-800 rounded-lg px-3 py-2 text-sm placeholder-zinc-400 dark:placeholder-zinc-600 focus:outline-none focus:border-violet-600 mb-4">
      <div id="dialog-buttons" class="flex justify-end gap-2 flex-wrap"></div>
    </form>
  </div>

  <div id="toast" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 bg-white dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 text-sm px-4 py-2 rounded-lg shadow-lg z-50"></div>

  <script>
    // --- auth / api ----------------------------------------------------------
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    // Random per-tab id sent with every mutation; SSE events echo it back so
    // the tab that made a change can skip refetching its own edit.
    const clientId = Math.random().toString(36).slice(2) + Date.now().toString(36);
    const headers = { 'x-client-id': clientId, ...(token ? { 'x-usernode-token': token } : {}) };

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', ...headers, ...(opts.headers || {}) },
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || ('Request failed (' + res.status + ')'));
      return data;
    }

    let toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.remove('hidden');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.add('hidden'), 3000);
    }

    // Shared class strings for both themes.
    const BTN_SOFT = 'bg-zinc-200 hover:bg-zinc-300 text-zinc-700 dark:bg-zinc-800 dark:hover:bg-zinc-700 dark:text-zinc-300';
    const DRAWER_ITEM = 'w-full text-left px-3.5 py-2 text-sm text-zinc-700 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800';

    // Closed-padlock icon marking private (owner-only) lists; inherits text color.
    function lockSvg(size) {
      return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="inline-block shrink-0"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>`;
    }

    // Promise-based replacements for prompt()/confirm(), plus a multi-choice
    // mode.
    let dialogResolve = null;
    let dialogChoices = null;
    const dialogEl = document.getElementById('dialog');
    const dialogForm = document.getElementById('dialog-form');
    const dialogInput = document.getElementById('dialog-input');

    function openDialog({ title, withInput = false, value = '', choices = null, okLabel = 'OK' }) {
      return new Promise(resolve => {
        dialogResolve = resolve;
        dialogChoices = choices;
        document.getElementById('dialog-title').textContent = title;
        dialogInput.classList.toggle('hidden', !withInput);
        dialogInput.value = value;
        const btns = document.getElementById('dialog-buttons');
        let html = `<button type="button" data-dlg="cancel" class="text-sm px-3 py-1.5 rounded-lg ${BTN_SOFT}">Cancel</button>`;
        if (choices) {
          html += choices.map((c, i) =>
            `<button type="button" data-dlg="${i}" class="text-sm px-3 py-1.5 rounded-lg text-white ${c.danger ? 'bg-red-600 hover:bg-red-500' : 'bg-violet-600 hover:bg-violet-500'}">${esc(c.label)}</button>`
          ).join('');
        } else {
          html += `<button type="submit" class="text-sm px-3 py-1.5 rounded-lg text-white bg-violet-600 hover:bg-violet-500">${esc(okLabel)}</button>`;
        }
        btns.innerHTML = html;
        dialogEl.classList.remove('hidden');
        if (withInput) setTimeout(() => { dialogInput.focus(); dialogInput.select(); }, 0);
      });
    }
    function settleDialog(result) {
      dialogEl.classList.add('hidden');
      if (dialogResolve) { dialogResolve(result); dialogResolve = null; dialogChoices = null; }
    }
    dialogForm.addEventListener('submit', ev => {
      ev.preventDefault();
      if (dialogChoices) return; // choice dialogs settle via their buttons
      settleDialog(dialogInput.classList.contains('hidden') ? true : dialogInput.value);
    });
    document.getElementById('dialog-buttons').addEventListener('click', ev => {
      const btn = ev.target.closest('[data-dlg]');
      if (!btn) return;
      if (btn.dataset.dlg === 'cancel') return settleDialog(null);
      if (dialogChoices) settleDialog(dialogChoices[+btn.dataset.dlg].value);
    });
    dialogEl.addEventListener('click', ev => { if (ev.target === dialogEl) settleDialog(null); });

    const askText = (title, value) => openDialog({ title, withInput: true, value });
    const askConfirm = (title, okLabel = 'Delete') =>
      openDialog({ title, choices: [{ label: okLabel, value: true, danger: true }] });

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // --- theme (light / dark / system) ----------------------------------------
    const THEME_KEY = 'todo:theme';
    function themePref() {
      const v = localStorage.getItem(THEME_KEY);
      return v === 'light' || v === 'dark' ? v : 'system';
    }
    function applyTheme() {
      const pref = themePref();
      const dark = pref === 'dark' ||
        (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.toggle('dark', dark);
    }
    function themeLabel() {
      const pref = themePref();
      return pref === 'light' ? '☀️ Light' : pref === 'dark' ? '🌙 Dark' : '🌓 System';
    }
    function cycleTheme() {
      const order = ['system', 'light', 'dark'];
      const next = order[(order.indexOf(themePref()) + 1) % 3];
      if (next === 'system') localStorage.removeItem(THEME_KEY);
      else localStorage.setItem(THEME_KEY, next);
      applyTheme();
      updateThemeLabels();
    }
    function updateThemeLabels() {
      const drawerBtn = document.getElementById('theme-btn');
      if (drawerBtn) drawerBtn.textContent = 'Theme: ' + themeLabel();
      const homeBtn = document.getElementById('home-theme');
      if (homeBtn) homeBtn.textContent = themeLabel();
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (themePref() === 'system') applyTheme();
    });

    // --- show/hide completed preference (per user, localStorage) -------------
    const SHOW_COMPLETED_KEY = 'todo:showCompleted';
    function showCompleted() {
      return localStorage.getItem(SHOW_COMPLETED_KEY) !== 'false'; // default: shown
    }
    function setShowCompleted(v) {
      localStorage.setItem(SHOW_COMPLETED_KEY, v ? 'true' : 'false');
      // The global switch resets any per-category overrides so flipping it
      // always visibly applies everywhere.
      for (const k of Object.keys(catDoneOverrides)) delete catDoneOverrides[k];
      // Fully-completed categories default to collapsed, so "Show all done"
      // gives them an explicit override — otherwise they'd stay shut.
      if (v && current) {
        for (const c of current.categories) {
          if (isCatFullyDone(c.id)) catDoneOverrides[c.id] = true;
        }
      }
      if (current) repaintAllCategories();
    }

    // A category with at least one item and nothing left unchecked.
    function isCatFullyDone(catId) {
      if (!current) return false;
      let open = 0, done = 0;
      for (const i of current.items) {
        if (i.category_id !== catId) continue;
        if (i.checked) done++; else open++;
      }
      return !open && done > 0;
    }

    // Per-category visibility of completed items (session-only override of the
    // global switch), toggled from the divider between active and done items
    // (or, for fully-completed categories, from the header row).
    const catDoneOverrides = {};

    // The header chevron collapses/expands only the category's completed
    // items — unchecked items always stay visible. It drives the same
    // per-category done-visibility state as the "N done" toggles, so all
    // affordances stay in sync.
    function catShowDone(catId) {
      if (catDoneOverrides[catId] !== undefined) return catDoneOverrides[catId];
      if (isCatFullyDone(catId)) return false; // finished categories collapse by default
      return showCompleted();
    }
    function toggleCatDone(catId) {
      catDoneOverrides[catId] = !catShowDone(catId);
      repaintCategory(catId);
    }

    // Categories whose "Add an item…" input is currently revealed by the
    // header + button.
    const openAdders = new Set();

    // The mobile keyboard's check/done key dismisses the keyboard (a blur)
    // without submitting. On touch devices, accept whatever was typed when
    // the field blurs with content. Enter-submits clear the field *before*
    // awaiting the API call, so an Enter-then-blur sequence can't double-add.
    function commitOnBlur(ev) {
      if (!IS_TOUCH) return;
      const input = ev.target;
      if (!input.value.trim() || !input.form) return;
      if (input.form.requestSubmit) input.form.requestSubmit();
      else input.form.dispatchEvent(new Event('submit', { cancelable: true }));
    }

    function toggleAdder(catId) {
      const opening = !openAdders.has(catId);
      if (openAdders.has(catId)) openAdders.delete(catId);
      else openAdders.add(catId);
      // Opening the adder on a collapsed category auto-expands its done items.
      if (opening && !catShowDone(catId)) catDoneOverrides[catId] = true;
      repaintCategory(catId);
      if (openAdders.has(catId)) {
        const input = document.querySelector('#cat-' + catId + ' input[name=text]');
        if (input) input.focus();
      }
    }

    // --- live updates (SSE) ----------------------------------------------------
    // While a list is open, subscribe to its event stream; any change made by
    // another client triggers a silent refetch. EventSource retries transient
    // drops itself (server sends retry: 3000); if the browser gives up on a
    // fatal error we reopen manually after the same delay.
    let es = null, esListId = null, esRetryTimer = null, liveRefreshTimer = null;

    function connectEvents(listId) {
      if (es && esListId === listId) return;
      disconnectEvents();
      esListId = listId;
      openStream();
    }

    function openStream() {
      if (!esListId) return;
      es = new EventSource('/api/lists/' + esListId + '/events?token=' +
                           encodeURIComponent(token) + '&clientId=' + clientId);
      es.onmessage = ev => {
        let data;
        try { data = JSON.parse(ev.data); } catch (_) { return; }
        if (data.sourceClient && data.sourceClient === clientId) return; // our own edit
        if (data.type === 'list-deleted') {
          toast('This list was deleted');
          location.hash = '#/';
          return;
        }
        // Coalesce bursts (imports, reorders) into a single refetch.
        clearTimeout(liveRefreshTimer);
        liveRefreshTimer = setTimeout(refreshList, 150);
      };
      es.onerror = () => {
        if (es && es.readyState === EventSource.CLOSED) {
          es = null;
          clearTimeout(esRetryTimer);
          esRetryTimer = setTimeout(openStream, 3000);
        }
      };
    }

    function disconnectEvents() {
      clearTimeout(esRetryTimer);
      clearTimeout(liveRefreshTimer);
      if (es) { es.close(); es = null; }
      esListId = null;
    }

    // --- routing --------------------------------------------------------------
    let current = null; // current list detail payload (List View) or null (Home)

    function route() {
      const m = location.hash.match(/^#\/list\/(\d+)$/);
      if (m) loadList(m[1]);
      else loadHome();
    }
    window.addEventListener('hashchange', route);

    // --- Home / My Lists -------------------------------------------------------
    async function loadHome() {
      current = null;
      disconnectEvents();
      const app = document.getElementById('app');
      app.innerHTML = '<p class="text-zinc-500 text-sm py-8 text-center">Loading…</p>';
      let lists;
      try {
        ({ lists } = await api('/api/lists'));
      } catch (e) {
        app.innerHTML = '<p class="text-red-500 dark:text-red-400 text-sm py-8 text-center">' + esc(e.message) + '</p>';
        return;
      }
      app.innerHTML = `
        <header class="sticky top-0 z-20 bg-zinc-100 dark:bg-zinc-950 flex items-center justify-between pt-3 pb-7">
          <h1 class="text-xl font-bold">My Lists</h1>
          <div class="flex items-center gap-2">
            <button onclick="cycleTheme()" id="home-theme" title="Toggle theme (system / light / dark)"
                    class="text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-200 text-sm px-3 py-1.5 rounded-lg border border-zinc-300 dark:border-zinc-800">${themeLabel()}</button>
            <button onclick="openImport('new')" class="text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200 text-sm px-3 py-1.5 rounded-lg border border-zinc-300 dark:border-zinc-800">Import</button>
            <button onclick="newList()" class="bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium px-3 py-1.5 rounded-lg">+ New List</button>
          </div>
        </header>
        ${lists.length ? '<div class="space-y-2">' + lists.map(l => `
          <a href="#/list/${l.id}" class="block bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:border-zinc-300 dark:hover:border-zinc-700 rounded-xl px-4 py-3 shadow-sm dark:shadow-none">
            <div class="flex items-center justify-between gap-2">
              <span class="font-medium truncate">${esc(l.name)}</span>
              ${l.is_owner
                ? (Number(l.member_count) === 0
                  ? '<span title="Private — only you can see this list" class="shrink-0 inline-flex items-center gap-1 text-[11px] uppercase tracking-wide text-zinc-500 dark:text-zinc-400 bg-zinc-300/60 dark:bg-zinc-700/40 px-1.5 py-0.5 rounded">' + lockSvg(10) + 'Private</span>'
                  : '<span class="shrink-0 text-[11px] uppercase tracking-wide text-violet-600 dark:text-violet-400 bg-violet-600/10 dark:bg-violet-600/15 px-1.5 py-0.5 rounded">Owner</span>')
                : '<span class="shrink-0 text-[11px] uppercase tracking-wide text-zinc-500 dark:text-zinc-400 bg-zinc-300/60 dark:bg-zinc-700/40 px-1.5 py-0.5 rounded">Shared</span>'}
            </div>
            <div class="text-xs text-zinc-500 mt-1">
              ${l.open_count} open · ${l.done_count} done
              ${!l.is_owner ? ' · by @' + esc(l.owner_username) : (Number(l.member_count) ? ' · ' + l.member_count + ' member' + (Number(l.member_count) > 1 ? 's' : '') : '')}
            </div>
          </a>`).join('') + '</div>'
        : `<div class="text-center py-16 text-zinc-500">
             <p class="mb-3">No lists yet.</p>
             <button onclick="newList()" class="text-violet-600 dark:text-violet-400 hover:text-violet-500 dark:hover:text-violet-300 text-sm font-medium">Create your first list</button>
           </div>`}
      `;
    }

    async function newList() {
      const name = await askText('List name:');
      if (!name || !name.trim()) return;
      try {
        const { list } = await api('/api/lists', { method: 'POST', body: JSON.stringify({ name: name.trim() }) });
        location.hash = '#/list/' + list.id;
      } catch (e) { toast(e.message); }
    }

    // --- List View --------------------------------------------------------------
    async function loadList(id) {
      const app = document.getElementById('app');
      app.innerHTML = '<p class="text-zinc-500 text-sm py-8 text-center">Loading…</p>';
      try {
        current = await api('/api/lists/' + id);
      } catch (e) {
        disconnectEvents();
        app.innerHTML = `<p class="text-red-500 dark:text-red-400 text-sm py-8 text-center">${esc(e.message)}</p>
          <p class="text-center"><a href="#/" class="text-violet-600 dark:text-violet-400 text-sm">← Back to My Lists</a></p>`;
        return;
      }
      renderList(current);
      connectEvents(current.list.id);
    }

    // Silent refetch + single repaint — no "Loading…" wipe, so no flash.
    // Used for both error recovery and SSE-pushed remote changes, so it
    // preserves any in-progress typing in an add-item / new-category field
    // across the repaint.
    async function refreshList() {
      if (!current) return;
      const id = current.list.id;
      try {
        const data = await api('/api/lists/' + id);
        if (!current || current.list.id !== id) return; // navigated away mid-fetch
        current = data;
        const ae = document.activeElement;
        let focus = null;
        if (ae && ae.tagName === 'INPUT') {
          if (ae.name === 'text' && ae.closest('.cat-section')) {
            focus = { sel: '#cat-' + ae.closest('.cat-section').dataset.cat + ' input[name=text]', value: ae.value, pos: ae.selectionStart };
          } else if (ae.name === 'name') {
            focus = { sel: 'input[name=name]', value: ae.value, pos: ae.selectionStart };
          }
        }
        renderList(current);
        if (focus) {
          const input = document.querySelector(focus.sel);
          if (input) {
            input.value = focus.value;
            input.focus({ preventScroll: true });
            try { input.setSelectionRange(focus.pos, focus.pos); } catch (_) {}
          }
        }
      } catch (e) { toast(e.message); }
    }

    // Items of one section (unchecked or checked) of a category, in order.
    function sectionItems(catId, checked) {
      return current.items
        .filter(i => i.category_id === catId && !!i.checked === checked)
        .sort((a, b) => (a.sort_order - b.sort_order) || (a.id - b.id));
    }

    // Display order is the manual drag order (current.categories) — static.
    // Categories never move around based on whether their items are done.
    function displayCategories() {
      return current.categories;
    }

    function renderList(d) {
      const isOwner = d.role === 'owner';
      const app = document.getElementById('app');
      app.innerHTML = `
        <header class="sticky top-0 z-20 bg-zinc-100 dark:bg-zinc-950 flex items-center gap-2 pt-3 pb-6 flex-wrap">
          <a href="#/" class="text-zinc-500 hover:text-zinc-800 dark:text-zinc-400 dark:hover:text-zinc-200 px-1 text-lg" title="Back">←</a>
          <h1 class="${isOwner ? 'pencil-host cursor-pointer hover:text-violet-600 dark:hover:text-violet-300' : ''} text-xl font-bold flex-1 truncate"
              ${isOwner ? 'onclick="renameList()" title="Rename list"' : ''}>${esc(d.list.name)}${isOwner ? ' <span class="pencil text-zinc-400 dark:text-zinc-500 text-sm font-normal">✎</span>' : ''}</h1>
          ${d.members.length === 0 ? `
          <button onclick="openMembers()" title="Private — only you can see this list. Tap to invite." aria-label="Private — only you can see this list. Tap to invite."
                  class="text-xs px-2.5 py-1.5 rounded-lg border border-zinc-300 dark:border-zinc-800 text-zinc-600 dark:text-zinc-300 inline-flex items-center gap-1.5">
            ${lockSvg(12)} Private
          </button>` : `
          <button onclick="openMembers()" title="Members"
                  class="text-xs px-2.5 py-1.5 rounded-lg border border-zinc-300 dark:border-zinc-800 text-zinc-600 dark:text-zinc-300">
            👥 ${1 + d.members.length}
          </button>`}
          <div id="drawer-wrap" class="relative shrink-0">
            <button onclick="toggleDrawer(event)" title="Menu" aria-label="Menu"
                    class="px-2.5 py-[7px] rounded-lg border border-zinc-300 dark:border-zinc-800 text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-200">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="block"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
            </button>
            <div id="drawer" class="hidden absolute right-0 top-full mt-1 w-56 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 shadow-xl z-30 py-1.5">
              <button onclick="closeDrawer(); setShowCompleted(true)" class="${DRAWER_ITEM}">✓&nbsp; Show all done</button>
              <button onclick="closeDrawer(); setShowCompleted(false)" class="${DRAWER_ITEM}">⊘&nbsp; Hide all done</button>
              <div class="my-1 border-t border-zinc-200 dark:border-zinc-800"></div>
              <button onclick="closeDrawer(); openExport()" class="${DRAWER_ITEM}">⤓&nbsp; Export markdown</button>
              <button onclick="closeDrawer(); openImport('merge')" class="${DRAWER_ITEM}">⤒&nbsp; Import markdown</button>
              <button onclick="cycleTheme()" id="theme-btn" class="${DRAWER_ITEM}">Theme: ${themeLabel()}</button>
              ${isOwner ? `
              <div class="my-1 border-t border-zinc-200 dark:border-zinc-800"></div>
              <button onclick="closeDrawer(); deleteList()" class="${DRAWER_ITEM} !text-red-500 dark:!text-red-400">✕&nbsp; Delete list</button>` : ''}
            </div>
          </div>
        </header>

        <div id="cats">
          ${displayCategories().map(c => renderCategory(c)).join('')}
        </div>

        <form onsubmit="return addCategory(event)" class="mt-7 flex items-center gap-1.5 px-0.5">
          <span class="text-zinc-400 dark:text-zinc-600 text-sm select-none">+</span>
          <input name="name" placeholder="New category…" autocomplete="off" enterkeyhint="done"
                 onblur="commitOnBlur(event)"
                 class="flex-1 bg-transparent text-sm placeholder-zinc-400 dark:placeholder-zinc-600 text-zinc-700 dark:text-zinc-300 focus:outline-none py-1.5">
        </form>
      `;
    }

    // --- drawer ------------------------------------------------------------------
    function toggleDrawer(ev) {
      ev.stopPropagation();
      const d = document.getElementById('drawer');
      if (d) d.classList.toggle('hidden');
    }
    function closeDrawer() {
      const d = document.getElementById('drawer');
      if (d) d.classList.add('hidden');
    }
    document.addEventListener('click', e => {
      const d = document.getElementById('drawer');
      if (d && !d.classList.contains('hidden') && !e.target.closest('#drawer-wrap')) closeDrawer();
      if (openSwipe && !suppressTap && !e.target.closest('.swipe-actions')) closeOpenSwipe();
    });

    function renderCategory(c) {
      const showDone = catShowDone(c.id);
      const unchecked = sectionItems(c.id, false);
      const checked = sectionItems(c.id, true);
      const empty = !unchecked.length && !checked.length;
      const fullyDone = !unchecked.length && checked.length > 0;
      // Top margin lives on the section (not a space-y on #cats) so a
      // repaintCategory outerHTML swap keeps it correct when the category's
      // completion state changes in place.
      const idx = displayCategories().findIndex(x => x.id === c.id);
      const topGap = idx > 0 ? (fullyDone ? ' mt-3' : ' mt-7') : '';
      const hairline = 'w-16 border-t border-zinc-300/80 dark:border-zinc-800/60';
      return `
        <section id="cat-${c.id}" data-cat="${c.id}" draggable="${IS_TOUCH ? 'false' : 'true'}" class="cat-section${topGap}">
          <div class="swipe-wrap relative overflow-hidden ${fullyDone ? 'mb-0.5' : 'mb-1'}">
            <div class="swipe-actions absolute inset-y-0 right-0 flex">
              <button onclick="renameCategory(${c.id})" class="w-[68px] bg-zinc-500 text-white text-xs font-medium">Rename</button>
              <button onclick="deleteCategory(${c.id})" class="w-[68px] bg-red-500 text-white text-xs font-medium">Delete</button>
            </div>
            <div class="swipe-front cat-head flex items-center gap-1.5 ${fullyDone ? 'pb-1' : 'pb-1.5'} border-b border-zinc-300/80 dark:border-zinc-800/60 bg-zinc-100 dark:bg-zinc-950">
              <span class="drag-handle text-zinc-300 hover:text-zinc-500 dark:text-zinc-700 dark:hover:text-zinc-400 select-none px-0.5 text-sm" title="Drag to reorder categories">⠿</span>
              <button onclick="toggleCatDone(${c.id})" title="${showDone ? 'Hide' : 'Show'} completed items in this category"
                      class="text-zinc-400 dark:text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300 select-none text-[10px] px-0.5 leading-none w-3 shrink-0">
                ${showDone ? '▼' : '▶'}
              </button>
              <h2 class="font-semibold text-sm uppercase tracking-wide ${fullyDone ? 'text-zinc-400 dark:text-zinc-600' : 'text-zinc-500 dark:text-zinc-400'} flex-1 truncate cursor-pointer hover:text-zinc-800 dark:hover:text-zinc-200"
                  onclick="catTitleTap(event, ${c.id})" title="${IS_TOUCH ? (showDone ? 'Hide' : 'Show') + ' completed items' : 'Rename category'}">${esc(c.name)}</h2>
              ${fullyDone ? `
              <button onclick="toggleCatDone(${c.id})" title="${showDone ? 'Hide' : 'Show'} completed in this category"
                      class="text-[11px] text-zinc-400 dark:text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300 select-none px-1">
                ${checked.length} done ${showDone ? '▾' : '▸'}
              </button>` : ''}
              <button onclick="toggleAdder(${c.id})" title="Add an item"
                      class="text-zinc-400 dark:text-zinc-500 hover:text-violet-600 dark:hover:text-violet-400 text-base px-1.5 leading-none font-medium">+</button>
              <button onclick="deleteCategory(${c.id})" title="Delete category"
                      class="cat-del text-zinc-400 dark:text-zinc-600 hover:text-red-500 dark:hover:text-red-400 text-sm px-1.5 leading-none">✕</button>
            </div>
          </div>
          ${openAdders.has(c.id) ? `
          <form onsubmit="return addItem(event, ${c.id})" class="mb-0.5 flex items-center gap-2 px-1">
            <span class="text-zinc-400 dark:text-zinc-600 text-sm w-4 text-center select-none">+</span>
            <input name="text" placeholder="Add an item…" autocomplete="off" enterkeyhint="done"
                   onkeydown="if (event.key === 'Escape') toggleAdder(${c.id})" onblur="commitOnBlur(event)"
                   class="flex-1 bg-transparent text-sm placeholder-zinc-400 dark:placeholder-zinc-600 text-zinc-700 dark:text-zinc-300 focus:outline-none py-1.5">
          </form>` : ''}
          <div class="active-items space-y-0.5">
            ${unchecked.map(renderItem).join('')}
            ${empty ? '<p class="empty-note text-xs text-zinc-400 dark:text-zinc-600 px-1 py-1">No items yet</p>' : ''}
          </div>
          ${checked.length ? `
          ${fullyDone ? '' : `
          <div class="flex items-center justify-start gap-2 my-1.5 px-1">
            <div class="${hairline}"></div>
            <button onclick="toggleCatDone(${c.id})" title="${showDone ? 'Hide' : 'Show'} completed in this category"
                    class="text-[11px] text-zinc-400 dark:text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300 select-none px-1">
              ${checked.length} done ${showDone ? '▾' : '▸'}
            </button>
            <div class="${hairline}"></div>
          </div>`}
          ${showDone ? `<div class="space-y-0.5">${checked.map(renderItem).join('')}</div>` : ''}` : ''}
        </section>`;
    }

    // Tapping anywhere on the row toggles the item; interactive children
    // (checkbox, edit/delete buttons, drag handle) keep their own behavior.
    // A tap that ends a swipe gesture (or lands while a row is swiped open)
    // closes the swipe instead of toggling.
    function rowTap(ev, id) {
      if (suppressTap) return;
      if (openSwipe) { closeOpenSwipe(); return; }
      if (ev.target.closest('button, input, .drag-handle')) return;
      const item = current.items.find(i => i.id === id);
      if (item) toggleItem(id, !item.checked);
    }

    // On touch devices renaming goes through the swipe actions; a tap on the
    // title toggles the done-items collapse instead.
    function catTitleTap(ev, id) {
      if (suppressTap) return;
      if (openSwipe) { closeOpenSwipe(); return; }
      if (IS_TOUCH) { toggleCatDone(id); return; }
      renameCategory(id);
    }

    function renderItem(i) {
      return `
        <div class="swipe-wrap relative overflow-hidden rounded-lg">
          <div class="swipe-actions absolute inset-y-0 right-0 flex">
            <button onclick="editItem(${i.id})" class="w-[68px] bg-zinc-500 text-white text-xs font-medium">Rename</button>
            <button onclick="deleteItem(${i.id})" class="w-[68px] bg-red-500 text-white text-xs font-medium">Delete</button>
          </div>
          <div class="swipe-front item-row group flex items-center gap-2 px-1 py-1.5 rounded-lg cursor-pointer bg-zinc-100 dark:bg-zinc-950 hover:bg-zinc-200/50 dark:hover:bg-zinc-800/40"
               data-item="${i.id}" data-cat="${i.category_id}" data-checked="${i.checked ? 1 : 0}" draggable="${IS_TOUCH ? 'false' : 'true'}"
               onclick="rowTap(event, ${i.id})">
            <span class="drag-handle text-zinc-300 hover:text-zinc-500 dark:text-zinc-700 dark:hover:text-zinc-400 select-none text-sm shrink-0" title="Drag to reorder">⠿</span>
            <input type="checkbox" ${i.checked ? 'checked' : ''} onchange="toggleItem(${i.id}, this.checked)"
                   class="todo-check">
            <span class="flex-1 text-sm break-words ${i.checked ? 'line-through text-zinc-400 dark:text-zinc-500' : ''}">${esc(i.text)}</span>
            ${i.last_checked_by ? `<span class="shrink-0 text-[11px] text-zinc-400 dark:text-zinc-600" title="Last ${i.checked ? 'checked' : 'unchecked'} by @${esc(i.last_checked_by)}">${i.checked ? '✓' : '↺'} @${esc(i.last_checked_by)}</span>` : ''}
            <button onclick="editItem(${i.id})" title="Edit"
                    class="hover-action opacity-0 group-hover:opacity-100 text-zinc-400 dark:text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-200 text-xs px-1">✎</button>
            <button onclick="deleteItem(${i.id})" title="Delete"
                    class="hover-action opacity-0 group-hover:opacity-100 text-zinc-400 dark:text-zinc-500 hover:text-red-500 dark:hover:text-red-400 text-xs px-1">✕</button>
          </div>
        </div>`;
    }

    // Targeted repaints — swap just the affected category section so the rest
    // of the screen (and input focus elsewhere) is untouched.
    function repaintCategory(catId) {
      const c = current.categories.find(x => x.id === catId);
      const el = document.getElementById('cat-' + catId);
      if (!c || !el) return;
      openSwipe = null;
      el.outerHTML = renderCategory(c);
    }
    function repaintAllCategories() {
      const el = document.getElementById('cats');
      openSwipe = null;
      if (el) el.innerHTML = displayCategories().map(c => renderCategory(c)).join('');
    }

    // --- list actions ------------------------------------------------------------
    async function renameList() {
      const name = await askText('Rename list:', current.list.name);
      if (!name || !name.trim() || name.trim() === current.list.name) return;
      try {
        await api('/api/lists/' + current.list.id, { method: 'PATCH', body: JSON.stringify({ name: name.trim() }) });
        current.list.name = name.trim();
        renderList(current);
      } catch (e) { toast(e.message); }
    }

    async function deleteList() {
      if (!await askConfirm('Delete "' + current.list.name + '" and all its items? This can\'t be undone.')) return;
      try {
        await api('/api/lists/' + current.list.id, { method: 'DELETE' });
        location.hash = '#/';
      } catch (e) { toast(e.message); }
    }

    // --- category actions ----------------------------------------------------------
    async function addCategory(ev) {
      ev.preventDefault();
      const input = ev.target.elements.name;
      const name = input.value.trim();
      if (!name) return false;
      input.value = ''; // before the await: a trailing keyboard-done blur finds it empty
      try {
        const { category } = await api('/api/lists/' + current.list.id + '/categories', { method: 'POST', body: JSON.stringify({ name }) });
        current.categories.push(category);
        // The form itself isn't re-rendered, so input focus (when it still
        // has it) survives on its own.
        repaintAllCategories();
      } catch (e) { toast(e.message); input.value = name; }
      return false;
    }

    async function renameCategory(id) {
      const cat = current.categories.find(c => c.id === id);
      const name = await askText('Rename category:', cat ? cat.name : '');
      if (!name || !name.trim()) return;
      try {
        await api('/api/categories/' + id, { method: 'PATCH', body: JSON.stringify({ name: name.trim() }) });
        cat.name = name.trim();
        repaintCategory(id);
      } catch (e) { toast(e.message); }
    }

    // Any category can be deleted (with its items) except the last one.
    async function deleteCategory(id) {
      if (current.categories.length <= 1) {
        return toast("Can't delete the only category — lists need at least one");
      }
      const cat = current.categories.find(c => c.id === id);
      const n = current.items.filter(i => i.category_id === id).length;
      const msg = 'Delete category "' + (cat ? cat.name : '') + '"' +
        (n ? ' and its ' + n + ' item' + (n > 1 ? 's' : '') : '') + '?';
      if (!await askConfirm(msg)) return;
      try {
        await api('/api/categories/' + id, { method: 'DELETE' });
        current.categories = current.categories.filter(c => c.id !== id);
        current.items = current.items.filter(i => i.category_id !== id);
        const el = document.getElementById('cat-' + id);
        if (el) el.remove();
      } catch (e) { toast(e.message); }
    }

    // --- item actions ---------------------------------------------------------------
    async function addItem(ev, categoryId) {
      ev.preventDefault();
      const input = ev.target.elements.text;
      const text = input.value.trim();
      if (!text) return false;
      input.value = ''; // before the await: a trailing keyboard-done blur finds it empty
      const wasFullyDone = isCatFullyDone(categoryId);
      try {
        const { item } = await api('/api/categories/' + categoryId + '/items', { method: 'POST', body: JSON.stringify({ text }) });
        current.items.push(item); // server gives it the smallest sort_order → top of the active list
        if (wasFullyDone) {
          // The section was rendered compact (inline done toggle, tight
          // spacing) and is now active again — a surgical insert would leave
          // that stale, so repaint the whole section and restore focus.
          repaintCategory(categoryId);
          const fresh = document.querySelector('#cat-' + categoryId + ' input[name=text]');
          if (fresh) fresh.focus({ preventScroll: true });
        } else {
          // Insert just the new row; the form (and its focus) is untouched,
          // so the view stays perfectly still.
          const body = document.querySelector('#cat-' + categoryId + ' .active-items');
          if (body) {
            const ph = body.querySelector('.empty-note');
            if (ph) ph.remove();
            body.insertAdjacentHTML('afterbegin', renderItem(item));
          }
        }
      } catch (e) { toast(e.message); input.value = text; }
      return false;
    }

    async function toggleItem(id, checked) {
      try {
        const { item } = await api('/api/items/' + id, { method: 'PATCH', body: JSON.stringify({ checked }) });
        const idx = current.items.findIndex(i => i.id === id);
        if (idx !== -1) current.items[idx] = item;
        // Checking the last open item flips the category to fully done, which
        // defaults to collapsed — keep it expanded for this session so the
        // rows the user is looking at don't vanish mid-interaction.
        if (checked && isCatFullyDone(item.category_id)) catDoneOverrides[item.category_id] = true;
        repaintCategory(item.category_id);
      } catch (e) { toast(e.message); refreshList(); }
    }

    async function editItem(id) {
      const item = current.items.find(i => i.id === id);
      const text = await askText('Edit item:', item ? item.text : '');
      if (!text || !text.trim()) return;
      try {
        const { item: updated } = await api('/api/items/' + id, { method: 'PATCH', body: JSON.stringify({ text: text.trim() }) });
        const idx = current.items.findIndex(i => i.id === id);
        if (idx !== -1) current.items[idx] = updated;
        repaintCategory(updated.category_id);
      } catch (e) { toast(e.message); }
    }

    async function deleteItem(id) {
      const item = current.items.find(i => i.id === id);
      try {
        await api('/api/items/' + id, { method: 'DELETE' });
        current.items = current.items.filter(i => i.id !== id);
        if (item) repaintCategory(item.category_id);
      } catch (e) { toast(e.message); }
    }

    // --- drag & drop reordering -------------------------------------------------
    // Rows and category sections are draggable, but a drag only starts from the
    // ⠿ handle (checked via mousedown) so text selection and taps still work.
    let drag = null;     // { type: 'item'|'cat', id, catId?, checked? }
    let dropCue = null;  // items: { catId, id?, after?, end? } · cats: { id, after }
    let handleArmed = false;

    document.addEventListener('mousedown', e => { handleArmed = !!e.target.closest('.drag-handle'); });

    const appEl = document.getElementById('app');

    // Edge auto-scroll while dragging. The touch drag preventDefault()s every
    // touchmove (so the page never scrolls natively under a drag), and desktop
    // HTML5 DnD window auto-scroll is unreliable cross-browser (Firefox has
    // none) — so both paths drive this rAF loop: near the top/bottom of the
    // viewport the page scrolls, and the drop cue is re-hit-tested on every
    // step that actually moved, because the content slides under a stationary
    // pointer without firing new pointer events.
    const SCROLL_ZONE_FRACTION = 0.15; // of visual viewport height
    const SCROLL_ZONE_MIN = 48;        // px
    const SCROLL_ZONE_MAX = 120;       // px
    const SCROLL_MAX_SPEED = 600;      // px/s at the very edge
    let dragX = 0, dragY = 0;          // last known pointer position (viewport coords)
    let scrollRaf = null, scrollLastTs = 0;

    function startAutoScroll() {
      if (scrollRaf) return;
      scrollLastTs = 0;
      scrollRaf = requestAnimationFrame(autoScrollStep);
    }
    function stopAutoScroll() {
      if (scrollRaf) cancelAnimationFrame(scrollRaf);
      scrollRaf = null;
    }
    function autoScrollStep(ts) {
      if (!drag) { scrollRaf = null; return; }
      const dt = scrollLastTs ? (ts - scrollLastTs) / 1000 : 0;
      scrollLastTs = ts;
      const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      const zone = Math.max(SCROLL_ZONE_MIN, Math.min(SCROLL_ZONE_MAX, vh * SCROLL_ZONE_FRACTION));
      let v = 0; // signed px/s, ramping linearly with depth into the zone
      if (dragY < zone) v = -SCROLL_MAX_SPEED * Math.min(1, (zone - dragY) / zone);
      else if (dragY > vh - zone) v = SCROLL_MAX_SPEED * Math.min(1, (dragY - (vh - zone)) / zone);
      if (v && dt) {
        const before = window.scrollY;
        window.scrollBy(0, v * dt);
        if (window.scrollY !== before) {
          cueFromPoint(document.elementFromPoint(dragX, dragY), dragY);
        }
      }
      scrollRaf = requestAnimationFrame(autoScrollStep);
    }

    appEl.addEventListener('dragstart', e => {
      if (!handleArmed || !current) { e.preventDefault(); return; }
      const row = e.target.closest && e.target.closest('.item-row');
      const sec = e.target.closest && e.target.closest('.cat-section');
      if (row) {
        drag = { type: 'item', id: +row.dataset.item, catId: +row.dataset.cat, checked: row.dataset.checked === '1' };
        row.classList.add('dragging');
      } else if (sec) {
        drag = { type: 'cat', id: +sec.dataset.cat };
        sec.classList.add('dragging');
      } else { e.preventDefault(); return; }
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', ''); } catch (_) {}
      dragX = e.clientX; dragY = e.clientY;
      startAutoScroll();
    });

    function clearDropCue() {
      document.querySelectorAll('.drop-before, .drop-after, .drop-into').forEach(el =>
        el.classList.remove('drop-before', 'drop-after', 'drop-into'));
      dropCue = null;
    }

    // Deadspace fallback: when the pointer isn't over any row or section
    // (gaps between categories, header, padding, beside the column), snap
    // to the nearest valid drop position by vertical distance and paint
    // the same cue a direct hover there would have painted. Vertical-only —
    // the layout is a single centered column, so horizontal distance
    // carries no information. Ties break by document order.
    function nearestDropCue(clientY) {
      if (!drag) { clearDropCue(); return false; }
      const distTo = r =>
        clientY < r.top ? r.top - clientY : clientY > r.bottom ? clientY - r.bottom : 0;
      let best = null, bestDist = Infinity;
      if (drag.type === 'item') {
        // Nearest visible row of the matching checked-state, any category.
        document.querySelectorAll('.item-row').forEach(row => {
          if (+row.dataset.item === drag.id) return;
          if ((row.dataset.checked === '1') !== drag.checked) return;
          if (!row.offsetParent) return;
          const r = row.getBoundingClientRect();
          const d = distTo(r);
          if (d < bestDist) { bestDist = d; best = { row, r }; }
        });
        // Sections whose matching subsection has no visible rows (empty
        // categories, collapsed done-subsections) are end-drop targets.
        document.querySelectorAll('.cat-section').forEach(sec => {
          const hasRow = Array.from(sec.querySelectorAll('.item-row')).some(row =>
            +row.dataset.item !== drag.id &&
            (row.dataset.checked === '1') === drag.checked && row.offsetParent);
          if (hasRow) return;
          const d = distTo(sec.getBoundingClientRect());
          if (d < bestDist) { bestDist = d; best = { sec } }
        });
        if (!best) { clearDropCue(); return false; }
        clearDropCue();
        if (best.row) {
          const after = clientY > best.r.top + best.r.height / 2;
          (best.row.closest('.swipe-wrap') || best.row).classList.add(after ? 'drop-after' : 'drop-before');
          dropCue = { catId: +best.row.dataset.cat, id: +best.row.dataset.item, after };
        } else {
          best.sec.classList.add('drop-into');
          dropCue = { catId: +best.sec.dataset.cat, end: true };
        }
        return true;
      } else {
        document.querySelectorAll('.cat-section').forEach(sec => {
          if (+sec.dataset.cat === drag.id) return;
          const r = sec.getBoundingClientRect();
          const d = distTo(r);
          if (d < bestDist) { bestDist = d; best = { sec, r }; }
        });
        if (!best) { clearDropCue(); return false; }
        clearDropCue();
        const after = clientY > best.r.top + best.r.height / 2;
        best.sec.classList.add(after ? 'drop-after' : 'drop-before');
        dropCue = { id: +best.sec.dataset.cat, after };
        return true;
      }
    }

    // Shared by desktop dragover and touch (long-press) drag. Computes the
    // drop cue for the element under the pointer; returns true when that
    // position is a valid drop target. Row cues paint on the swipe wrapper —
    // the row itself sits inside overflow-hidden, which clips box-shadows.
    function cueFromPoint(targetEl, clientY) {
      if (!drag) { clearDropCue(); return false; }
      if (!targetEl || !targetEl.closest) return nearestDropCue(clientY);
      if (drag.type === 'item') {
        // Over a row of the same checked-state (any category): insert
        // before/after it. Elsewhere in a category section: append to the
        // end of that category's matching section. Over the dragged row
        // itself: keep the last cue so a drop there still lands somewhere.
        const row = targetEl.closest('.item-row');
        if (row && +row.dataset.item === drag.id) return true;
        clearDropCue();
        if (row && (row.dataset.checked === '1') === drag.checked) {
          const r = row.getBoundingClientRect();
          const after = clientY > r.top + r.height / 2;
          (row.closest('.swipe-wrap') || row).classList.add(after ? 'drop-after' : 'drop-before');
          dropCue = { catId: +row.dataset.cat, id: +row.dataset.item, after };
          return true;
        }
        const sec = targetEl.closest('.cat-section');
        if (!sec) return nearestDropCue(clientY);
        sec.classList.add('drop-into');
        dropCue = { catId: +sec.dataset.cat, end: true };
        return true;
      } else {
        const sec = targetEl.closest('.cat-section');
        if (!sec) return nearestDropCue(clientY);
        // Over the dragged section itself (it's tall — this is the common
        // case mid-drag): keep the last cue instead of wiping it.
        if (+sec.dataset.cat === drag.id) return true;
        clearDropCue();
        const r = sec.getBoundingClientRect();
        const after = clientY > r.top + r.height / 2;
        sec.classList.add(after ? 'drop-after' : 'drop-before');
        dropCue = { id: +sec.dataset.cat, after };
        return true;
      }
    }

    // Bound to document (not #app) so deadspace outside the centered
    // column — body margins, header, bottom padding — still snaps to the
    // nearest drop position. The `drag` guard keeps foreign drags
    // (files, text) untouched.
    document.addEventListener('dragover', e => {
      if (!drag) return;
      dragX = e.clientX; dragY = e.clientY;
      if (cueFromPoint(e.target, e.clientY)) e.preventDefault();
    });

    document.addEventListener('drop', e => {
      if (!drag) return;
      e.preventDefault();
      stopAutoScroll();
      const d = drag, cue = dropCue;
      drag = null;
      clearDropCue();
      if (!cue) return;
      if (d.type === 'item') applyItemReorder(d, cue);
      else applyCategoryReorder(d, cue);
    });

    appEl.addEventListener('dragend', () => {
      stopAutoScroll();
      document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
      drag = null;
      handleArmed = false;
      clearDropCue();
    });

    // --- touch gestures (mobile) --------------------------------------------------
    // Single tap toggles (via the row's click handler). Swipe left on a row or
    // category header reveals Rename/Delete. Long-press (then move) drags to
    // reorder — HTML5 DnD doesn't fire on touch, so this drives the same
    // drag/dropCue state by hand.
    const IS_TOUCH = window.matchMedia('(hover: none) and (pointer: coarse)').matches ||
                     'ontouchstart' in window;
    const SWIPE_W = 136;   // total width of the two revealed action buttons
    let swipe = null;      // in-flight gesture: { wrap, front, startX, startY, dx, mode, wasOpen }
    let openSwipe = null;  // .swipe-wrap currently left open
    let lpTimer = null;    // long-press timer
    let touchDragging = false;
    let suppressTap = false;

    // Positions the front layer and the action buttons as one unit: at
    // offset 0 the actions sit just past the right edge (CSS default
    // translateX(100%)); at -SWIPE_W they're fully revealed.
    function setSwipeOffset(wrap, off, animate) {
      const front = wrap.querySelector('.swipe-front');
      const actions = wrap.querySelector('.swipe-actions');
      const t = animate ? '' : 'none';
      if (front) {
        front.style.transition = t;
        front.style.transform = off ? 'translateX(' + off + 'px)' : '';
      }
      if (actions) {
        actions.style.transition = t;
        actions.style.transform = off ? 'translateX(' + (SWIPE_W + off) + 'px)' : '';
      }
    }
    function closeOpenSwipe() {
      if (!openSwipe) return;
      setSwipeOffset(openSwipe, 0, true);
      openSwipe = null;
    }
    function suppressNextTap() {
      suppressTap = true;
      setTimeout(() => { suppressTap = false; }, 350);
    }

    appEl.addEventListener('touchstart', e => {
      if (!current || e.touches.length !== 1) return;
      const t = e.touches[0];
      const wrap = e.target.closest && e.target.closest('.swipe-wrap');
      swipe = wrap ? {
        wrap,
        startX: t.clientX, startY: t.clientY, dx: 0, mode: null,
        wasOpen: wrap === openSwipe,
      } : null;
      clearTimeout(lpTimer);
      if (e.target.closest && e.target.closest('button, input, a')) return;
      const row = e.target.closest && e.target.closest('.item-row');
      const head = e.target.closest && e.target.closest('.cat-head');
      let info = null;
      if (row) info = { type: 'item', id: +row.dataset.item, catId: +row.dataset.cat, checked: row.dataset.checked === '1', el: row };
      else if (head) {
        const sec = head.closest('.cat-section');
        if (sec) info = { type: 'cat', id: +sec.dataset.cat, el: sec };
      }
      if (info) {
        lpTimer = setTimeout(() => {
          if (swipe && swipe.mode) return; // already swiping/scrolling
          touchDragging = true;
          drag = info;
          info.el.classList.add('dragging');
          closeOpenSwipe();
          if (navigator.vibrate) navigator.vibrate(10);
          dragX = t.clientX; dragY = t.clientY;
          startAutoScroll();
        }, 400);
      }
    }, { passive: true });

    appEl.addEventListener('touchmove', e => {
      const t = e.touches[0];
      if (touchDragging) {
        e.preventDefault(); // keep the page from scrolling under the drag
        dragX = t.clientX; dragY = t.clientY;
        const el = document.elementFromPoint(t.clientX, t.clientY);
        cueFromPoint(el, t.clientY);
        return;
      }
      if (!swipe) return;
      const dx = t.clientX - swipe.startX;
      const dy = t.clientY - swipe.startY;
      if (!swipe.mode) {
        if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy) * 1.2) {
          swipe.mode = 'h';
          clearTimeout(lpTimer);
        } else if (Math.abs(dy) > 10) {
          clearTimeout(lpTimer);
          swipe = null; // vertical scroll — hands off
          return;
        } else if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
          clearTimeout(lpTimer); // moved too much for a long-press
        }
      }
      if (swipe.mode === 'h') {
        e.preventDefault();
        const base = swipe.wasOpen ? -SWIPE_W : 0;
        swipe.dx = Math.max(-SWIPE_W, Math.min(0, base + dx));
        setSwipeOffset(swipe.wrap, swipe.dx, false);
      }
    }, { passive: false });

    appEl.addEventListener('touchend', () => {
      clearTimeout(lpTimer);
      if (touchDragging) {
        touchDragging = false;
        stopAutoScroll();
        suppressNextTap();
        document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
        const d = drag, cue = dropCue;
        drag = null;
        clearDropCue();
        if (d && cue) (d.type === 'item' ? applyItemReorder(d, cue) : applyCategoryReorder(d, cue));
        swipe = null;
        return;
      }
      if (swipe && swipe.mode === 'h') {
        if (openSwipe && openSwipe !== swipe.wrap) closeOpenSwipe();
        if (swipe.dx < -SWIPE_W / 2) {
          setSwipeOffset(swipe.wrap, -SWIPE_W, true);
          openSwipe = swipe.wrap;
        } else {
          setSwipeOffset(swipe.wrap, 0, true);
          if (openSwipe === swipe.wrap) openSwipe = null;
        }
        suppressNextTap();
      }
      swipe = null;
    }, { passive: true });

    appEl.addEventListener('touchcancel', () => {
      clearTimeout(lpTimer);
      if (touchDragging) {
        touchDragging = false;
        stopAutoScroll();
        document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
        drag = null;
        clearDropCue();
      }
      if (swipe) setSwipeOffset(swipe.wrap, swipe.wasOpen ? -SWIPE_W : 0, true);
      swipe = null;
    }, { passive: true });

    // Handles both same-category reorders and cross-category moves. The item
    // lands in the target category's matching checked/unchecked section, at
    // the cue position (or the end for whole-section drops).
    async function applyItemReorder(d, cue) {
      const sameCat = cue.catId === d.catId;
      const item = current.items.find(i => i.id === d.id);
      if (!item) return;
      const ids = sectionItems(cue.catId, d.checked).map(i => i.id).filter(id => id !== d.id);
      let to;
      if (cue.end || cue.id == null) {
        to = ids.length;
      } else {
        to = ids.indexOf(cue.id);
        if (to === -1) return;
        if (cue.after) to++;
      }
      if (sameCat && cue.end) {
        // No-op if it's already last in its section.
        const before = sectionItems(d.catId, d.checked).map(i => i.id);
        if (before[before.length - 1] === d.id) return;
      }
      const affected = sameCat ? [d.catId] : [d.catId, cue.catId];
      ids.splice(to, 0, d.id);
      item.category_id = cue.catId;
      ids.forEach((id, idx) => {
        const it = current.items.find(i => i.id === id);
        if (it) it.sort_order = idx + 1;
      });
      affected.forEach(repaintCategory);
      try {
        if (!sameCat) {
          await api('/api/items/' + d.id, { method: 'PATCH', body: JSON.stringify({ category_id: cue.catId }) });
        }
        await api('/api/categories/' + cue.catId + '/reorder-items', { method: 'POST', body: JSON.stringify({ itemIds: ids }) });
      } catch (e) { toast(e.message); refreshList(); }
    }

    async function applyCategoryReorder(d, cue) {
      const ids = current.categories.map(c => c.id);
      const from = ids.indexOf(d.id);
      if (from === -1) return;
      ids.splice(from, 1);
      let to = ids.indexOf(cue.id);
      if (to === -1) return;
      if (cue.after) to++;
      ids.splice(to, 0, d.id);
      current.categories.sort((a, b) => ids.indexOf(a.id) - ids.indexOf(b.id));
      current.categories.forEach((c, idx) => { c.sort_order = idx; });
      repaintAllCategories();
      try {
        await api('/api/lists/' + current.list.id + '/reorder-categories', { method: 'POST', body: JSON.stringify({ categoryIds: ids }) });
      } catch (e) { toast(e.message); refreshList(); }
    }

    // --- markdown import / export ------------------------------------------------
    // Google Keep-ish format: title as `# **Name**`, categories as top-level
    // bullets, items as nested bullets. Active items come first; a `---`
    // divider precedes the completed block, where items are ~~struck~~ and
    // category names repeat (struck too when the category is fully done).

    function buildMarkdown() {
      const active = [], done = [];
      for (const c of current.categories) {
        const un = sectionItems(c.id, false);
        const ch = sectionItems(c.id, true);
        if (un.length || !ch.length) {
          active.push('* ' + c.name);
          un.forEach(i => active.push('  * ' + i.text));
        }
        if (ch.length) {
          done.push('* ' + (un.length ? c.name : '~~' + c.name + '~~'));
          ch.forEach(i => done.push('  * ~~' + i.text + '~~'));
        }
      }
      const lines = ['# **' + current.list.name + '**', '', ...active];
      if (done.length) lines.push('', '---', '', ...done);
      return lines.join('\n') + '\n';
    }

    function stripMd(s) {
      return s.replace(/\*\*/g, '').replace(/~~/g, '').trim();
    }

    function parseMarkdown(md) {
      let name = null;
      const categories = [];
      const byKey = new Map(); // duplicate category names (active vs done block) merge
      let cur = null;
      for (const raw of md.split(/\r?\n/)) {
        const line = raw.replace(/\s+$/, '');
        if (!line.trim() || /^-{3,}$/.test(line.trim())) continue;
        const h = line.match(/^#+\s+(.*)$/);
        if (h) { if (!name) name = stripMd(h[1]); continue; }
        const m = line.match(/^(\s*)[*+-]\s+(.*)$/);
        if (!m) continue;
        const indent = m[1].replace(/\t/g, '  ').length;
        let text = m[2].trim();
        let checked = false;
        const struck = text.match(/^~~(.*)~~$/s);
        if (struck) { checked = true; text = struck[1].trim(); }
        text = text.replace(/\*\*/g, '').trim();
        if (!text) continue;
        if (indent === 0) {
          const key = text.toLowerCase();
          cur = byKey.get(key);
          if (!cur) {
            cur = { name: text, items: [] };
            byKey.set(key, cur);
            categories.push(cur);
          }
        } else {
          if (!cur) {
            cur = { name: 'General', items: [] };
            byKey.set('general', cur);
            categories.push(cur);
          }
          cur.items.push({ text, checked });
        }
      }
      return { name, categories };
    }

    function openMd({ title, hint, text, readonly, actionsHtml }) {
      document.getElementById('md-title').textContent = title;
      document.getElementById('md-hint').textContent = hint;
      const ta = document.getElementById('md-text');
      ta.value = text;
      ta.readOnly = !!readonly;
      ta.placeholder = readonly ? '' : '# **My List**\n\n* Category\n  * item\n  * ~~done item~~';
      document.getElementById('md-actions').innerHTML = actionsHtml;
      document.getElementById('md-modal').classList.remove('hidden');
      if (!readonly) setTimeout(() => ta.focus(), 0);
    }
    function closeMd() {
      document.getElementById('md-modal').classList.add('hidden');
    }
    document.getElementById('md-modal').addEventListener('click', ev => {
      if (ev.target === document.getElementById('md-modal')) closeMd();
    });

    function openExport() {
      openMd({
        title: 'Export markdown',
        hint: 'Copy this markdown or download it as a file.',
        text: buildMarkdown(),
        readonly: true,
        actionsHtml: `
          <button onclick="copyMd()" class="text-sm px-3 py-1.5 rounded-lg ${BTN_SOFT}">Copy</button>
          <button onclick="downloadMd()" class="text-sm px-3 py-1.5 rounded-lg bg-violet-600 hover:bg-violet-500 text-white">Download .md</button>`,
      });
    }

    async function copyMd() {
      const ta = document.getElementById('md-text');
      try {
        await navigator.clipboard.writeText(ta.value);
        toast('Copied to clipboard');
      } catch (_) {
        ta.select();
        document.execCommand('copy');
        toast('Copied to clipboard');
      }
    }

    function downloadMd() {
      const blob = new Blob([document.getElementById('md-text').value], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (current ? current.list.name.replace(/[^\w\d-]+/g, '-').replace(/^-+|-+$/g, '') || 'list' : 'list') + '.md';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    }

    // mode 'new' (from Home: create a list) or 'merge' (into the current list,
    // which offers both add and replace).
    function openImport(mode) {
      openMd({
        title: 'Import markdown',
        hint: mode === 'new'
          ? 'Paste markdown to create a new list. ~~Strikethrough~~ items import as completed.'
          : 'Paste markdown to import into this list. Add merges into matching categories; Replace clears the list first. ~~Strikethrough~~ items import as completed.',
        text: '',
        readonly: false,
        actionsHtml: mode === 'new' ? `
          <button onclick="closeMd()" class="text-sm px-3 py-1.5 rounded-lg ${BTN_SOFT}">Cancel</button>
          <button onclick="runImport('new')" class="text-sm px-3 py-1.5 rounded-lg bg-violet-600 hover:bg-violet-500 text-white">Import</button>` : `
          <button onclick="closeMd()" class="text-sm px-3 py-1.5 rounded-lg ${BTN_SOFT}">Cancel</button>
          <button onclick="runImport('replace')" class="text-sm px-3 py-1.5 rounded-lg bg-red-600 hover:bg-red-500 text-white">Import (replace)</button>
          <button onclick="runImport('add')" class="text-sm px-3 py-1.5 rounded-lg bg-violet-600 hover:bg-violet-500 text-white">Import (add)</button>`,
      });
    }

    async function runImport(mode) {
      const md = document.getElementById('md-text').value;
      const { name, categories } = parseMarkdown(md);
      if (!categories.length || !categories.some(c => c.items.length)) {
        return toast('Nothing to import — expected bullets like "* Category" with "  * item" beneath');
      }
      try {
        if (mode === 'new') {
          const { list } = await api('/api/lists/import', {
            method: 'POST',
            body: JSON.stringify({ name: name || 'Imported list', categories }),
          });
          closeMd();
          if (location.hash === '#/list/' + list.id) loadList(list.id);
          else location.hash = '#/list/' + list.id;
        } else {
          if (mode === 'replace' &&
              !await askConfirm('Replace everything in "' + current.list.name + '" with the imported content?', 'Replace')) {
            return;
          }
          await api('/api/lists/' + current.list.id + '/import', {
            method: 'POST',
            body: JSON.stringify({ categories, mode }),
          });
          closeMd();
          toast(mode === 'replace' ? 'List replaced' : 'Imported');
          refreshList();
        }
      } catch (e) { toast(e.message); }
    }

    // --- members modal ----------------------------------------------------------------
    function openMembers() {
      renderMembers();
      document.getElementById('modal-backdrop').classList.remove('hidden');
      document.getElementById('members-modal').classList.remove('hidden');
    }
    function closeMembers() {
      document.getElementById('modal-backdrop').classList.add('hidden');
      document.getElementById('members-modal').classList.add('hidden');
    }
    document.getElementById('modal-backdrop').addEventListener('click', closeMembers);

    function renderMembers() {
      const isOwner = current.role === 'owner';
      const body = document.getElementById('members-body');
      body.innerHTML = `
        <div class="space-y-1.5 mb-4">
          <div class="flex items-center justify-between px-2 py-1.5 rounded-lg bg-zinc-200/60 dark:bg-zinc-800/50">
            <span class="text-sm">@${esc(current.list.owner_username)}</span>
            <span class="text-[11px] uppercase tracking-wide text-violet-600 dark:text-violet-400">Owner</span>
          </div>
          ${current.members.map(m => `
            <div class="flex items-center justify-between px-2 py-1.5 rounded-lg hover:bg-zinc-200/50 dark:hover:bg-zinc-800/50">
              <span class="text-sm">@${esc(m.username)}</span>
              ${isOwner ? `<button onclick="removeMember(${m.id})" class="text-zinc-400 dark:text-zinc-500 hover:text-red-500 dark:hover:text-red-400 text-xs">Remove</button>` : ''}
            </div>`).join('')}
          ${!current.members.length ? '<p class="text-xs text-zinc-400 dark:text-zinc-600 px-2 py-1 flex items-center gap-1.5">' + lockSvg(11) + 'This list is private — only you can see it. Invite someone below to share it.</p>' : ''}
        </div>
        ${isOwner ? `
          <form onsubmit="return inviteMember(event)" class="flex gap-2">
            <input name="username" placeholder="Invite by username…" autocomplete="off"
                   class="flex-1 bg-zinc-100 dark:bg-zinc-950 border border-zinc-300 dark:border-zinc-800 rounded-lg px-3 py-2 text-sm placeholder-zinc-400 dark:placeholder-zinc-600 focus:outline-none focus:border-violet-600">
            <button class="text-sm px-3 py-2 rounded-lg bg-violet-600 hover:bg-violet-500 text-white">Invite</button>
          </form>
          <p class="text-[11px] text-zinc-400 dark:text-zinc-600 mt-2">Invites take effect immediately — the user will see this list next time they open the app.</p>`
        : '<p class="text-xs text-zinc-400 dark:text-zinc-600">Only the owner can manage members.</p>'}
      `;
    }

    async function inviteMember(ev) {
      ev.preventDefault();
      const input = ev.target.elements.username;
      const username = input.value.trim();
      if (!username) return false;
      try {
        await api('/api/lists/' + current.list.id + '/members', { method: 'POST', body: JSON.stringify({ username }) });
        current = await api('/api/lists/' + current.list.id);
        renderList(current);
        openMembers();
        toast('@' + username.replace(/^@/, '') + ' added');
      } catch (e) { toast(e.message); }
      return false;
    }

    async function removeMember(memberId) {
      try {
        await api('/api/lists/' + current.list.id + '/members/' + memberId, { method: 'DELETE' });
        current = await api('/api/lists/' + current.list.id);
        renderList(current);
        openMembers();
      } catch (e) { toast(e.message); }
    }

    applyTheme();
    route();
  </script>
</body>
</html>
