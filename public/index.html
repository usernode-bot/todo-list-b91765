    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);

      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');

      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);

  <title>Todo List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', future: { hoverOnlyWhenSupported: true } }</script>
  <script>
    // Apply the theme before first paint to avoid a flash. Explicit choice in
    // localStorage wins; otherwise follow the system preference.
    (function () {
      try {
        var pref = localStorage.getItem('todo:theme');
        var dark = pref === 'dark' ||
          (pref !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', dark);
      } catch (_) {}
    })();
  </script>
  <!-- usernode-native kit — centrally hosted, never vendored. Provides press
       states, switches, swipe actions, pull-to-refresh, reorder, sheets,
       modals, alerts, action sheets, toasts, nav bars, grouped lists and
       screen transitions. theme.css (the brand palette + --un-* overrides,
       shared with landing.html) must come AFTER native.css so the theme
       overrides win. -->
  <link rel="stylesheet" href="https://social-vibecoding.usernodelabs.org/usernode-native/v1/native.css">
  <link rel="stylesheet" href="/theme.css">
  <script src="https://social-vibecoding.usernodelabs.org/usernode-native/v1/native.js"></script>
  <style>
    /* The brand palette, --un-* kit overrides, Fraunces title rule, .tinted
       and the .todo-check checkbox live in /theme.css — shared with the
       logged-out landing page so the two can't drift. Only app-specific
       styles belong below. */
    html { overscroll-behavior-y: contain; }
    .surface { background: var(--card); }
    .btn-primary { background: var(--tint); color: #fff; }
    .btn-primary:hover { background: var(--tint-deep); }
    .x-close { color: var(--label3); }
    .x-close:hover { color: var(--label); }

    /* Offline status capsule — lives outside #app so re-renders never touch it. */
    #offline-chip {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: calc(16px + env(safe-area-inset-bottom));
      background: var(--label); color: var(--bg);
      font-size: 12.5px; font-weight: 600; white-space: nowrap;
      padding: 7px 14px; border-radius: 99px; z-index: 70;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .25); pointer-events: none;
    }

    .pencil-host .pencil { opacity: 0; transition: opacity .12s; }
    .pencil-host:hover .pencil { opacity: 1; }
    .cat-head .cat-del { opacity: 0; transition: opacity .12s; }
    .cat-head:hover .cat-del { opacity: 1; }
    .drag-handle { cursor: grab; touch-action: none; }
    .drag-handle:active { cursor: grabbing; }

    /* Long-press is a gesture (drag / swipe), not a text-selection trigger. */
    .item-row, .cat-head {
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }
    /* Mobile Safari zooms the whole viewport when focusing a field whose
       font is under 16px — that's the screen "bounce" on tapping an input.
       Bump fields to 16px on touch devices so focusing never zooms. */
    @media (hover: none) and (pointer: coarse) {
      input, textarea, select { font-size: 16px !important; }
    }
    input, textarea, button { touch-action: manipulation; }
    /* Touch devices: no item drag handles (long-press drags instead) and no
       hover-revealed buttons (swipe left reveals rename/delete instead).
       The category ⠿ grabber stays visible on touch — it is the category
       drag handle for the kit's reorder (handles lift immediately on both
       inputs). */
    @media (hover: none) and (pointer: coarse) {
      .item-drag, .hover-action, .cat-del { display: none !important; }
    }

    /* Rows of the ☰ bottom-sheet content (the sheet chrome itself — grabber,
       spring, drag-dismiss — is the kit's). */
    .sheet-row {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; text-align: left; gap: 12px;
      padding: 13px 16px; font-size: 17px; color: var(--label);
      position: relative;
    }
    .sheet-row + .sheet-row::before {
      content: ''; position: absolute; top: 0; left: 16px; right: 0;
      height: 1px; background: var(--separator); transform: scaleY(.5);
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="app" class="max-w-2xl mx-auto p-4 pb-24"></div>
  <div id="offline-chip" class="hidden"></div>

  <script>
    // --- auth / api ----------------------------------------------------------
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    // Random per-tab id sent with every mutation; SSE events echo it back so
    // the tab that made a change can skip refetching its own edit.
    const clientId = Math.random().toString(36).slice(2) + Date.now().toString(36);
    const headers = { 'x-client-id': clientId, ...(token ? { 'x-usernode-token': token } : {}) };

    // The signed-in username, read from the platform JWT's payload — display
    // and offline attribution only; the server never trusts it.
    const me = (() => {
      try {
        return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))).username || null;
      } catch (_) { return null; }
    })();

    async function api(path, opts = {}) {
      let res;
      try {
        res = await fetch(path, {
          ...opts,
          headers: { 'Content-Type': 'application/json', ...headers, ...(opts.headers || {}) },
        });
      } catch (_) {
        // fetch itself rejected — no connection. Tag the error so callers can
        // tell "offline" apart from a server-side rejection.
        markOffline();
        const err = new Error("You're offline");
        err.network = true;
        throw err;
      }
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || ('Request failed (' + res.status + ')'));
      if (offlineNow && !queueLength()) markOnline();
      return data;
    }

    // Transient feedback — the kit's toast (bottom capsule HUD on
    // iOS/desktop, Material snackbar on Android; singleton, auto-hiding).
    function toast(msg) {
      if (window.unNative) unNative.toast(msg);
      else console.warn('[toast]', msg);
    }

    // --- offline layer --------------------------------------------------------
    // Read cache: the last good payload of Home and of each opened list, so a
    // dead connection shows the saved copy instead of an error screen.
    // Mutation queue: the daily-use ops (add / toggle / edit / delete item)
    // apply optimistically and queue while offline, then replay in order on
    // reconnect. Everything else (reorders, categories, lists, members,
    // import/export) stays online-only and just toasts "You're offline".
    const QUEUE_KEY = 'todo:queue';

    function cacheSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (_) {} }
    function cacheGet(key) { try { return JSON.parse(localStorage.getItem(key)); } catch (_) { return null; } }
    function cacheList() { if (current) cacheSet('todo:cache:list:' + current.list.id, current); }

    function loadQueue() { return cacheGet(QUEUE_KEY) || []; }
    function saveQueue(q) { cacheSet(QUEUE_KEY, q); syncOfflineChip(); }
    function queueLength() { return loadQueue().length; }

    let offlineNow = false;
    function markOffline() { offlineNow = true; syncOfflineChip(); scheduleReplay(); }
    function markOnline() { offlineNow = false; syncOfflineChip(); }

    function syncOfflineChip() {
      const chip = document.getElementById('offline-chip');
      if (!chip) return;
      const n = queueLength();
      if (!offlineNow && !n) { chip.classList.add('hidden'); return; }
      chip.textContent = n
        ? (offlineNow ? 'Offline — ' + n + ' change' + (n === 1 ? '' : 's') + ' will sync'
                      : 'Syncing ' + n + ' change' + (n === 1 ? '' : 's') + '…')
        : 'Offline — showing saved copy';
      chip.classList.remove('hidden');
    }

    // Offline-created items get negative ids until replay maps them; seeding
    // from the clock avoids collisions with ids left in a persisted queue.
    let tempSeq = -(Date.now() % 1e9) - 1;
    const isTempId = id => id < 0;

    function enqueue(op) { const q = loadQueue(); q.push(op); saveQueue(q); }

    // Runs a queueable mutation. Ops already waiting must stay ordered ahead
    // of new ones, so a non-empty queue short-circuits straight to enqueue.
    // Returns the API payload, or null when the op was queued for later.
    async function mutate(op) {
      if (queueLength()) { enqueue(op); attemptReplay(); return null; }
      try {
        return await api(op.path, {
          method: op.method,
          ...(op.body == null ? {} : { body: JSON.stringify(op.body) }),
        });
      } catch (e) {
        if (e.network) { enqueue(op); return null; }
        throw e;
      }
    }

    let replayTimer = null, replaying = false;
    function scheduleReplay() {
      if (!replayTimer) replayTimer = setInterval(attemptReplay, 15000);
    }

    async function attemptReplay() {
      if (replaying) return;
      if (!queueLength()) {
        if (replayTimer) { clearInterval(replayTimer); replayTimer = null; }
        return;
      }
      replaying = true;
      try {
        while (true) {
          const q = loadQueue();
          if (!q.length) break;
          const op = q[0];
          try {
            if (op.type === 'add') {
              const data = await api(op.path, { method: 'POST', body: JSON.stringify(op.body) });
              // Rewrite later queued ops that reference the temp id, then
              // drop this op — persisted so the mapping survives reloads.
              saveQueue(loadQueue().slice(1).map(o =>
                o.itemId === op.itemId ? { ...o, itemId: data.item.id } : o));
              continue;
            }
            if (op.type === 'toggle' || op.type === 'edit') {
              if (!isTempId(op.itemId)) {
                await api('/api/items/' + op.itemId, { method: 'PATCH', body: JSON.stringify(op.body) });
              }
            } else if (op.type === 'delete') {
              if (!isTempId(op.itemId)) {
                await api('/api/items/' + op.itemId, { method: 'DELETE' });
              }
            }
            saveQueue(loadQueue().slice(1));
          } catch (e) {
            if (e.network) return; // still offline — the timer retries
            saveQueue(loadQueue().slice(1)); // server rejected (e.g. deleted elsewhere) — drop and move on
          }
        }
        markOnline();
        if (replayTimer) { clearInterval(replayTimer); replayTimer = null; }
        if (current) refreshList(); else refreshHome();
      } finally { replaying = false; }
    }
    window.addEventListener('online', attemptReplay);

    // Local stand-in for the server's insert (top of the unchecked section).
    function offlineNewItem(id, categoryId, text) {
      const min = current.items
        .filter(i => i.category_id === categoryId && !i.checked)
        .reduce((m, i) => Math.min(m, i.sort_order), 1);
      return { id, category_id: categoryId, text, checked: false, sort_order: min - 1,
               completed_at: null, created_by: me, last_checked_by: null };
    }

    // Platform detection from the kit's html classes; fall back to media
    // queries if native.js failed to load.
    const IS_TOUCH = document.documentElement.classList.contains('un-ios') ||
                     document.documentElement.classList.contains('un-android') ||
                     (!window.unNative &&
                       (window.matchMedia('(hover: none) and (pointer: coarse)').matches ||
                        'ontouchstart' in window));

    // Shared class strings — the palette flows from the CSS variables.
    const BTN_SOFT = 'bg-[var(--fill)] text-[color:var(--label)]';
    const DRAWER_ITEM = 'w-full flex items-center justify-between gap-3 text-left px-4 py-2.5 text-[15px] un-pressable hover:bg-[var(--fill)]';

    // Closed-padlock icon marking private (owner-only) lists; inherits text color.
    function lockSvg(size) {
      return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="inline-block shrink-0"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>`;
    }

    // Promise-based replacements for prompt()/confirm(), built on the kit.
    // Text prompts present as the kit alert (with its inset field);
    // destructive confirms present as an action sheet on touch and a
    // destructive alert on desktop. Native prompt/confirm are only the
    // degraded fallback when native.js failed to load.
    async function askText(title, value = '') {
      if (!window.unNative) { try { return prompt(title, value); } catch (_) { return null; } }
      const res = await unNative.alert({
        title,
        field: { value },
        buttons: [
          { label: 'Cancel', style: 'cancel' },
          { label: 'OK', style: 'default' },
        ],
      });
      if (!res || !res.button || res.button.style === 'cancel') return null;
      return res.value != null ? res.value : '';
    }

    async function askConfirm(title, okLabel = 'Delete') {
      if (!window.unNative) { try { return confirm(title); } catch (_) { return false; } }
      if (IS_TOUCH) {
        const chosen = await unNative.actionSheet({
          title,
          actions: [{ label: okLabel, destructive: true }],
          cancelLabel: 'Cancel',
        });
        return !!chosen;
      }
      const res = await unNative.alert({
        title,
        buttons: [
          { label: 'Cancel', style: 'cancel' },
          { label: okLabel, style: 'destructive' },
        ],
      });
      return !!(res && res.button && res.button.style === 'destructive');
    }

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // Owner-inclusive people count with singular/plural wording.
    function memberLabel(total) {
      return total + ' member' + (total === 1 ? '' : 's');
    }

    // --- theme (light / dark / system) ----------------------------------------
    const THEME_KEY = 'todo:theme';
    function themePref() {
      const v = localStorage.getItem(THEME_KEY);
      return v === 'light' || v === 'dark' ? v : 'system';
    }
    function applyTheme() {
      const pref = themePref();
      const dark = pref === 'dark' ||
        (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.toggle('dark', dark);
    }
    function themeLabel() {
      const pref = themePref();
      return pref === 'light' ? '☀️ Light' : pref === 'dark' ? '🌙 Dark' : '🌓 System';
    }
    function cycleTheme() {
      const order = ['system', 'light', 'dark'];
      const next = order[(order.indexOf(themePref()) + 1) % 3];
      if (next === 'system') localStorage.removeItem(THEME_KEY);
      else localStorage.setItem(THEME_KEY, next);
      applyTheme();
      updateThemeLabels();
    }
    function updateThemeLabels() {
      document.querySelectorAll('[data-theme-label]').forEach(b => {
        b.textContent = 'Theme: ' + themeLabel();
      });
      const homeBtn = document.getElementById('home-theme');
      if (homeBtn) homeBtn.textContent = themeLabel();
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (themePref() === 'system') applyTheme();
    });

    // --- show/hide completed preference (per user, localStorage) -------------
    const SHOW_COMPLETED_KEY = 'todo:showCompleted';
    function showCompleted() {
      return localStorage.getItem(SHOW_COMPLETED_KEY) !== 'false'; // default: shown
    }
    function setShowCompleted(v) {
      localStorage.setItem(SHOW_COMPLETED_KEY, v ? 'true' : 'false');
      // The global switch resets any per-category overrides so flipping it
      // always visibly applies everywhere.
      for (const k of Object.keys(catDoneOverrides)) delete catDoneOverrides[k];
      // Fully-completed categories default to collapsed, so "Show all done"
      // gives them an explicit override — otherwise they'd stay shut.
      if (v && current) {
        for (const c of current.categories) {
          if (isCatFullyDone(c.id)) catDoneOverrides[c.id] = true;
        }
      }
      if (current) repaintAllCategories();
    }

    // A category with at least one item and nothing left unchecked.
    function isCatFullyDone(catId) {
      if (!current) return false;
      let open = 0, done = 0;
      for (const i of current.items) {
        if (i.category_id !== catId) continue;
        if (i.checked) done++; else open++;
      }
      return !open && done > 0;
    }

    // Per-category visibility of completed items (session-only override of the
    // global switch), toggled from the divider between active and done items
    // (or, for fully-completed categories, from the header row).
    const catDoneOverrides = {};

    // The header chevron collapses/expands only the category's completed
    // items — unchecked items always stay visible. It drives the same
    // per-category done-visibility state as the "N done" toggles, so all
    // affordances stay in sync.
    function catShowDone(catId) {
      if (catDoneOverrides[catId] !== undefined) return catDoneOverrides[catId];
      if (isCatFullyDone(catId)) return false; // finished categories collapse by default
      return showCompleted();
    }
    function toggleCatDone(catId) {
      // While a search is active, done-visibility is forced by the filter;
      // toggling would silently mutate the collapse state behind the search.
      if (searchActive()) return;
      catDoneOverrides[catId] = !catShowDone(catId);
      repaintCategory(catId);
    }

    // Categories whose "Add an item…" input is currently revealed by the
    // header + button.
    const openAdders = new Set();

    // --- search (list view) ---------------------------------------------------
    // Live client-side filter over the open list — all items are already in
    // `current`, so each keystroke just re-renders #cats from memory.
    // Whitespace-only input counts as inactive.
    let searchQuery = '';
    const searchActive = () => !!searchQuery.trim();
    const searchQ = () => searchQuery.trim().toLowerCase();

    // The mobile keyboard's check/done key dismisses the keyboard (a blur)
    // without submitting. On touch devices, accept whatever was typed when
    // the field blurs with content. Enter-submits clear the field *before*
    // awaiting the API call, so an Enter-then-blur sequence can't double-add.
    function commitOnBlur(ev) {
      if (!IS_TOUCH) return;
      const input = ev.target;
      if (!input.value.trim() || !input.form) return;
      if (input.form.requestSubmit) input.form.requestSubmit();
      else input.form.dispatchEvent(new Event('submit', { cancelable: true }));
    }

    function toggleAdder(catId) {
      const opening = !openAdders.has(catId);
      if (openAdders.has(catId)) openAdders.delete(catId);
      else openAdders.add(catId);
      // Opening the adder on a collapsed category auto-expands its done items.
      if (opening && !catShowDone(catId)) catDoneOverrides[catId] = true;
      repaintCategory(catId);
      if (openAdders.has(catId)) {
        const input = document.querySelector('#cat-' + catId + ' input[name=text]');
        if (input) input.focus();
      }
    }

    // --- live updates (SSE) ----------------------------------------------------
    // While a list is open, subscribe to its event stream; any change made by
    // another client triggers a silent refetch. EventSource retries transient
    // drops itself (server sends retry: 3000); if the browser gives up on a
    // fatal error we reopen manually after the same delay.
    let es = null, esListId = null, esRetryTimer = null, liveRefreshTimer = null;

    function connectEvents(listId) {
      if (es && esListId === listId) return;
      disconnectEvents();
      esListId = listId;
      openStream();
    }

    function openStream() {
      if (!esListId) return;
      es = new EventSource('/api/lists/' + esListId + '/events?token=' +
                           encodeURIComponent(token) + '&clientId=' + clientId);
      es.onmessage = ev => {
        let data;
        try { data = JSON.parse(ev.data); } catch (_) { return; }
        if (data.sourceClient && data.sourceClient === clientId) return; // our own edit
        if (data.type === 'list-deleted') {
          toast('This list was deleted');
          location.hash = '#/';
          return;
        }
        // Coalesce bursts (imports, reorders) into a single refetch.
        clearTimeout(liveRefreshTimer);
        liveRefreshTimer = setTimeout(refreshList, 150);
      };
      es.onerror = () => {
        if (es && es.readyState === EventSource.CLOSED) {
          es = null;
          clearTimeout(esRetryTimer);
          esRetryTimer = setTimeout(openStream, 3000);
        }
      };
    }

    function disconnectEvents() {
      clearTimeout(esRetryTimer);
      clearTimeout(liveRefreshTimer);
      if (es) { es.close(); es = null; }
      esListId = null;
    }

    // --- routing --------------------------------------------------------------
    let current = null; // current list detail payload (List View) or null (Home)

    // Which screen is on-screen — drives the push/pop direction of the screen
    // transition. Only real Home ↔ List navigations animate; the initial load
    // and all in-place repaints render instantly.
    let lastScreen = null; // 'home' | 'list' | null (nothing rendered yet)

    // Real screen navigations go through the kit's View Transition wrapper
    // (push/pop slide; instant cut where unsupported). Repaints pass 'none'.
    function renderScreen(fn, type) {
      if (window.unNative) unNative.transition(fn, { type });
      else fn();
    }

    function route() {
      const m = location.hash.match(/^#\/list\/(\d+)$/);
      if (m) loadList(m[1]);
      else loadHome();
    }
    window.addEventListener('hashchange', route);

    // --- Home / My Lists -------------------------------------------------------
    async function loadHome() {
      current = null;
      disconnectEvents();
      const app = document.getElementById('app');
      // Transitioned navigations fetch first and render inside the animation;
      // the "Loading…" stub only shows on a direct/initial load.
      const type = lastScreen === 'list' ? 'pop' : 'none';
      if (type === 'none') app.innerHTML = '<p class="text-sm py-8 text-center" style="color: var(--label2)">Loading…</p>';
      let lists;
      try {
        ({ lists } = await api('/api/lists'));
        lists = await maybeImportLandingList(lists);
        cacheSet('todo:cache:home', lists);
      } catch (e) {
        // Offline: fall back to the last good copy instead of an error screen.
        const cached = e.network ? cacheGet('todo:cache:home') : null;
        if (cached) {
          if (current) return;
          renderScreen(() => renderHome(cached), type);
          lastScreen = 'home';
          return;
        }
        app.innerHTML = '<p class="text-red-500 text-sm py-8 text-center">' + esc(e.message) + '</p>';
        lastScreen = 'home';
        return;
      }
      if (current) return; // navigated into a list mid-fetch
      renderScreen(() => renderHome(lists), type);
      lastScreen = 'home';
    }

    // Best-effort landing-page hand-off: the public landing page stashes its
    // demo list under this key when the visitor taps "Create your account".
    // If this browser shares storage with the platform iframe, a brand-new
    // account's first Home load turns it into their first real list.
    async function maybeImportLandingList(lists) {
      const raw = localStorage.getItem('todo:landing-list');
      if (!raw || lists.length) return lists;
      let payload = null;
      try { payload = JSON.parse(raw); } catch (_) {}
      if (!payload || !Array.isArray(payload.categories) || !payload.categories.length) {
        localStorage.removeItem('todo:landing-list');
        return lists;
      }
      try {
        await api('/api/lists/import', {
          method: 'POST',
          body: JSON.stringify({ name: payload.name || 'Welcome', categories: payload.categories }),
        });
        localStorage.removeItem('todo:landing-list');
        return (await api('/api/lists')).lists;
      } catch (_) { return lists; } // keep the key; retried on a later load
    }

    function homeBadge(l) {
      if (!l.is_owner) return '<span class="shrink-0 text-[11px] uppercase tracking-wide px-1.5 py-0.5 rounded" style="color: var(--label2); background: var(--fill)">Shared</span>';
      if (Number(l.member_count) === 0) {
        return '<span title="Private — only you can see this list" class="shrink-0 inline-flex items-center gap-1 text-[11px] uppercase tracking-wide px-1.5 py-0.5 rounded" style="color: var(--label2); background: var(--fill)">' + lockSvg(10) + 'Private</span>';
      }
      return '<span class="shrink-0 text-[11px] uppercase tracking-wide tinted px-1.5 py-0.5 rounded" style="background: var(--fill)">Owner</span>';
    }

    // Recent shared-list activity by someone else — the passive re-engagement
    // hint ("@sam checked "Dish soap"") under the counts line.
    function activityLine(l) {
      const a = l.activity;
      if (!a || !a.actor) return '';
      const t = a.text.length > 44 ? a.text.slice(0, 43) + '…' : a.text;
      return `<div class="text-[13px] mt-0.5 truncate tinted">@${esc(a.actor)} ${a.verb === 'added' ? 'added' : 'checked'} “${esc(t)}”</div>`;
    }

    function renderHome(lists) {
      const app = document.getElementById('app');
      app.innerHTML = `
        <header id="home-bar" class="un-navbar un-safe-top">
          <!-- w-full matters: .un-navbar is itself a flex container, so
               without it this max-w wrapper shrinks to content width. -->
          <div class="w-full max-w-2xl mx-auto h-12 flex items-center justify-between gap-2 px-4 relative">
            <span class="un-navbar-title absolute left-1/2 -translate-x-1/2">My Lists</span>
            <button onclick="cycleTheme()" id="home-theme" title="Toggle theme (system / light / dark)"
                    class="tinted text-[15px] py-2 pr-2">${themeLabel()}</button>
            <div class="flex items-center gap-3">
              <button onclick="openImport('new')" class="tinted text-[15px] py-2 px-1">Import</button>
              <button onclick="newList()" title="New list" aria-label="New list" class="tinted text-[26px] font-light leading-none pl-1 py-1">+</button>
            </div>
          </div>
        </header>
        <div style="height: calc(3rem + env(safe-area-inset-top))"></div>
        <h1 id="home-large-title" class="un-navbar-large pt-2 pb-4">My Lists</h1>
        ${lists.length ? '<div class="un-group">' + lists.map(l => `
          <a href="#/list/${l.id}" class="un-group-row un-pressable block px-4 py-3 hover:bg-[var(--fill)]">
            <div class="flex items-center gap-3">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                  <span class="text-[16px] truncate">${esc(l.name)}</span>
                  ${homeBadge(l)}
                </div>
                <div class="text-[13px] mt-0.5" style="color: var(--label2)">
                  ${l.open_count} open · ${l.done_count} done
                  ${!l.is_owner ? ' · by @' + esc(l.owner_username) : (Number(l.member_count) ? ' · ' + memberLabel(Number(l.member_count) + 1) : '')}
                </div>
                ${activityLine(l)}
              </div>
              <span class="text-[20px] leading-none font-semibold shrink-0" style="color: var(--label3)">›</span>
            </div>
          </a>`).join('') + '</div>'
        : `<div class="text-center py-16" style="color: var(--label2)">
             <p class="mb-3">No lists yet.</p>
             <button onclick="newList()" class="tinted text-[15px] font-medium">Create your first list</button>
           </div>`}
      `;
      wireNative();
    }

    // Silent refetch for pull-to-refresh — no "Loading…" wipe.
    async function refreshHome() {
      try {
        const { lists } = await api('/api/lists');
        cacheSet('todo:cache:home', lists);
        if (current) return; // navigated into a list mid-fetch
        renderHome(lists);
      } catch (e) {
        if (!e.network) toast(e.message);
      }
    }

    async function newList() {
      const name = await askText('List name:');
      if (!name || !name.trim()) return;
      try {
        const { list } = await api('/api/lists', { method: 'POST', body: JSON.stringify({ name: name.trim() }) });
        location.hash = '#/list/' + list.id;
      } catch (e) { toast(e.message); }
    }

    // --- List View --------------------------------------------------------------
    async function loadList(id) {
      searchQuery = ''; // a freshly opened list always starts unfiltered
      const app = document.getElementById('app');
      const type = lastScreen === 'home' ? 'push' : 'none';
      if (type === 'none') app.innerHTML = '<p class="text-sm py-8 text-center" style="color: var(--label2)">Loading…</p>';
      try {
        current = await api('/api/lists/' + id);
        cacheList();
      } catch (e) {
        // Offline: render the saved copy; SSE reconnects on its own later.
        const cached = e.network ? cacheGet('todo:cache:list:' + id) : null;
        if (cached) {
          current = cached;
        } else {
          disconnectEvents();
          app.innerHTML = `<p class="text-red-500 text-sm py-8 text-center">${esc(e.message)}</p>
            <p class="text-center"><a href="#/" class="tinted text-sm">‹ Back to My Lists</a></p>`;
          lastScreen = 'list';
          return;
        }
      }
      renderScreen(() => renderList(current), type);
      lastScreen = 'list';
      connectEvents(current.list.id);
    }

    // Silent refetch + single repaint — no "Loading…" wipe, so no flash.
    // Used for both error recovery and SSE-pushed remote changes, so it
    // preserves any in-progress typing in an add-item / new-category field
    // across the repaint.
    async function refreshList() {
      if (!current) return;
      const id = current.list.id;
      try {
        const data = await api('/api/lists/' + id);
        if (!current || current.list.id !== id) return; // navigated away mid-fetch
        current = data;
        cacheList();
        const ae = document.activeElement;
        let focus = null;
        if (ae && ae.tagName === 'INPUT') {
          if (ae.id === 'search-input') {
            focus = { sel: '#search-input', value: ae.value, pos: ae.selectionStart };
          } else if (ae.name === 'text' && ae.closest('#quick-add-form')) {
            focus = { sel: '#quick-add-form input[name=text]', value: ae.value, pos: ae.selectionStart };
          } else if (ae.name === 'text' && ae.closest('.cat-section')) {
            focus = { sel: '#cat-' + ae.closest('.cat-section').dataset.cat + ' input[name=text]', value: ae.value, pos: ae.selectionStart };
          } else if (ae.name === 'name') {
            focus = { sel: 'input[name=name]', value: ae.value, pos: ae.selectionStart };
          }
        }
        renderList(current);
        if (focus) {
          const input = document.querySelector(focus.sel);
          if (input) {
            input.value = focus.value;
            input.focus({ preventScroll: true });
            try { input.setSelectionRange(focus.pos, focus.pos); } catch (_) {}
          }
        }
      } catch (e) { if (!e.network) toast(e.message); }
    }

    // Items of one section (unchecked or checked) of a category, in order.
    function sectionItems(catId, checked) {
      return current.items
        .filter(i => i.category_id === catId && !!i.checked === checked)
        .sort((a, b) => (a.sort_order - b.sort_order) || (a.id - b.id));
    }

    // Display order is the manual drag order (current.categories) — static —
    // except the default (uncategorized) bucket, which is always pinned first.
    function displayCategories() {
      return [...current.categories].sort((a, b) =>
        ((b.is_default ? 1 : 0) - (a.is_default ? 1 : 0)) ||
        (a.sort_order - b.sort_order) || (a.id - b.id));
    }

    // #cats body: all categories, or a single "no matches" note when an
    // active search filters every one of them out.
    function renderCats() {
      const html = displayCategories().map(c => renderCategory(c)).join('');
      if (!html && searchActive()) {
        return `<p class="text-sm py-8 text-center" style="color: var(--label2)">No items match "${esc(searchQuery.trim())}"</p>`;
      }
      return html;
    }

    // Menu items shared by the desktop dropdown and the touch bottom sheet.
    function drawerItemsHtml(isOwner, sheet) {
      const c = sheet ? 'sheet-row un-pressable' : DRAWER_ITEM;
      return `
        <label class="${c} cursor-pointer">
          <span>Show completed</span>
          <input type="checkbox" class="un-switch" ${showCompleted() ? 'checked' : ''} onchange="setShowCompleted(this.checked)">
        </label>
        <button onclick="closeDrawer(); openExport()" class="${c}">Export markdown</button>
        <button onclick="closeDrawer(); openImport('merge')" class="${c}">Import markdown</button>
        <button onclick="cycleTheme()" data-theme-label class="${c}">Theme: ${themeLabel()}</button>
        ${isOwner ? `<button onclick="closeDrawer(); deleteList()" class="${c}" style="color: var(--danger)">Delete list</button>` : ''}
      `;
    }

    function renderList(d) {
      const isOwner = d.role === 'owner';
      const app = document.getElementById('app');
      app.innerHTML = `
        <header id="list-bar" class="un-navbar un-safe-top">
          <div class="w-full max-w-2xl mx-auto h-12 flex items-center justify-between gap-1 px-2 relative">
            <a href="#/" title="Back to My Lists" class="un-navbar-back flex items-center text-[17px] pl-1.5 pr-2 py-1.5 shrink-0">Lists</a>
            <h1 id="list-title" class="un-navbar-title absolute left-1/2 -translate-x-1/2 max-w-[44%] truncate text-center${isOwner ? ' cursor-pointer' : ''}"
                ${isOwner ? 'onclick="renameList()" title="Rename list"' : ''}>${esc(d.list.name)}</h1>
            <div class="flex items-center shrink-0">
              ${d.members.length === 0 ? `
              <button onclick="openMembers()" title="Private — only you can see this list. Tap to invite." aria-label="Private — only you can see this list. Tap to invite."
                      class="tinted px-2.5 py-2.5">${lockSvg(16)}</button>` : `
              <button onclick="openMembers()" title="Members" class="tinted text-[15px] px-2 py-2">👥 ${1 + d.members.length}</button>`}
              <div id="drawer-wrap" class="relative shrink-0">
                <button onclick="toggleDrawer(event)" title="Menu" aria-label="Menu" class="tinted px-2.5 py-2.5">
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="block"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
                </button>
                <div id="drawer" class="hidden absolute right-0 top-full mt-1 w-64 rounded-xl surface shadow-2xl z-30 py-1 overflow-hidden" style="border: 1px solid var(--separator)">
                  ${drawerItemsHtml(isOwner, false)}
                </div>
              </div>
            </div>
          </div>
        </header>
        <div style="height: calc(3rem + env(safe-area-inset-top))"></div>

        <div class="relative my-3">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" style="color: var(--label2)"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search-input" type="text" autocomplete="off" enterkeyhint="search" placeholder="Search items…"
                 value="${esc(searchQuery)}"
                 oninput="onSearchInput(this.value)"
                 onkeydown="if (event.key === 'Escape') clearSearch()"
                 class="w-full rounded-[10px] pl-9 pr-9 py-2 text-[15px] focus:outline-none"
                 style="background: var(--fill); color: var(--label)">
          <button id="search-clear" onclick="clearSearch()" title="Clear search" aria-label="Clear search"
                  class="${searchQuery ? '' : 'hidden '}absolute right-2 top-1/2 -translate-y-1/2 text-sm px-1.5 py-0.5 leading-none" style="color: var(--label2)">✕</button>
        </div>

        <form id="quick-add-form" onsubmit="return quickAdd(event)"
              class="${searchActive() ? 'hidden ' : ''}un-group flex items-center gap-2.5 px-4 py-2.5 mb-5">
          <span class="tinted text-[20px] leading-none select-none font-light">+</span>
          <input name="text" placeholder="Add an item…" autocomplete="off" enterkeyhint="done"
                 onblur="commitOnBlur(event)"
                 class="flex-1 bg-transparent text-[16px] focus:outline-none py-0.5" style="color: var(--label)">
        </form>

        <div id="cats">
          ${renderCats()}
        </div>

        <form id="new-cat-form" onsubmit="return addCategory(event)" class="${searchActive() ? 'hidden ' : ''}mt-7 flex items-center gap-2 px-4">
          <span class="tinted text-[18px] leading-none select-none">+</span>
          <input name="name" placeholder="New category…" autocomplete="off" enterkeyhint="done"
                 onblur="commitOnBlur(event)"
                 class="flex-1 bg-transparent text-[15px] focus:outline-none py-1.5" style="color: var(--label)">
        </form>
      `;
      wireNative();
    }

    // --- ☰ menu: anchored dropdown on desktop, kit bottom sheet on touch --------
    function toggleDrawer(ev) {
      ev.stopPropagation();
      if (IS_TOUCH && window.unNative) return openMenuSheet();
      const d = document.getElementById('drawer');
      if (d) d.classList.toggle('hidden');
    }
    function closeDrawer() {
      const d = document.getElementById('drawer');
      if (d) d.classList.add('hidden');
      closeMenuSheet();
    }
    document.addEventListener('click', e => {
      const d = document.getElementById('drawer');
      if (d && !d.classList.contains('hidden') && !e.target.closest('#drawer-wrap')) closeDrawer();
    });

    let menuSheetHandle = null;
    function openMenuSheet() {
      const el = document.createElement('div');
      el.className = 'pb-1';
      el.innerHTML = drawerItemsHtml(!!current && current.role === 'owner', true);
      menuSheetHandle = unNative.presentSheet({
        contentEl: el,
        onDismiss: () => { menuSheetHandle = null; },
      });
    }
    function closeMenuSheet() {
      if (menuSheetHandle) menuSheetHandle.dismiss();
    }

    function renderCategory(c) {
      // Active search: a matching category name shows all its items; otherwise
      // both sections filter to matching item text, and a category with no
      // matches disappears. Matching done items always render (bypassing
      // catShowDone) without touching catDoneOverrides, so clearing the search
      // restores the collapse state exactly.
      const searching = searchActive();
      const q = searchQ();
      // The default category is the invisible "uncategorized" bucket: no
      // header (no name, drag handle, rename or delete), pinned first, and
      // rendered only when it has items. Its name never matches a search.
      const isBucket = !!c.is_default;
      const catMatches = searching && !isBucket && c.name.toLowerCase().includes(q);
      let unchecked = sectionItems(c.id, false);
      let checked = sectionItems(c.id, true);
      if (searching && !catMatches) {
        unchecked = unchecked.filter(i => i.text.toLowerCase().includes(q));
        checked = checked.filter(i => i.text.toLowerCase().includes(q));
        if (!unchecked.length && !checked.length) return '';
      }
      const showDone = searching ? checked.length > 0 : catShowDone(c.id);
      const empty = !unchecked.length && !checked.length;
      if (isBucket && empty) return ''; // an empty bucket renders nothing
      const fullyDone = !unchecked.length && checked.length > 0;
      // Top margin lives on the section (not a space-y on #cats) so a
      // repaintCategory outerHTML swap keeps it correct when the category's
      // completion state changes in place.
      const idx = displayCategories().findIndex(x => x.id === c.id);
      const topGap = idx > 0 ? (fullyDone ? ' mt-4' : ' mt-6') : '';
      return `
        <section id="cat-${c.id}" data-cat="${c.id}" class="cat-section${topGap}">
          ${isBucket ? '' : `
          <div class="cat-head flex items-center gap-1.5 px-2 py-1 mb-1.5">
            ${searching ? '' : `
            <span class="drag-handle cat-drag select-none px-0.5 text-sm" style="color: var(--label3)" title="Drag to reorder categories">⠿</span>
            <button onclick="toggleCatDone(${c.id})" title="${showDone ? 'Hide' : 'Show'} completed items in this category"
                    class="select-none text-[10px] px-0.5 leading-none w-3 shrink-0" style="color: var(--label2)">
              ${showDone ? '▼' : '▶'}
            </button>`}
            <h2 class="un-group-header flex-1 truncate cursor-pointer"
                onclick="catTitleTap(event, ${c.id})" title="${IS_TOUCH ? (showDone ? 'Hide' : 'Show') + ' completed items' : 'Rename category'}">${esc(c.name)}</h2>
            ${fullyDone && !searching ? `
            <button onclick="toggleCatDone(${c.id})" title="${showDone ? 'Hide' : 'Show'} completed in this category"
                    class="text-[13px] select-none px-1" style="color: var(--label2)">
              ${checked.length} done ${showDone ? '▾' : '▸'}
            </button>` : ''}
            ${searching ? '' : `
            <button onclick="toggleAdder(${c.id})" title="Add an item"
                    class="tinted text-[20px] px-1.5 leading-none font-light">+</button>`}
            <button onclick="deleteCategory(${c.id})" title="Delete category"
                    class="cat-del hover:!text-red-500 text-sm px-1.5 leading-none" style="color: var(--label3)">✕</button>
          </div>`}
          <div class="un-group">
            ${openAdders.has(c.id) && !searching ? `
            <form onsubmit="return addItem(event, ${c.id})" class="un-group-row flex items-center gap-2.5 px-4 py-2">
              <span class="tinted text-[18px] leading-none select-none">+</span>
              <input name="text" placeholder="Add an item…" autocomplete="off" enterkeyhint="done"
                     onkeydown="if (event.key === 'Escape') toggleAdder(${c.id})" onblur="commitOnBlur(event)"
                     class="flex-1 bg-transparent text-[15px] focus:outline-none py-1" style="color: var(--label)">
            </form>` : ''}
            <div class="active-items${unchecked.length || empty ? '' : ' hidden'}">
              ${unchecked.map(renderItem).join('')}
              ${empty ? '<p class="empty-note un-group-row text-[13px] px-4 py-2.5" style="color: var(--label2)">No items yet</p>' : ''}
            </div>
            ${checked.length ? `
            ${(fullyDone && !isBucket) || searching ? '' : `
            <button onclick="toggleCatDone(${c.id})" title="${showDone ? 'Hide' : 'Show'} completed in this category"
                    class="un-group-row w-full flex items-center justify-between px-4 py-2 text-[13px]" style="color: var(--label2)">
              <span>${checked.length} done</span><span>${showDone ? '▾' : '▸'}</span>
            </button>`}
            ${showDone ? `<div class="done-items">${checked.map(renderItem).join('')}</div>` : ''}` : ''}
          </div>
        </section>`;
    }

    // Tapping anywhere on the row toggles the item; interactive children
    // (checkbox, edit/delete buttons, drag handle) keep their own behavior.
    // The kit's swipe recognizer suppresses the click that trails a swipe.
    function rowTap(ev, id) {
      if (ev.target.closest('button, input, .drag-handle')) return;
      const item = current.items.find(i => i.id === id);
      if (item) toggleItem(id, !item.checked);
    }

    // On touch devices renaming goes through the swipe actions; a tap on the
    // title toggles the done-items collapse instead.
    function catTitleTap(ev, id) {
      if (IS_TOUCH) { toggleCatDone(id); return; }
      renameCategory(id);
    }

    function renderItem(i) {
      return `
        <div class="un-group-row un-pressable item-row group flex items-center gap-2.5 px-4 py-2.5 cursor-pointer"
             data-item="${i.id}" data-cat="${i.category_id}" data-checked="${i.checked ? 1 : 0}"
             onclick="rowTap(event, ${i.id})">
          ${searchActive() ? '' : `<span class="drag-handle item-drag select-none text-sm shrink-0" style="color: var(--label3)" title="Drag to reorder">⠿</span>`}
          <input type="checkbox" ${i.checked ? 'checked' : ''} onchange="toggleItem(${i.id}, this.checked)"
                 class="todo-check">
          <span class="flex-1 text-[16px] break-words ${i.checked ? 'line-through' : ''}"${i.checked ? ' style="color: var(--label2)"' : ''}>${esc(i.text)}</span>
          ${i.last_checked_by ? `<span class="shrink-0 text-[11px]" style="color: var(--label3)" title="Last ${i.checked ? 'checked' : 'unchecked'} by @${esc(i.last_checked_by)}">${i.checked ? '✓' : '↺'} @${esc(i.last_checked_by)}</span>` : ''}
          <button onclick="editItem(${i.id})" title="Edit"
                  class="hover-action opacity-0 group-hover:opacity-100 text-xs px-1" style="color: var(--label2)">✎</button>
          <button onclick="deleteItem(${i.id})" title="Delete"
                  class="hover-action opacity-0 group-hover:opacity-100 hover:!text-red-500 text-xs px-1" style="color: var(--label2)">✕</button>
        </div>`;
    }

    // Targeted repaints — swap just the affected category section so the rest
    // of the screen (and input focus elsewhere) is untouched.
    function repaintCategory(catId) {
      // Mid-search an edit can hide the category entirely or leave zero
      // matches overall (the "No items match" note), so repaint everything.
      if (searchActive()) return repaintAllCategories();
      const c = current.categories.find(x => x.id === catId);
      const el = document.getElementById('cat-' + catId);
      if (!c || !el) return;
      el.outerHTML = renderCategory(c);
      wireNative();
    }
    function repaintAllCategories() {
      const el = document.getElementById('cats');
      if (el) { el.innerHTML = renderCats(); wireNative(); }
    }

    // --- usernode-native attach pass ---------------------------------------------
    // The app re-renders by swapping innerHTML/outerHTML, so kit attachments
    // die with the old nodes. This runs after every render/repaint: swipe
    // actions on new rows/headers (flagged so surviving rows aren't re-wired;
    // per-row handles are GC'd with their nodes), then the two reorder
    // instances and the nav bar, which are detached and re-attached fresh.
    let navBarHandle = null, reorderItemsHandle = null, reorderCatsHandle = null;

    function wireNative() {
      if (!window.unNative) return;

      // Nav bar: hairline on scroll + (on Home) large-title collapse.
      if (navBarHandle) { navBarHandle.detach(); navBarHandle = null; }
      const bar = document.getElementById('home-bar') || document.getElementById('list-bar');
      if (bar) {
        const largeTitleEl = document.getElementById('home-large-title');
        navBarHandle = unNative.attachNavBar(bar, largeTitleEl ? { largeTitleEl } : {});
      }

      // Swipe actions FIRST (reorder composes with the .un-swipe wrappers).
      document.querySelectorAll('#cats .item-row:not([data-wired])').forEach(row => {
        row.dataset.wired = '1';
        const id = +row.dataset.item;
        const checked = row.dataset.checked === '1';
        unNative.attachSwipeActions(row, {
          actions: [
            { label: checked ? 'Undo' : 'Complete', color: 'var(--un-accent)',
              handler: () => toggleItem(id, !checked) },
            { label: 'Rename', handler: () => editItem(id) },
            // Destructive last action: full swipe / hard flick commits, the
            // kit collapses and removes the row, then deleteItem() runs the
            // API call (and repaints the row back in if the delete failed).
            { label: 'Delete', destructive: true, handler: () => deleteItem(id) },
          ],
        });
      });
      document.querySelectorAll('#cats .cat-head:not([data-wired])').forEach(head => {
        head.dataset.wired = '1';
        const sec = head.closest('.cat-section');
        if (!sec) return;
        const id = +sec.dataset.cat;
        unNative.attachSwipeActions(head, {
          actions: [
            { label: 'Rename', handler: () => renameCategory(id) },
            // Danger-colored but NOT destructive:true — a full swipe must not
            // delete a whole category; the handler keeps the confirm gate.
            { label: 'Delete', color: 'var(--un-action-danger)', handler: () => deleteCategory(id) },
          ],
        });
      });

      // Reorder: one instance spanning every item row across all category
      // cards (indices span the matched list, so cross-category moves work)
      // and one for the category sections. Disabled while a search filters
      // the view — visible order no longer matches stored order.
      if (reorderItemsHandle) { reorderItemsHandle.detach(); reorderItemsHandle = null; }
      if (reorderCatsHandle) { reorderCatsHandle.detach(); reorderCatsHandle = null; }
      const cats = document.getElementById('cats');
      if (cats && !searchActive()) {
        reorderItemsHandle = unNative.attachReorder(cats, {
          // Rows are wrapped in .un-swipe by attachSwipeActions; the
          // .empty-note placeholder makes empty categories valid drop
          // targets (moving the placeholder itself is undone below).
          itemSelector: '.un-swipe:has(.item-row), .item-row.un-swipe, .empty-note',
          handle: '.item-drag',
          onReorder: (from, to, el) => onItemReorder(el),
        });
        reorderCatsHandle = unNative.attachReorder(cats, {
          itemSelector: '.cat-section',
          handle: '.cat-drag',
          onReorder: (from, to, el) => onCategoryReorder(el),
        });
      }
    }

    // The kit has already moved the element in the DOM; derive the new order
    // from where it landed, update local state, persist, and repaint the
    // affected sections to normalize the markup.
    function onItemReorder(el) {
      if (!current) return;
      if (el.classList.contains('empty-note')) { repaintAllCategories(); return; }
      const row = el.classList.contains('item-row') ? el : el.querySelector('.item-row');
      const sec = el.closest('.cat-section');
      if (!row || !sec) { refreshList(); return; }
      const id = +row.dataset.item;
      const item = current.items.find(i => i.id === id);
      if (!item) { refreshList(); return; }
      const checked = !!item.checked;
      const toCat = +sec.dataset.cat;
      const fromCat = item.category_id;
      // Items only reorder within their own checked/unchecked section; an
      // empty category accepts either state. Anything else is undone.
      const otherRows = Array.from(sec.querySelectorAll('.item-row')).filter(r => +r.dataset.item !== id);
      const landedInDone = !!el.closest('.done-items');
      if (otherRows.length && landedInDone !== checked) { repaintAllCategories(); return; }
      // New order = visible DOM order of this section's matching rows.
      const ids = Array.from(sec.querySelectorAll('.item-row'))
        .filter(r => (r.dataset.checked === '1') === checked)
        .map(r => +r.dataset.item);
      item.category_id = toCat;
      ids.forEach((iid, idx) => {
        const it = current.items.find(x => x.id === iid);
        if (it) it.sort_order = idx + 1;
      });
      (fromCat === toCat ? [toCat] : [fromCat, toCat]).forEach(repaintCategory);
      persistItemOrder(id, fromCat, toCat, ids);
    }

    async function persistItemOrder(id, fromCat, toCat, ids) {
      try {
        if (fromCat !== toCat) {
          await api('/api/items/' + id, { method: 'PATCH', body: JSON.stringify({ category_id: toCat }) });
        }
        await api('/api/categories/' + toCat + '/reorder-items', { method: 'POST', body: JSON.stringify({ itemIds: ids }) });
      } catch (e) { toast(e.message); refreshList(); }
    }

    function onCategoryReorder() {
      if (!current) return;
      const ids = Array.from(document.querySelectorAll('#cats .cat-section')).map(s => +s.dataset.cat);
      current.categories.sort((a, b) => ids.indexOf(a.id) - ids.indexOf(b.id));
      current.categories.forEach((c, idx) => { c.sort_order = idx; });
      repaintAllCategories();
      api('/api/lists/' + current.list.id + '/reorder-categories', { method: 'POST', body: JSON.stringify({ categoryIds: ids }) })
        .catch(e => { toast(e.message); refreshList(); });
    }

    // --- search handlers -------------------------------------------------------
    // The input lives outside #cats, so these repaints never touch it and
    // focus survives typing naturally.
    function onSearchInput(v) {
      searchQuery = v;
      syncSearchChrome();
      repaintAllCategories();
    }
    function clearSearch() {
      if (!searchQuery) return;
      searchQuery = '';
      const input = document.getElementById('search-input');
      if (input) { input.value = ''; input.focus({ preventScroll: true }); }
      syncSearchChrome();
      repaintAllCategories();
    }
    // Bits outside #cats that depend on the query: the ✕ clear button and the
    // "New category…" form (hidden while filtering).
    function syncSearchChrome() {
      const btn = document.getElementById('search-clear');
      if (btn) btn.classList.toggle('hidden', !searchQuery);
      const form = document.getElementById('new-cat-form');
      if (form) form.classList.toggle('hidden', searchActive());
      const qa = document.getElementById('quick-add-form');
      if (qa) qa.classList.toggle('hidden', searchActive());
    }

    // --- list actions ------------------------------------------------------------
    async function renameList() {
      const name = await askText('Rename list:', current.list.name);
      if (!name || !name.trim() || name.trim() === current.list.name) return;
      try {
        await api('/api/lists/' + current.list.id, { method: 'PATCH', body: JSON.stringify({ name: name.trim() }) });
        current.list.name = name.trim();
        renderList(current);
      } catch (e) { toast(e.message); }
    }

    async function deleteList() {
      if (!await askConfirm('Delete "' + current.list.name + '" and all its items? This can\'t be undone.')) return;
      try {
        await api('/api/lists/' + current.list.id, { method: 'DELETE' });
        location.hash = '#/';
      } catch (e) { toast(e.message); }
    }

    // --- category actions ----------------------------------------------------------
    async function addCategory(ev) {
      ev.preventDefault();
      const input = ev.target.elements.name;
      const name = input.value.trim();
      if (!name) return false;
      input.value = ''; // before the await: a trailing keyboard-done blur finds it empty
      try {
        const { category } = await api('/api/lists/' + current.list.id + '/categories', { method: 'POST', body: JSON.stringify({ name }) });
        current.categories.push(category);
        // The form itself isn't re-rendered, so input focus (when it still
        // has it) survives on its own.
        repaintAllCategories();
      } catch (e) { toast(e.message); input.value = name; }
      return false;
    }

    async function renameCategory(id) {
      const cat = current.categories.find(c => c.id === id);
      const name = await askText('Rename category:', cat ? cat.name : '');
      if (!name || !name.trim()) return;
      try {
        await api('/api/categories/' + id, { method: 'PATCH', body: JSON.stringify({ name: name.trim() }) });
        cat.name = name.trim();
        repaintCategory(id);
      } catch (e) { toast(e.message); }
    }

    // Any category can be deleted (with its items) except the last one.
    async function deleteCategory(id) {
      if (current.categories.length <= 1) {
        return toast("Can't delete the only category — lists need at least one");
      }
      const cat = current.categories.find(c => c.id === id);
      const n = current.items.filter(i => i.category_id === id).length;
      const msg = 'Delete category "' + (cat ? cat.name : '') + '"' +
        (n ? ' and its ' + n + ' item' + (n > 1 ? 's' : '') : '') + '?';
      if (!await askConfirm(msg)) return;
      try {
        await api('/api/categories/' + id, { method: 'DELETE' });
        current.categories = current.categories.filter(c => c.id !== id);
        current.items = current.items.filter(i => i.category_id !== id);
        const el = document.getElementById('cat-' + id);
        if (el) el.remove();
        wireNative(); // re-index the reorder instances after the removal
      } catch (e) { toast(e.message); }
    }

    // --- item actions ---------------------------------------------------------------

    // Quick-add: the always-visible field above the list; items land in the
    // default (uncategorized) bucket. The form lives outside #cats, so the
    // full repaint below never disturbs its focus.
    async function quickAdd(ev) {
      ev.preventDefault();
      const input = ev.target.elements.text;
      const text = input.value.trim();
      if (!text) return false;
      input.value = ''; // before the await: a trailing keyboard-done blur finds it empty
      const tempId = tempSeq--;
      try {
        const data = await mutate({
          type: 'add', itemId: tempId, method: 'POST',
          path: '/api/lists/' + current.list.id + '/items', body: { text },
        });
        let item;
        if (data) {
          item = data.item;
          if (data.category && !current.categories.some(c => c.id === data.category.id)) {
            current.categories.unshift(data.category); // bucket created on demand server-side
          }
        } else {
          // Queued offline — a local bucket must exist to hold the item; the
          // replay's list-level POST puts it in the right place server-side.
          const bucket = current.categories.find(c => c.is_default) || current.categories[0];
          item = offlineNewItem(tempId, bucket.id, text);
        }
        current.items.push(item);
        cacheList();
        repaintAllCategories();
      } catch (e) { toast(e.message); input.value = text; }
      return false;
    }

    async function addItem(ev, categoryId) {
      ev.preventDefault();
      const input = ev.target.elements.text;
      const text = input.value.trim();
      if (!text) return false;
      input.value = ''; // before the await: a trailing keyboard-done blur finds it empty
      const wasFullyDone = isCatFullyDone(categoryId);
      const tempId = tempSeq--;
      try {
        const data = await mutate({
          type: 'add', itemId: tempId, method: 'POST',
          path: '/api/categories/' + categoryId + '/items', body: { text },
        });
        const item = data ? data.item : offlineNewItem(tempId, categoryId, text);
        current.items.push(item); // server gives it the smallest sort_order → top of the active list
        cacheList();
        if (wasFullyDone) {
          // The section was rendered compact (inline done toggle, tight
          // spacing) and is now active again — a surgical insert would leave
          // that stale, so repaint the whole section and restore focus.
          repaintCategory(categoryId);
          const fresh = document.querySelector('#cat-' + categoryId + ' input[name=text]');
          if (fresh) fresh.focus({ preventScroll: true });
        } else {
          // Insert just the new row; the form (and its focus) is untouched,
          // so the view stays perfectly still. wireNative picks up the new
          // row (it has no data-wired flag yet) without touching the form.
          const body = document.querySelector('#cat-' + categoryId + ' .active-items');
          if (body) {
            const ph = body.querySelector('.empty-note');
            if (ph) ph.remove();
            body.insertAdjacentHTML('afterbegin', renderItem(item));
            wireNative();
          }
        }
      } catch (e) { toast(e.message); input.value = text; }
      return false;
    }

    async function toggleItem(id, checked) {
      // Capture done-visibility before the mutation: checking the last open
      // item flips the category to fully done, which defaults to collapsed.
      const before = current.items.find(i => i.id === id);
      const wasShowingDone = before ? catShowDone(before.category_id) : false;
      try {
        const data = await mutate({
          type: 'toggle', itemId: id, method: 'PATCH',
          path: '/api/items/' + id, body: { checked },
        });
        let item;
        if (data) {
          item = data.item;
        } else {
          // Queued offline — mirror the server's move-to-section-bottom.
          item = current.items.find(i => i.id === id);
          if (!item) return;
          item.checked = checked;
          item.completed_at = checked ? new Date().toISOString() : null;
          item.last_checked_by = me || item.last_checked_by;
          item.sort_order = current.items
            .filter(i => i.category_id === item.category_id && !!i.checked === checked && i.id !== id)
            .reduce((m, i) => Math.max(m, i.sort_order), 0) + 1;
        }
        const idx = current.items.findIndex(i => i.id === id);
        if (idx !== -1) current.items[idx] = item;
        cacheList();
        // Keep a newly fully-done category expanded only if its done items
        // were already visible, so the rows the user is looking at don't
        // vanish mid-interaction. A category the user had collapsed stays
        // collapsed — checking its last item must not pop it open.
        if (checked && wasShowingDone && isCatFullyDone(item.category_id)) catDoneOverrides[item.category_id] = true;
        repaintCategory(item.category_id);
      } catch (e) { toast(e.message); refreshList(); }
    }

    async function editItem(id) {
      const item = current.items.find(i => i.id === id);
      const text = await askText('Edit item:', item ? item.text : '');
      if (!text || !text.trim()) return;
      try {
        const data = await mutate({
          type: 'edit', itemId: id, method: 'PATCH',
          path: '/api/items/' + id, body: { text: text.trim() },
        });
        const idx = current.items.findIndex(i => i.id === id);
        if (idx === -1) return;
        if (data) current.items[idx] = data.item;
        else current.items[idx] = { ...current.items[idx], text: text.trim() };
        cacheList();
        repaintCategory(current.items[idx].category_id);
      } catch (e) { toast(e.message); }
    }

    async function deleteItem(id) {
      const item = current.items.find(i => i.id === id);
      try {
        if (isTempId(id)) {
          // The item only exists in the offline queue — cancel its pending ops.
          saveQueue(loadQueue().filter(o => o.itemId !== id));
        } else {
          await mutate({ type: 'delete', itemId: id, method: 'DELETE', path: '/api/items/' + id });
        }
        current.items = current.items.filter(i => i.id !== id);
        cacheList();
      } catch (e) { toast(e.message); }
      // Repaint on failure too: a full-swipe delete already collapsed the row
      // out of the DOM (the kit removes it before calling this handler), so a
      // failed API delete must restore it.
      if (item) repaintCategory(item.category_id);
    }

    // --- markdown import / export ------------------------------------------------
    // Google Keep-ish format: title as `# **Name**`, categories as top-level
    // bullets, items as nested bullets. Active items come first; a `---`
    // divider precedes the completed block, where items are ~~struck~~ and
    // category names repeat (struck too when the category is fully done).

    function buildMarkdown() {
      const active = [], done = [];
      for (const c of current.categories) {
        const un = sectionItems(c.id, false);
        const ch = sectionItems(c.id, true);
        if (un.length || !ch.length) {
          active.push('* ' + c.name);
          un.forEach(i => active.push('  * ' + i.text));
        }
        if (ch.length) {
          done.push('* ' + (un.length ? c.name : '~~' + c.name + '~~'));
          ch.forEach(i => done.push('  * ~~' + i.text + '~~'));
        }
      }
      const lines = ['# **' + current.list.name + '**', '', ...active];
      if (done.length) lines.push('', '---', '', ...done);
      return lines.join('\n') + '\n';
    }

    function stripMd(s) {
      return s.replace(/\*\*/g, '').replace(/~~/g, '').trim();
    }

    function parseMarkdown(md) {
      let name = null;
      const categories = [];
      const byKey = new Map(); // duplicate category names (active vs done block) merge
      let cur = null;
      for (const raw of md.split(/\r?\n/)) {
        const line = raw.replace(/\s+$/, '');
        if (!line.trim() || /^-{3,}$/.test(line.trim())) continue;
        const h = line.match(/^#+\s+(.*)$/);
        if (h) { if (!name) name = stripMd(h[1]); continue; }
        const m = line.match(/^(\s*)[*+-]\s+(.*)$/);
        if (!m) continue;
        const indent = m[1].replace(/\t/g, '  ').length;
        let text = m[2].trim();
        let checked = false;
        const struck = text.match(/^~~(.*)~~$/s);
        if (struck) { checked = true; text = struck[1].trim(); }
        text = text.replace(/\*\*/g, '').trim();
        if (!text) continue;
        if (indent === 0) {
          const key = text.toLowerCase();
          cur = byKey.get(key);
          if (!cur) {
            cur = { name: text, items: [] };
            byKey.set(key, cur);
            categories.push(cur);
          }
        } else {
          if (!cur) {
            cur = { name: 'General', items: [] };
            byKey.set('general', cur);
            categories.push(cur);
          }
          cur.items.push({ text, checked });
        }
      }
      return { name, categories };
    }

    // Markdown import/export presents in the kit's centered modal (backdrop
    // tap and Escape dismiss; tall content scrolls inside the card).
    let mdModal = null;
    function openMd({ title, hint, text, readonly, actionsHtml }) {
      if (!window.unNative) { toast('Import/export needs the UI kit, which failed to load'); return; }
      if (mdModal) mdModal.dismiss();
      const el = document.createElement('div');
      el.className = 'p-5 flex flex-col gap-3 w-[min(32rem,92vw)] max-h-[80vh]';
      el.innerHTML = `
        <div class="flex items-center justify-between">
          <h2 class="font-semibold text-lg">${esc(title)}</h2>
          <button onclick="closeMd()" class="x-close text-xl leading-none px-1">&times;</button>
        </div>
        <p class="text-xs" style="color: var(--label2)">${esc(hint)}</p>
        <textarea id="md-text" rows="14" spellcheck="false"
                  class="w-full flex-1 rounded-lg p-3 text-xs font-mono focus:outline-none resize-none"
                  style="background: var(--fill); color: var(--label); border: 1px solid var(--separator)"></textarea>
        <div class="flex justify-end gap-2">${actionsHtml}</div>
      `;
      const ta = el.querySelector('#md-text');
      ta.value = text;
      ta.readOnly = !!readonly;
      ta.placeholder = readonly ? '' : '# **My List**\n\n* Category\n  * item\n  * ~~done item~~';
      mdModal = unNative.presentModal({
        contentEl: el,
        onDismiss: () => { mdModal = null; },
      });
      if (!readonly) setTimeout(() => ta.focus(), 0);
    }
    function closeMd() {
      if (mdModal) mdModal.dismiss();
    }

    function openExport() {
      openMd({
        title: 'Export markdown',
        hint: 'Copy this markdown or download it as a file.',
        text: buildMarkdown(),
        readonly: true,
        actionsHtml: `
          <button onclick="copyMd()" class="text-sm px-3 py-1.5 rounded-lg ${BTN_SOFT}">Copy</button>
          <button onclick="downloadMd()" class="text-sm px-3 py-1.5 rounded-lg btn-primary">Download .md</button>`,
      });
    }

    async function copyMd() {
      const ta = document.getElementById('md-text');
      try {
        await navigator.clipboard.writeText(ta.value);
        toast('Copied to clipboard');
      } catch (_) {
        ta.select();
        document.execCommand('copy');
        toast('Copied to clipboard');
      }
    }

    function downloadMd() {
      const blob = new Blob([document.getElementById('md-text').value], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (current ? current.list.name.replace(/[^\w\d-]+/g, '-').replace(/^-+|-+$/g, '') || 'list' : 'list') + '.md';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    }

    // mode 'new' (from Home: create a list) or 'merge' (into the current list,
    // which offers both add and replace).
    function openImport(mode) {
      openMd({
        title: 'Import markdown',
        hint: mode === 'new'
          ? 'Paste markdown to create a new list. ~~Strikethrough~~ items import as completed.'
          : 'Paste markdown to import into this list. Add merges into matching categories; Replace clears the list first. ~~Strikethrough~~ items import as completed.',
        text: '',
        readonly: false,
        actionsHtml: mode === 'new' ? `
          <button onclick="closeMd()" class="text-sm px-3 py-1.5 rounded-lg ${BTN_SOFT}">Cancel</button>
          <button onclick="runImport('new')" class="text-sm px-3 py-1.5 rounded-lg btn-primary">Import</button>` : `
          <button onclick="closeMd()" class="text-sm px-3 py-1.5 rounded-lg ${BTN_SOFT}">Cancel</button>
          <button onclick="runImport('replace')" class="text-sm px-3 py-1.5 rounded-lg bg-red-600 hover:bg-red-500 text-white">Import (replace)</button>
          <button onclick="runImport('add')" class="text-sm px-3 py-1.5 rounded-lg btn-primary">Import (add)</button>`,
      });
    }

    async function runImport(mode) {
      const md = document.getElementById('md-text').value;
      const { name, categories } = parseMarkdown(md);
      if (!categories.length || !categories.some(c => c.items.length)) {
        return toast('Nothing to import — expected bullets like "* Category" with "  * item" beneath');
      }
      try {
        if (mode === 'new') {
          const { list } = await api('/api/lists/import', {
            method: 'POST',
            body: JSON.stringify({ name: name || 'Imported list', categories }),
          });
          closeMd();
          if (location.hash === '#/list/' + list.id) loadList(list.id);
          else location.hash = '#/list/' + list.id;
        } else {
          if (mode === 'replace' &&
              !await askConfirm('Replace everything in "' + current.list.name + '" with the imported content?', 'Replace')) {
            return;
          }
          await api('/api/lists/' + current.list.id + '/import', {
            method: 'POST',
            body: JSON.stringify({ categories, mode }),
          });
          closeMd();
          toast(mode === 'replace' ? 'List replaced' : 'Imported');
          refreshList();
        }
      } catch (e) { toast(e.message); }
    }

    // --- members modal ----------------------------------------------------------------
    // Presented in the kit's centered modal; invite/remove re-render the body
    // in place while the modal stays open.
    let membersModal = null;
    function openMembers() {
      if (!window.unNative) { toast('Members needs the UI kit, which failed to load'); return; }
      if (membersModal) { renderMembers(); return; }
      const el = document.createElement('div');
      el.className = 'p-5 w-[min(24rem,90vw)]';
      el.innerHTML = `
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-semibold text-lg">Members</h2>
          <button onclick="closeMembers()" class="x-close text-xl leading-none px-1">&times;</button>
        </div>
        <div id="members-body"></div>
      `;
      membersModal = unNative.presentModal({
        contentEl: el,
        onDismiss: () => { membersModal = null; },
      });
      renderMembers();
    }
    function closeMembers() {
      if (membersModal) membersModal.dismiss();
    }

    function renderMembers() {
      const isOwner = current.role === 'owner';
      const body = document.getElementById('members-body');
      if (!body) return;
      body.innerHTML = `
        <div class="space-y-1.5 mb-4">
          <div class="flex items-center justify-between px-2 py-1.5 rounded-lg" style="background: var(--fill)">
            <span class="text-sm">@${esc(current.list.owner_username)}</span>
            <span class="text-[11px] uppercase tracking-wide tinted">Owner</span>
          </div>
          ${current.members.map(m => `
            <div class="flex items-center justify-between px-2 py-1.5 rounded-lg hover:bg-[var(--fill)]">
              <span class="text-sm">@${esc(m.username)}</span>
              ${isOwner ? `<button onclick="removeMember(${m.id})" class="x-close hover:!text-red-500 text-xs">Remove</button>` : ''}
            </div>`).join('')}
          ${!current.members.length ? '<p class="text-xs px-2 py-1 flex items-center gap-1.5" style="color: var(--label3)">' + lockSvg(11) + 'This list is private — only you can see it. Invite someone below to share it.</p>' : ''}
        </div>
        ${isOwner ? `
          <form onsubmit="return inviteMember(event)" class="flex gap-2">
            <input name="username" placeholder="Invite by username…" autocomplete="off"
                   class="flex-1 rounded-lg px-3 py-2 text-sm focus:outline-none"
                   style="background: var(--fill); color: var(--label); border: 1px solid var(--separator)">
            <button class="text-sm px-3 py-2 rounded-lg btn-primary">Invite</button>
          </form>
          <p class="text-[11px] mt-2" style="color: var(--label3)">Invites take effect immediately — the user will see this list next time they open the app.</p>`
        : '<p class="text-xs" style="color: var(--label3)">Only the owner can manage members.</p>'}
      `;
    }

    async function inviteMember(ev) {
      ev.preventDefault();
      const input = ev.target.elements.username;
      const username = input.value.trim();
      if (!username) return false;
      try {
        await api('/api/lists/' + current.list.id + '/members', { method: 'POST', body: JSON.stringify({ username }) });
        current = await api('/api/lists/' + current.list.id);
        renderList(current);
        renderMembers(); // modal stays open; refresh its body
        toast('@' + username.replace(/^@/, '') + ' added');
      } catch (e) { toast(e.message); }
      return false;
    }

    async function removeMember(memberId) {
      try {
        await api('/api/lists/' + current.list.id + '/members/' + memberId, { method: 'DELETE' });
        current = await api('/api/lists/' + current.list.id);
        renderList(current);
        renderMembers(); // modal stays open; refresh its body
      } catch (e) { toast(e.message); }
    }

    applyTheme();
    syncOfflineChip();
    if (queueLength()) { scheduleReplay(); attemptReplay(); }
    route();

    // Pull-to-refresh on the window scroller — attached once; the kit rubber-
    // bands #app, holds its spinner until the refresh promise settles, and
    // no-ops on desktop.
    if (window.unNative) {
      unNative.attachPullToRefresh(
        window,
        () => (current ? refreshList() : refreshHome()),
        { content: document.getElementById('app') }
      );
    }
  </script>
</body>
</html>
