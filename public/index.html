<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>
  <title>Todo List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', future: { hoverOnlyWhenSupported: true } }</script>
  <script>
    // Apply the theme before first paint to avoid a flash. Explicit choice in
    // localStorage wins; otherwise follow the system preference.
    (function () {
      try {
        var pref = localStorage.getItem('todo:theme');
        var dark = pref === 'dark' ||
          (pref !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', dark);
      } catch (_) {}
    })();
  </script>
  <style>
    /* ── iOS system palette — violet is the tint, grays are system grays ── */
    :root {
      --bg: #f2f2f7;                      /* systemGroupedBackground */
      --card: #ffffff;                    /* secondarySystemGroupedBackground */
      --card-active: #d1d1d6;             /* pressed-row tint (systemGray4) */
      --separator: rgba(60, 60, 67, .29);
      --label: #000000;
      --label2: rgba(60, 60, 67, .6);     /* secondaryLabel */
      --label3: rgba(60, 60, 67, .3);     /* tertiaryLabel */
      --fill: rgba(118, 118, 128, .12);   /* search / field fills */
      --gray: #8e8e93;                    /* systemGray — neutral swipe action */
      --tint: #7c3aed;                    /* violet-600 */
      --danger: #ff3b30;                  /* systemRed */
      --bar: rgba(242, 242, 247, .78);    /* nav-bar wash over --bg */
    }
    .dark {
      --bg: #000000;
      --card: #1c1c1e;
      --card-active: #3a3a3c;
      --separator: rgba(84, 84, 88, .6);
      --label: #ffffff;
      --label2: rgba(235, 235, 245, .6);
      --label3: rgba(235, 235, 245, .3);
      --fill: rgba(118, 118, 128, .24);
      --gray: #8e8e93;
      --tint: #a78bfa;                    /* violet-400 reads better on black */
      --danger: #ff453a;
      --bar: rgba(0, 0, 0, .78);
    }
    html { overscroll-behavior-y: contain; }
    body { background: var(--bg); color: var(--label); }
    .surface { background: var(--card); }
    .tinted { color: var(--tint); }

    /* Safe-area padding for notches / the home indicator. Plain env() —
       requires viewport-fit=cover in the viewport meta above. Inert (0)
       when the shell exposes no insets. */
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

    /* ── Instant pressed states: engage with zero latency, ease on release.
       `scale` (not transform) so positioned elements keep their translates. */
    * { -webkit-tap-highlight-color: transparent; }
    button, a { transition: scale .2s, filter .2s; }
    button:active, a:active, .pressable:active {
      scale: .97; filter: brightness(.85); transition: none;
    }
    /* Full-width rows tint like UITableView cells instead of scaling. */
    .row-press { transition: background-color .2s; }
    .row-press:active {
      background-color: var(--card-active) !important;
      scale: none; filter: none; transition: none;
    }
    .swipe-actions button, .drag-handle { scale: none !important; filter: none !important; }

    /* ── Nav bars ── */
    .nav-bar {
      background: var(--bar);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid transparent;
    }
    .nav-bar.scrolled { border-bottom-color: var(--separator); }
    .nav-title { font-size: 17px; font-weight: 600; transition: opacity .15s; }
    .large-title { font-size: 34px; font-weight: 700; letter-spacing: -.02em; }

    /* ── Inset-grouped cards (Settings / Reminders look) ── */
    .ios-card { background: var(--card); border-radius: 12px; overflow: hidden; }
    .sec-header {
      font-size: 13px; font-weight: 400; text-transform: uppercase;
      letter-spacing: .03em; color: var(--label2);
    }
    /* Hairline separators above every card row except the visual first.
       Painted above the row (z-index) so it stays put while a row swipes. */
    .card-row { position: relative; background: var(--card); }
    .card-row::before {
      content: ''; position: absolute; top: 0; left: 16px; right: 0;
      height: 1px; background: var(--separator);
      transform: scaleY(.5); transform-origin: top; z-index: 3;
    }
    .ios-card > .card-row:first-child::before,
    .ios-card > :first-child > .card-row:first-child::before,
    .active-items.hidden + .done-items > .card-row:first-child::before { display: none; }

    .pencil-host .pencil { opacity: 0; transition: opacity .12s; }
    .pencil-host:hover .pencil { opacity: 1; }
    .cat-head .cat-del { opacity: 0; transition: opacity .12s; }
    .cat-head:hover .cat-del { opacity: 1; }
    .drag-handle { cursor: grab; touch-action: none; }
    .drag-handle:active { cursor: grabbing; }

    /* ── Swipe rows: transforms are JS-owned (springs). No CSS transition on
       gesture release — that's the fixed-duration anti-pattern. ── */
    .swipe-wrap { touch-action: pan-y; }
    .swipe-front { position: relative; }
    .swipe-actions { transform: translateX(100%); }
    .swipe-actions button {
      font-size: 13px; font-weight: 600; color: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    /* Full-swipe cue: past the commit point Delete grows to fill the tray —
       a reversible state cue, so a transition (not a spring) is fine here. */
    .swipe-actions .act-del { flex-grow: 0; transition: flex-grow .15s ease-out; }
    .swipe-wrap.commit-armed .act-del { flex-grow: 8; }
    .swipe-wrap.collapsing { transition: height .25s ease-in; }

    /* Long-press is a gesture (drag / swipe), not a text-selection trigger. */
    .item-row, .cat-head {
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }
    /* Mobile Safari zooms the whole viewport when focusing a field whose
       font is under 16px — that's the screen "bounce" on tapping an input.
       Bump fields to 16px on touch devices so focusing never zooms. */
    @media (hover: none) and (pointer: coarse) {
      input, textarea, select { font-size: 16px !important; }
    }
    input, textarea, button { touch-action: manipulation; }
    /* Touch devices: no drag handles (long-press drags instead) and no
       hover-revealed buttons (swipe left reveals rename/delete instead). */
    @media (hover: none) and (pointer: coarse) {
      .drag-handle, .hover-action, .cat-del { display: none !important; }
    }
    .drop-before { box-shadow: 0 -2px 0 0 #8b5cf6; }
    .drop-after { box-shadow: 0 2px 0 0 #8b5cf6; }
    .drop-into { box-shadow: inset 0 0 0 1px rgba(139, 92, 246, 0.6); border-radius: 0.5rem; }
    .dragging { opacity: 0.4; }

    /* ── Reminders-style circular checkbox ── */
    .todo-check {
      appearance: none; -webkit-appearance: none;
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px solid var(--label3);
      background: transparent;
      cursor: pointer; position: relative; flex-shrink: 0;
      transition: background .15s, border-color .15s, scale .15s;
    }
    .todo-check:hover { border-color: var(--tint); }
    .todo-check:active { scale: .88; }
    .todo-check:checked { background: var(--tint); border-color: var(--tint); }
    .todo-check:checked::after {
      content: ''; position: absolute;
      left: 6.5px; top: 3px; width: 6px; height: 11px;
      border: solid #fff; border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    /* ── iOS switch ── */
    .ios-switch {
      appearance: none; -webkit-appearance: none;
      width: 51px; height: 31px; border-radius: 31px;
      background: rgba(120, 120, 128, .16);
      position: relative; cursor: pointer; flex-shrink: 0;
      transition: background .25s;
    }
    .dark .ios-switch { background: rgba(120, 120, 128, .32); }
    .ios-switch::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 27px; height: 27px; border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 8px rgba(0, 0, 0, .15), 0 1px 1px rgba(0, 0, 0, .16);
      transition: transform .25s cubic-bezier(.175, .885, .32, 1.1);
    }
    .ios-switch:checked { background: var(--tint); }
    .ios-switch:checked::after { transform: translateX(20px); }

    /* ── Pull-to-refresh puck ── */
    #ptr-puck {
      position: fixed; top: 10px; left: 50%; z-index: 70;
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--card); color: var(--label2);
      box-shadow: 0 2px 10px rgba(0, 0, 0, .18);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: translate(-50%, -48px);
      pointer-events: none;
    }
    #ptr-puck.armed { color: var(--tint); }
    #ptr-puck.refreshing svg { animation: ptr-spin .8s linear infinite; }
    @keyframes ptr-spin { to { transform: rotate(360deg); } }

    /* ── Bottom sheets & iOS alerts ── */
    .sheet-panel {
      position: fixed; left: 8px; right: 8px; bottom: 8px; z-index: 65;
      transform: translateY(115%); touch-action: none;
    }
    .sheet-card { background: var(--card); border-radius: 14px; overflow: hidden; }
    .sheet-grabber {
      width: 36px; height: 5px; border-radius: 3px;
      background: var(--label3); margin: 8px auto 2px;
    }
    .sheet-row {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; text-align: left; gap: 12px;
      padding: 13px 16px; font-size: 17px; color: var(--label);
      position: relative;
    }
    .sheet-row + .sheet-row::before {
      content: ''; position: absolute; top: 0; left: 16px; right: 0;
      height: 1px; background: var(--separator); transform: scaleY(.5);
    }
    .alert-card {
      width: 270px; max-width: 86vw; border-radius: 14px; overflow: hidden;
      background: var(--card);
      box-shadow: 0 12px 40px rgba(0, 0, 0, .3);
    }
    .alert-btn {
      font-size: 17px; color: var(--tint); padding: 11px 8px; text-align: center;
      border-top: 1px solid var(--separator);
    }
    #dialog-buttons.grid-cols-2 > :nth-child(2) { border-left: 1px solid var(--separator); }

    /* ── Push/pop screen transitions (View Transitions API; instant cut
       where unsupported). iOS nav curve + parallax under-slide. ── */
    @keyframes vt-in-right  { from { transform: translateX(100%); } }
    @keyframes vt-out-left  { to { transform: translateX(-30%); opacity: .7; } }
    @keyframes vt-in-left   { from { transform: translateX(-30%); opacity: .7; } }
    @keyframes vt-out-right { to { transform: translateX(100%); } }
    :root[data-vt] ::view-transition-old(root),
    :root[data-vt] ::view-transition-new(root) {
      animation-duration: .35s;
      animation-timing-function: cubic-bezier(.32, .72, 0, 1);
      animation-fill-mode: both;
      mix-blend-mode: normal;
    }
    :root[data-vt="push"]::view-transition-new(root) { animation-name: vt-in-right; }
    :root[data-vt="push"]::view-transition-old(root) { animation-name: vt-out-left; }
    :root[data-vt="pop"]::view-transition-new(root)  { animation-name: vt-in-left; }
    :root[data-vt="pop"]::view-transition-old(root)  { animation-name: vt-out-right; z-index: 1; }
  </style>
</head>
<body class="min-h-screen">
  <div id="app" class="max-w-2xl mx-auto p-4 pb-24"></div>

  <!-- Pull-to-refresh spinner puck (driven by the touch gesture arbiter) -->
  <div id="ptr-puck"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 3a9 9 0 1 0 9 9"/></svg></div>

  <!-- Members modal -->
  <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/40 dark:bg-black/60 z-40"></div>
  <div id="members-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 pointer-events-none">
    <div class="pointer-events-auto surface rounded-2xl w-full max-w-sm p-5 shadow-xl">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-lg">Members</h2>
        <button onclick="closeMembers()" class="text-zinc-400 hover:text-zinc-700 dark:text-zinc-500 dark:hover:text-zinc-200 text-xl leading-none px-1">&times;</button>
      </div>
      <div id="members-body"></div>
    </div>
  </div>

  <!-- Markdown import/export modal -->
  <div id="md-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 dark:bg-black/60">
    <div class="surface rounded-2xl w-full max-w-lg p-5 shadow-xl flex flex-col gap-3 max-h-[90vh]">
      <div class="flex items-center justify-between">
        <h2 id="md-title" class="font-semibold text-lg"></h2>
        <button onclick="closeMd()" class="text-zinc-400 hover:text-zinc-700 dark:text-zinc-500 dark:hover:text-zinc-200 text-xl leading-none px-1">&times;</button>
      </div>
      <p id="md-hint" class="text-xs text-zinc-500"></p>
      <textarea id="md-text" rows="14" spellcheck="false"
                class="w-full flex-1 rounded-lg p-3 text-xs font-mono focus:outline-none resize-none"
                style="background: var(--fill); color: var(--label); border: 1px solid var(--separator)"></textarea>
      <div id="md-actions" class="flex justify-end gap-2"></div>
    </div>
  </div>

  <!-- iOS-style alert dialog (native prompt/confirm can be blocked in sandboxed iframes) -->
  <div id="dialog" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40">
    <form id="dialog-form" class="alert-card">
      <div class="px-4 pt-5 pb-4">
        <p id="dialog-title" class="text-[15px] font-semibold text-center"></p>
        <input id="dialog-input" autocomplete="off"
               class="mt-3 w-full rounded-md px-2.5 py-1.5 text-sm focus:outline-none"
               style="background: var(--fill); border: 1px solid var(--separator);">
      </div>
      <div id="dialog-buttons" class="grid grid-cols-2"></div>
    </form>
  </div>

  <!-- iOS action sheet for destructive confirms (touch presentation) -->
  <div id="asheet-backdrop" class="hidden fixed inset-0 z-[64] bg-black/40"></div>
  <div id="asheet" class="hidden sheet-panel safe-bottom">
    <div id="asheet-actions" class="sheet-card mb-2"></div>
    <button type="button" id="asheet-cancel" class="sheet-card row-press block w-full py-3.5 text-[17px] font-semibold tinted text-center">Cancel</button>
  </div>

  <!-- ☰ menu as a bottom sheet on touch (drag-to-dismiss) -->
  <div id="sheet-backdrop" class="hidden fixed inset-0 z-[63] bg-black/40"></div>
  <div id="menu-sheet" class="hidden sheet-panel">
    <div class="sheet-card safe-bottom">
      <div class="sheet-grabber"></div>
      <div id="menu-sheet-body" class="pb-1"></div>
    </div>
  </div>

  <div id="toast" class="safe-bottom hidden fixed bottom-6 left-1/2 -translate-x-1/2 surface text-[13px] px-4 py-2.5 rounded-full shadow-lg z-50"></div>

  <script>
    // --- auth / api ----------------------------------------------------------
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    // Random per-tab id sent with every mutation; SSE events echo it back so
    // the tab that made a change can skip refetching its own edit.
    const clientId = Math.random().toString(36).slice(2) + Date.now().toString(36);
    const headers = { 'x-client-id': clientId, ...(token ? { 'x-usernode-token': token } : {}) };

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', ...headers, ...(opts.headers || {}) },
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || ('Request failed (' + res.status + ')'));
      return data;
    }

    let toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.remove('hidden');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.add('hidden'), 3000);
    }

    // Shared class strings — the palette flows from the CSS variables.
    const BTN_SOFT = 'bg-[var(--fill)] text-[color:var(--label)]';
    const DRAWER_ITEM = 'w-full flex items-center justify-between gap-3 text-left px-4 py-2.5 text-[15px] row-press hover:bg-[var(--fill)]';

    // Closed-padlock icon marking private (owner-only) lists; inherits text color.
    function lockSvg(size) {
      return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="inline-block shrink-0"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>`;
    }

    // Promise-based replacements for prompt()/confirm(), plus a multi-choice
    // mode.
    let dialogResolve = null;
    let dialogChoices = null;
    const dialogEl = document.getElementById('dialog');
    const dialogForm = document.getElementById('dialog-form');
    const dialogInput = document.getElementById('dialog-input');

    function openDialog({ title, withInput = false, value = '', choices = null, okLabel = 'OK' }) {
      // Destructive confirms present as an iOS action sheet on touch; text
      // prompts (and desktop confirms) present as a centered iOS alert.
      if (choices && IS_TOUCH) return openActionSheet({ title, choices });
      return new Promise(resolve => {
        dialogResolve = resolve;
        dialogChoices = choices;
        document.getElementById('dialog-title').textContent = title;
        dialogInput.classList.toggle('hidden', !withInput);
        dialogInput.value = value;
        const btns = document.getElementById('dialog-buttons');
        let html = `<button type="button" data-dlg="cancel" class="alert-btn">Cancel</button>`;
        if (choices) {
          html += choices.map((c, i) =>
            `<button type="button" data-dlg="${i}" class="alert-btn font-semibold${c.danger ? ' !text-[color:var(--danger)]' : ''}">${esc(c.label)}</button>`
          ).join('');
        } else {
          html += `<button type="submit" class="alert-btn font-semibold">${esc(okLabel)}</button>`;
        }
        btns.innerHTML = html;
        btns.className = 'grid ' + (choices && choices.length > 1 ? 'grid-cols-1' : 'grid-cols-2');
        dialogEl.classList.remove('hidden');
        if (withInput) setTimeout(() => { dialogInput.focus(); dialogInput.select(); }, 0);
      });
    }

    // iOS action sheet: bottom-anchored destructive choices + separate Cancel,
    // spring-up entrance, backdrop tap cancels. Same promise contract as the
    // alert path, so askConfirm callers don't care which presentation ran.
    let asheetSpring = null;
    function openActionSheet({ title, choices }) {
      return new Promise(resolve => {
        const backdrop = document.getElementById('asheet-backdrop');
        const panel = document.getElementById('asheet');
        const body = document.getElementById('asheet-actions');
        body.innerHTML =
          (title ? `<p class="px-6 py-3 text-[13px] text-center" style="color: var(--label2)">${esc(title)}</p>` : '') +
          choices.map((c, i) =>
            `<button type="button" data-as="${i}" class="row-press block w-full py-3.5 text-[17px] text-center"
                     style="${title || i ? 'border-top: 1px solid var(--separator);' : ''} color: ${c.danger ? 'var(--danger)' : 'var(--tint)'}">${esc(c.label)}</button>`
          ).join('');
        backdrop.classList.remove('hidden');
        panel.classList.remove('hidden');
        const h = panel.offsetHeight + 24;
        const setY = y => { panel.style.transform = 'translateY(' + Math.max(-8, y) + 'px)'; };
        setY(h);
        if (asheetSpring) asheetSpring.stop();
        asheetSpring = spring(setY, { from: h, to: 0, stiffness: 380, damping: 34 });
        let settled = false;
        function settle(result) {
          if (settled) return;
          settled = true;
          if (asheetSpring) asheetSpring.stop();
          asheetSpring = spring(setY, {
            from: 0, to: h + 40, stiffness: 380, damping: 40,
            onRest: () => { backdrop.classList.add('hidden'); panel.classList.add('hidden'); },
          });
          resolve(result);
        }
        body.onclick = ev => {
          const b = ev.target.closest('[data-as]');
          if (b) settle(choices[+b.dataset.as].value);
        };
        document.getElementById('asheet-cancel').onclick = () => settle(null);
        backdrop.onclick = () => settle(null);
      });
    }
    function settleDialog(result) {
      dialogEl.classList.add('hidden');
      if (dialogResolve) { dialogResolve(result); dialogResolve = null; dialogChoices = null; }
    }
    dialogForm.addEventListener('submit', ev => {
      ev.preventDefault();
      if (dialogChoices) return; // choice dialogs settle via their buttons
      settleDialog(dialogInput.classList.contains('hidden') ? true : dialogInput.value);
    });
    document.getElementById('dialog-buttons').addEventListener('click', ev => {
      const btn = ev.target.closest('[data-dlg]');
      if (!btn) return;
      if (btn.dataset.dlg === 'cancel') return settleDialog(null);
      if (dialogChoices) settleDialog(dialogChoices[+btn.dataset.dlg].value);
    });
    dialogEl.addEventListener('click', ev => { if (ev.target === dialogEl) settleDialog(null); });

    const askText = (title, value) => openDialog({ title, withInput: true, value });
    const askConfirm = (title, okLabel = 'Delete') =>
      openDialog({ title, choices: [{ label: okLabel, value: true, danger: true }] });

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // --- motion foundation -----------------------------------------------------
    // rAF damped-spring integrator. Interruptible: current() hands the live
    // position+velocity to whatever gesture grabs the element mid-flight.
    function spring(onFrame, { from = 0, to = 0, velocity = 0, stiffness = 300, damping = 30, onRest } = {}) {
      let x = from, v = velocity, raf = null, last = null, stopped = false;
      function step(ts) {
        if (stopped) return;
        const dt = Math.min(0.032, last ? (ts - last) / 1000 : 1 / 60);
        last = ts;
        v += (-stiffness * (x - to) - damping * v) * dt;
        x += v * dt;
        if (Math.abs(x - to) < 0.5 && Math.abs(v) < 10) {
          stopped = true; x = to; onFrame(x);
          if (onRest) onRest();
          return;
        }
        onFrame(x);
        raf = requestAnimationFrame(step);
      }
      raf = requestAnimationFrame(step);
      return {
        stop() { stopped = true; if (raf) cancelAnimationFrame(raf); },
        current() { return { x, v }; },
      };
    }

    // Release velocity (px/s) from a rolling {t, x} sample window. The caller
    // pushes a final sample at release time so a held-still pause decays
    // momentum instead of replaying the last movement's speed.
    function estimateVelocity(samples) {
      if (samples.length < 2) return 0;
      const newest = samples[samples.length - 1];
      let oldest = samples[0];
      for (let i = samples.length - 2; i >= 0; i--) {
        oldest = samples[i];
        if (newest.t - samples[i].t > 100) break;
      }
      const dt = (newest.t - oldest.t) / 1000;
      return dt > 0 ? (newest.x - oldest.x) / dt : 0;
    }

    // Asymptotic resistance for overscroll / over-drag.
    function rubberband(x, limit, coeff = 0.55) {
      return limit * (1 - 1 / (1 + (x * coeff) / limit));
    }

    function haptic() { if (navigator.vibrate) navigator.vibrate(10); }

    // --- theme (light / dark / system) ----------------------------------------
    const THEME_KEY = 'todo:theme';
    function themePref() {
      const v = localStorage.getItem(THEME_KEY);
      return v === 'light' || v === 'dark' ? v : 'system';
    }
    function applyTheme() {
      const pref = themePref();
      const dark = pref === 'dark' ||
        (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.toggle('dark', dark);
    }
    function themeLabel() {
      const pref = themePref();
      return pref === 'light' ? '☀️ Light' : pref === 'dark' ? '🌙 Dark' : '🌓 System';
    }
    function cycleTheme() {
      const order = ['system', 'light', 'dark'];
      const next = order[(order.indexOf(themePref()) + 1) % 3];
      if (next === 'system') localStorage.removeItem(THEME_KEY);
      else localStorage.setItem(THEME_KEY, next);
      applyTheme();
      updateThemeLabels();
    }
    function updateThemeLabels() {
      document.querySelectorAll('[data-theme-label]').forEach(b => {
        b.textContent = 'Theme: ' + themeLabel();
      });
      const homeBtn = document.getElementById('home-theme');
      if (homeBtn) homeBtn.textContent = themeLabel();
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (themePref() === 'system') applyTheme();
    });

    // --- show/hide completed preference (per user, localStorage) -------------
    const SHOW_COMPLETED_KEY = 'todo:showCompleted';
    function showCompleted() {
      return localStorage.getItem(SHOW_COMPLETED_KEY) !== 'false'; // default: shown
    }
    function setShowCompleted(v) {
      localStorage.setItem(SHOW_COMPLETED_KEY, v ? 'true' : 'false');
      // The global switch resets any per-category overrides so flipping it
      // always visibly applies everywhere.
      for (const k of Object.keys(catDoneOverrides)) delete catDoneOverrides[k];
      // Fully-completed categories default to collapsed, so "Show all done"
      // gives them an explicit override — otherwise they'd stay shut.
      if (v && current) {
        for (const c of current.categories) {
          if (isCatFullyDone(c.id)) catDoneOverrides[c.id] = true;
        }
      }
      if (current) repaintAllCategories();
    }

    // A category with at least one item and nothing left unchecked.
    function isCatFullyDone(catId) {
      if (!current) return false;
      let open = 0, done = 0;
      for (const i of current.items) {
        if (i.category_id !== catId) continue;
        if (i.checked) done++; else open++;
      }
      return !open && done > 0;
    }

    // Per-category visibility of completed items (session-only override of the
    // global switch), toggled from the divider between active and done items
    // (or, for fully-completed categories, from the header row).
    const catDoneOverrides = {};

    // The header chevron collapses/expands only the category's completed
    // items — unchecked items always stay visible. It drives the same
    // per-category done-visibility state as the "N done" toggles, so all
    // affordances stay in sync.
    function catShowDone(catId) {
      if (catDoneOverrides[catId] !== undefined) return catDoneOverrides[catId];
      if (isCatFullyDone(catId)) return false; // finished categories collapse by default
      return showCompleted();
    }
    function toggleCatDone(catId) {
      // While a search is active, done-visibility is forced by the filter;
      // toggling would silently mutate the collapse state behind the search.
      if (searchActive()) return;
      catDoneOverrides[catId] = !catShowDone(catId);
      repaintCategory(catId);
    }

    // Categories whose "Add an item…" input is currently revealed by the
    // header + button.
    const openAdders = new Set();

    // --- search (list view) ---------------------------------------------------
    // Live client-side filter over the open list — all items are already in
    // `current`, so each keystroke just re-renders #cats from memory.
    // Whitespace-only input counts as inactive.
    let searchQuery = '';
    const searchActive = () => !!searchQuery.trim();
    const searchQ = () => searchQuery.trim().toLowerCase();

    // The mobile keyboard's check/done key dismisses the keyboard (a blur)
    // without submitting. On touch devices, accept whatever was typed when
    // the field blurs with content. Enter-submits clear the field *before*
    // awaiting the API call, so an Enter-then-blur sequence can't double-add.
    function commitOnBlur(ev) {
      if (!IS_TOUCH) return;
      const input = ev.target;
      if (!input.value.trim() || !input.form) return;
      if (input.form.requestSubmit) input.form.requestSubmit();
      else input.form.dispatchEvent(new Event('submit', { cancelable: true }));
    }

    function toggleAdder(catId) {
      const opening = !openAdders.has(catId);
      if (openAdders.has(catId)) openAdders.delete(catId);
      else openAdders.add(catId);
      // Opening the adder on a collapsed category auto-expands its done items.
      if (opening && !catShowDone(catId)) catDoneOverrides[catId] = true;
      repaintCategory(catId);
      if (openAdders.has(catId)) {
        const input = document.querySelector('#cat-' + catId + ' input[name=text]');
        if (input) input.focus();
      }
    }

    // --- live updates (SSE) ----------------------------------------------------
    // While a list is open, subscribe to its event stream; any change made by
    // another client triggers a silent refetch. EventSource retries transient
    // drops itself (server sends retry: 3000); if the browser gives up on a
    // fatal error we reopen manually after the same delay.
    let es = null, esListId = null, esRetryTimer = null, liveRefreshTimer = null;

    function connectEvents(listId) {
      if (es && esListId === listId) return;
      disconnectEvents();
      esListId = listId;
      openStream();
    }

    function openStream() {
      if (!esListId) return;
      es = new EventSource('/api/lists/' + esListId + '/events?token=' +
                           encodeURIComponent(token) + '&clientId=' + clientId);
      es.onmessage = ev => {
        let data;
        try { data = JSON.parse(ev.data); } catch (_) { return; }
        if (data.sourceClient && data.sourceClient === clientId) return; // our own edit
        if (data.type === 'list-deleted') {
          toast('This list was deleted');
          location.hash = '#/';
          return;
        }
        // Coalesce bursts (imports, reorders) into a single refetch.
        clearTimeout(liveRefreshTimer);
        liveRefreshTimer = setTimeout(refreshList, 150);
      };
      es.onerror = () => {
        if (es && es.readyState === EventSource.CLOSED) {
          es = null;
          clearTimeout(esRetryTimer);
          esRetryTimer = setTimeout(openStream, 3000);
        }
      };
    }

    function disconnectEvents() {
      clearTimeout(esRetryTimer);
      clearTimeout(liveRefreshTimer);
      if (es) { es.close(); es = null; }
      esListId = null;
    }

    // --- routing --------------------------------------------------------------
    let current = null; // current list detail payload (List View) or null (Home)

    // Which screen is on-screen — drives the push/pop direction of the screen
    // transition. Only real Home ↔ List navigations animate; the initial load
    // and all in-place repaints render instantly.
    let lastScreen = null; // 'home' | 'list' | null (nothing rendered yet)

    function renderScreen(fn, type) {
      if (type !== 'none' && document.startViewTransition) {
        document.documentElement.dataset.vt = type;
        const vt = document.startViewTransition(fn);
        vt.finished.finally(() => { delete document.documentElement.dataset.vt; });
      } else fn();
    }

    function route() {
      const m = location.hash.match(/^#\/list\/(\d+)$/);
      if (m) loadList(m[1]);
      else loadHome();
    }
    window.addEventListener('hashchange', route);

    // --- Home / My Lists -------------------------------------------------------
    async function loadHome() {
      current = null;
      disconnectEvents();
      const app = document.getElementById('app');
      // Transitioned navigations fetch first and render inside the animation;
      // the "Loading…" stub only shows on a direct/initial load.
      const type = lastScreen === 'list' ? 'pop' : 'none';
      if (type === 'none') app.innerHTML = '<p class="text-sm py-8 text-center" style="color: var(--label2)">Loading…</p>';
      let lists;
      try {
        ({ lists } = await api('/api/lists'));
      } catch (e) {
        app.innerHTML = '<p class="text-red-500 text-sm py-8 text-center">' + esc(e.message) + '</p>';
        lastScreen = 'home';
        return;
      }
      if (current) return; // navigated into a list mid-fetch
      renderScreen(() => renderHome(lists), type);
      lastScreen = 'home';
    }

    function homeBadge(l) {
      if (!l.is_owner) return '<span class="shrink-0 text-[11px] uppercase tracking-wide px-1.5 py-0.5 rounded" style="color: var(--label2); background: var(--fill)">Shared</span>';
      if (Number(l.member_count) === 0) {
        return '<span title="Private — only you can see this list" class="shrink-0 inline-flex items-center gap-1 text-[11px] uppercase tracking-wide px-1.5 py-0.5 rounded" style="color: var(--label2); background: var(--fill)">' + lockSvg(10) + 'Private</span>';
      }
      return '<span class="shrink-0 text-[11px] uppercase tracking-wide tinted px-1.5 py-0.5 rounded" style="background: var(--fill)">Owner</span>';
    }

    let homeIO = null;
    function renderHome(lists) {
      const app = document.getElementById('app');
      app.innerHTML = `
        <header id="home-bar" class="nav-bar safe-top sticky top-0 z-20 -mx-4 px-4 relative">
          <div class="h-12 flex items-center justify-between gap-2">
            <span id="home-inline-title" class="nav-title absolute left-1/2 -translate-x-1/2 opacity-0 pointer-events-none">My Lists</span>
            <button onclick="cycleTheme()" id="home-theme" title="Toggle theme (system / light / dark)"
                    class="tinted text-[15px] py-2 pr-2">${themeLabel()}</button>
            <div class="flex items-center gap-3">
              <button onclick="openImport('new')" class="tinted text-[15px] py-2 px-1">Import</button>
              <button onclick="newList()" title="New list" aria-label="New list" class="tinted text-[26px] font-light leading-none pl-1 py-1">+</button>
            </div>
          </div>
        </header>
        <h1 id="home-large-title" class="large-title pt-2 pb-4">My Lists</h1>
        ${lists.length ? '<div class="ios-card">' + lists.map(l => `
          <a href="#/list/${l.id}" class="card-row row-press block px-4 py-3 hover:bg-[var(--fill)]">
            <div class="flex items-center gap-3">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                  <span class="text-[16px] truncate">${esc(l.name)}</span>
                  ${homeBadge(l)}
                </div>
                <div class="text-[13px] mt-0.5" style="color: var(--label2)">
                  ${l.open_count} open · ${l.done_count} done
                  ${!l.is_owner ? ' · by @' + esc(l.owner_username) : (Number(l.member_count) ? ' · ' + l.member_count + ' member' + (Number(l.member_count) > 1 ? 's' : '') : '')}
                </div>
              </div>
              <span class="text-[20px] leading-none font-semibold shrink-0" style="color: var(--label3)">›</span>
            </div>
          </a>`).join('') + '</div>'
        : `<div class="text-center py-16" style="color: var(--label2)">
             <p class="mb-3">No lists yet.</p>
             <button onclick="newList()" class="tinted text-[15px] font-medium">Create your first list</button>
           </div>`}
      `;
      // Large-title collapse: when the big title scrolls under the bar, the
      // inline title fades in and the bar shows its hairline.
      if (homeIO) homeIO.disconnect();
      homeIO = new IntersectionObserver(([entry]) => {
        const collapsed = !entry.isIntersecting;
        const inline = document.getElementById('home-inline-title');
        const bar = document.getElementById('home-bar');
        if (inline) inline.style.opacity = collapsed ? 1 : 0;
        if (bar) bar.classList.toggle('scrolled', collapsed);
      }, { rootMargin: '-64px 0px 0px 0px' });
      const lt = document.getElementById('home-large-title');
      if (lt) homeIO.observe(lt);
    }

    // Silent refetch for pull-to-refresh — no "Loading…" wipe.
    async function refreshHome() {
      const { lists } = await api('/api/lists');
      if (current) return; // navigated into a list mid-fetch
      renderHome(lists);
    }

    async function newList() {
      const name = await askText('List name:');
      if (!name || !name.trim()) return;
      try {
        const { list } = await api('/api/lists', { method: 'POST', body: JSON.stringify({ name: name.trim() }) });
        location.hash = '#/list/' + list.id;
      } catch (e) { toast(e.message); }
    }

    // --- List View --------------------------------------------------------------
    async function loadList(id) {
      searchQuery = ''; // a freshly opened list always starts unfiltered
      const app = document.getElementById('app');
      const type = lastScreen === 'home' ? 'push' : 'none';
      if (type === 'none') app.innerHTML = '<p class="text-sm py-8 text-center" style="color: var(--label2)">Loading…</p>';
      try {
        current = await api('/api/lists/' + id);
      } catch (e) {
        disconnectEvents();
        app.innerHTML = `<p class="text-red-500 text-sm py-8 text-center">${esc(e.message)}</p>
          <p class="text-center"><a href="#/" class="tinted text-sm">‹ Back to My Lists</a></p>`;
        lastScreen = 'list';
        return;
      }
      renderScreen(() => renderList(current), type);
      lastScreen = 'list';
      connectEvents(current.list.id);
    }

    // Silent refetch + single repaint — no "Loading…" wipe, so no flash.
    // Used for both error recovery and SSE-pushed remote changes, so it
    // preserves any in-progress typing in an add-item / new-category field
    // across the repaint.
    async function refreshList() {
      if (!current) return;
      const id = current.list.id;
      try {
        const data = await api('/api/lists/' + id);
        if (!current || current.list.id !== id) return; // navigated away mid-fetch
        current = data;
        const ae = document.activeElement;
        let focus = null;
        if (ae && ae.tagName === 'INPUT') {
          if (ae.id === 'search-input') {
            focus = { sel: '#search-input', value: ae.value, pos: ae.selectionStart };
          } else if (ae.name === 'text' && ae.closest('.cat-section')) {
            focus = { sel: '#cat-' + ae.closest('.cat-section').dataset.cat + ' input[name=text]', value: ae.value, pos: ae.selectionStart };
          } else if (ae.name === 'name') {
            focus = { sel: 'input[name=name]', value: ae.value, pos: ae.selectionStart };
          }
        }
        renderList(current);
        if (focus) {
          const input = document.querySelector(focus.sel);
          if (input) {
            input.value = focus.value;
            input.focus({ preventScroll: true });
            try { input.setSelectionRange(focus.pos, focus.pos); } catch (_) {}
          }
        }
      } catch (e) { toast(e.message); }
    }

    // Items of one section (unchecked or checked) of a category, in order.
    function sectionItems(catId, checked) {
      return current.items
        .filter(i => i.category_id === catId && !!i.checked === checked)
        .sort((a, b) => (a.sort_order - b.sort_order) || (a.id - b.id));
    }

    // Display order is the manual drag order (current.categories) — static.
    // Categories never move around based on whether their items are done.
    function displayCategories() {
      return current.categories;
    }

    // #cats body: all categories, or a single "no matches" note when an
    // active search filters every one of them out.
    function renderCats() {
      const html = displayCategories().map(c => renderCategory(c)).join('');
      if (!html && searchActive()) {
        return `<p class="text-sm text-zinc-500 py-8 text-center">No items match "${esc(searchQuery.trim())}"</p>`;
      }
      return html;
    }

    // Menu items shared by the desktop dropdown and the touch bottom sheet.
    function drawerItemsHtml(isOwner, sheet) {
      const c = sheet ? 'sheet-row row-press' : DRAWER_ITEM;
      return `
        <label class="${c} cursor-pointer">
          <span>Show completed</span>
          <input type="checkbox" class="ios-switch" ${showCompleted() ? 'checked' : ''} onchange="setShowCompleted(this.checked)">
        </label>
        <button onclick="closeDrawer(); openExport()" class="${c}">Export markdown</button>
        <button onclick="closeDrawer(); openImport('merge')" class="${c}">Import markdown</button>
        <button onclick="cycleTheme()" data-theme-label class="${c}">Theme: ${themeLabel()}</button>
        ${isOwner ? `<button onclick="closeDrawer(); deleteList()" class="${c}" style="color: var(--danger)">Delete list</button>` : ''}
      `;
    }

    function renderList(d) {
      const isOwner = d.role === 'owner';
      const app = document.getElementById('app');
      app.innerHTML = `
        <header id="list-bar" class="nav-bar scrolled safe-top sticky top-0 z-20 -mx-4 px-2 relative">
          <div class="h-12 flex items-center justify-between gap-1">
            <a href="#/" title="Back to My Lists" class="tinted flex items-center text-[17px] pl-1.5 pr-2 py-1.5 shrink-0">
              <svg width="11" height="19" viewBox="0 0 12 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 mr-1"><path d="M10 2 3 10l7 8"/></svg>
              Lists
            </a>
            <h1 id="list-title" class="nav-title absolute left-1/2 -translate-x-1/2 max-w-[44%] truncate text-center${isOwner ? ' cursor-pointer' : ''}"
                ${isOwner ? 'onclick="renameList()" title="Rename list"' : ''}>${esc(d.list.name)}</h1>
            <div class="flex items-center shrink-0">
              ${d.members.length === 0 ? `
              <button onclick="openMembers()" title="Private — only you can see this list. Tap to invite." aria-label="Private — only you can see this list. Tap to invite."
                      class="tinted px-2.5 py-2.5">${lockSvg(16)}</button>` : `
              <button onclick="openMembers()" title="Members" class="tinted text-[15px] px-2 py-2">👥 ${1 + d.members.length}</button>`}
              <div id="drawer-wrap" class="relative shrink-0">
                <button onclick="toggleDrawer(event)" title="Menu" aria-label="Menu" class="tinted px-2.5 py-2.5">
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="block"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
                </button>
                <div id="drawer" class="hidden absolute right-0 top-full mt-1 w-64 rounded-xl surface shadow-2xl z-30 py-1 overflow-hidden" style="border: 1px solid var(--separator)">
                  ${drawerItemsHtml(isOwner, false)}
                </div>
              </div>
            </div>
          </div>
        </header>

        <div class="relative my-3">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" style="color: var(--label2)"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search-input" type="text" autocomplete="off" enterkeyhint="search" placeholder="Search items…"
                 value="${esc(searchQuery)}"
                 oninput="onSearchInput(this.value)"
                 onkeydown="if (event.key === 'Escape') clearSearch()"
                 class="w-full rounded-[10px] pl-9 pr-9 py-2 text-[15px] focus:outline-none"
                 style="background: var(--fill); color: var(--label)">
          <button id="search-clear" onclick="clearSearch()" title="Clear search" aria-label="Clear search"
                  class="${searchQuery ? '' : 'hidden '}absolute right-2 top-1/2 -translate-y-1/2 text-sm px-1.5 py-0.5 leading-none" style="color: var(--label2)">✕</button>
        </div>

        <div id="cats">
          ${renderCats()}
        </div>

        <form id="new-cat-form" onsubmit="return addCategory(event)" class="${searchActive() ? 'hidden ' : ''}mt-7 flex items-center gap-2 px-4">
          <span class="tinted text-[18px] leading-none select-none">+</span>
          <input name="name" placeholder="New category…" autocomplete="off" enterkeyhint="done"
                 onblur="commitOnBlur(event)"
                 class="flex-1 bg-transparent text-[15px] focus:outline-none py-1.5" style="color: var(--label)">
        </form>
      `;
    }

    // --- ☰ menu: anchored dropdown on desktop, bottom sheet on touch ------------
    function toggleDrawer(ev) {
      ev.stopPropagation();
      if (IS_TOUCH) return openMenuSheet();
      const d = document.getElementById('drawer');
      if (d) d.classList.toggle('hidden');
    }
    function closeDrawer() {
      const d = document.getElementById('drawer');
      if (d) d.classList.add('hidden');
      closeMenuSheet();
    }
    document.addEventListener('click', e => {
      const d = document.getElementById('drawer');
      if (d && !d.classList.contains('hidden') && !e.target.closest('#drawer-wrap')) closeDrawer();
      if (openSwipe && !suppressTap && !e.target.closest('.swipe-actions')) closeOpenSwipe();
    });

    // Bottom sheet: spring presentation, 1:1 drag, velocity-projected dismiss.
    const menuSheet = { spring: null, y: 0, v: 0, open: false };
    function sheetH() { return document.getElementById('menu-sheet').offsetHeight + 24; }
    function setSheetY(y) {
      menuSheet.y = y;
      document.getElementById('menu-sheet').style.transform = 'translateY(' + Math.max(-8, y) + 'px)';
    }
    function openMenuSheet() {
      document.getElementById('menu-sheet-body').innerHTML =
        drawerItemsHtml(!!current && current.role === 'owner', true);
      document.getElementById('sheet-backdrop').classList.remove('hidden');
      document.getElementById('menu-sheet').classList.remove('hidden');
      menuSheet.open = true;
      const h = sheetH();
      setSheetY(h);
      if (menuSheet.spring) menuSheet.spring.stop();
      menuSheet.spring = spring(setSheetY, {
        from: h, to: 0, stiffness: 380, damping: 34,
        onRest: () => { menuSheet.spring = null; },
      });
    }
    function closeMenuSheet(velocity) {
      if (!menuSheet.open) return;
      menuSheet.open = false;
      if (menuSheet.spring) menuSheet.spring.stop();
      menuSheet.spring = spring(setSheetY, {
        from: menuSheet.y, to: sheetH() + 40, velocity: velocity || 0, stiffness: 380, damping: 40,
        onRest: () => {
          menuSheet.spring = null;
          document.getElementById('sheet-backdrop').classList.add('hidden');
          document.getElementById('menu-sheet').classList.add('hidden');
        },
      });
    }
    (function wireMenuSheet() {
      const panel = document.getElementById('menu-sheet');
      document.getElementById('sheet-backdrop').addEventListener('click', () => closeMenuSheet());
      let drag = null, dragged = false;
      panel.addEventListener('touchstart', e => {
        if (!menuSheet.open || e.touches.length !== 1) return;
        let base = menuSheet.y, seedV = 0;
        if (menuSheet.spring) { // catch the sheet mid-spring
          const c = menuSheet.spring.current();
          menuSheet.spring.stop(); menuSheet.spring = null;
          base = c.x; seedV = c.v;
          setSheetY(base);
        }
        drag = {
          startY: e.touches[0].clientY, base,
          samples: [{ t: e.timeStamp - 16, x: base - seedV * 0.016 }, { t: e.timeStamp, x: base }],
        };
        dragged = false;
      }, { passive: true });
      panel.addEventListener('touchmove', e => {
        if (!drag) return;
        e.preventDefault();
        const dy = e.touches[0].clientY - drag.startY;
        let y = drag.base + dy;
        if (y < 0) y = -rubberband(-y, 40); // rubber-band upward
        setSheetY(y);
        if (Math.abs(dy) > 10) dragged = true;
        drag.samples.push({ t: e.timeStamp, x: y });
        if (drag.samples.length > 24) drag.samples.shift();
      }, { passive: false });
      const end = e => {
        if (!drag) return;
        drag.samples.push({ t: e.timeStamp, x: menuSheet.y });
        const v = estimateVelocity(drag.samples);
        drag = null;
        // The suppression flag only needs to eat the click that immediately
        // trails this drag — don't let it linger and eat a later tap.
        setTimeout(() => { dragged = false; }, 100);
        if (menuSheet.y + v * 0.12 > sheetH() * 0.4) { haptic(); closeMenuSheet(v); }
        else {
          if (menuSheet.spring) menuSheet.spring.stop();
          menuSheet.spring = spring(setSheetY, {
            from: menuSheet.y, to: 0, velocity: v, stiffness: 380, damping: 34,
            onRest: () => { menuSheet.spring = null; },
          });
        }
      };
      panel.addEventListener('touchend', end, { passive: true });
      panel.addEventListener('touchcancel', end, { passive: true });
      // A drag that moved shouldn't also activate the row it started on.
      panel.addEventListener('click', e => {
        if (dragged) { e.stopPropagation(); e.preventDefault(); dragged = false; }
      }, true);
    })();

    function renderCategory(c) {
      // Active search: a matching category name shows all its items; otherwise
      // both sections filter to matching item text, and a category with no
      // matches disappears. Matching done items always render (bypassing
      // catShowDone) without touching catDoneOverrides, so clearing the search
      // restores the collapse state exactly.
      const searching = searchActive();
      const q = searchQ();
      const catMatches = searching && c.name.toLowerCase().includes(q);
      let unchecked = sectionItems(c.id, false);
      let checked = sectionItems(c.id, true);
      if (searching && !catMatches) {
        unchecked = unchecked.filter(i => i.text.toLowerCase().includes(q));
        checked = checked.filter(i => i.text.toLowerCase().includes(q));
        if (!unchecked.length && !checked.length) return '';
      }
      const showDone = searching ? checked.length > 0 : catShowDone(c.id);
      const empty = !unchecked.length && !checked.length;
      const fullyDone = !unchecked.length && checked.length > 0;
      // Top margin lives on the section (not a space-y on #cats) so a
      // repaintCategory outerHTML swap keeps it correct when the category's
      // completion state changes in place.
      const idx = displayCategories().findIndex(x => x.id === c.id);
      const topGap = idx > 0 ? (fullyDone ? ' mt-4' : ' mt-6') : '';
      return `
        <section id="cat-${c.id}" data-cat="${c.id}" draggable="${IS_TOUCH || searching ? 'false' : 'true'}" class="cat-section${topGap}">
          <div class="swipe-wrap relative overflow-hidden mb-1.5" data-tray="136">
            <div class="swipe-actions absolute inset-y-0 right-0 flex">
              <button onclick="renameCategory(${c.id})" class="w-[68px]" style="background: var(--gray)">Rename</button>
              <button onclick="deleteCategory(${c.id})" class="w-[68px]" style="background: var(--danger)">Delete</button>
            </div>
            <div class="swipe-front cat-head flex items-center gap-1.5 px-2 py-1" style="background: var(--bg)">
              ${searching ? '' : `
              <span class="drag-handle select-none px-0.5 text-sm" style="color: var(--label3)" title="Drag to reorder categories">⠿</span>
              <button onclick="toggleCatDone(${c.id})" title="${showDone ? 'Hide' : 'Show'} completed items in this category"
                      class="select-none text-[10px] px-0.5 leading-none w-3 shrink-0" style="color: var(--label2)">
                ${showDone ? '▼' : '▶'}
              </button>`}
              <h2 class="sec-header flex-1 truncate cursor-pointer"
                  onclick="catTitleTap(event, ${c.id})" title="${IS_TOUCH ? (showDone ? 'Hide' : 'Show') + ' completed items' : 'Rename category'}">${esc(c.name)}</h2>
              ${fullyDone && !searching ? `
              <button onclick="toggleCatDone(${c.id})" title="${showDone ? 'Hide' : 'Show'} completed in this category"
                      class="text-[13px] select-none px-1" style="color: var(--label2)">
                ${checked.length} done ${showDone ? '▾' : '▸'}
              </button>` : ''}
              ${searching ? '' : `
              <button onclick="toggleAdder(${c.id})" title="Add an item"
                      class="tinted text-[20px] px-1.5 leading-none font-light">+</button>`}
              <button onclick="deleteCategory(${c.id})" title="Delete category"
                      class="cat-del hover:!text-red-500 text-sm px-1.5 leading-none" style="color: var(--label3)">✕</button>
            </div>
          </div>
          <div class="ios-card">
            ${openAdders.has(c.id) && !searching ? `
            <form onsubmit="return addItem(event, ${c.id})" class="card-row flex items-center gap-2.5 px-4 py-2">
              <span class="tinted text-[18px] leading-none select-none">+</span>
              <input name="text" placeholder="Add an item…" autocomplete="off" enterkeyhint="done"
                     onkeydown="if (event.key === 'Escape') toggleAdder(${c.id})" onblur="commitOnBlur(event)"
                     class="flex-1 bg-transparent text-[15px] focus:outline-none py-1" style="color: var(--label)">
            </form>` : ''}
            <div class="active-items${unchecked.length || empty ? '' : ' hidden'}">
              ${unchecked.map(renderItem).join('')}
              ${empty ? '<p class="empty-note card-row text-[13px] px-4 py-2.5" style="color: var(--label2)">No items yet</p>' : ''}
            </div>
            ${checked.length ? `
            ${fullyDone || searching ? '' : `
            <button onclick="toggleCatDone(${c.id})" title="${showDone ? 'Hide' : 'Show'} completed in this category"
                    class="card-row row-press w-full flex items-center justify-between px-4 py-2 text-[13px]" style="color: var(--label2)">
              <span>${checked.length} done</span><span>${showDone ? '▾' : '▸'}</span>
            </button>`}
            ${showDone ? `<div class="done-items">${checked.map(renderItem).join('')}</div>` : ''}` : ''}
          </div>
        </section>`;
    }

    // Tapping anywhere on the row toggles the item; interactive children
    // (checkbox, edit/delete buttons, drag handle) keep their own behavior.
    // A tap that ends a swipe gesture (or lands while a row is swiped open)
    // closes the swipe instead of toggling.
    function rowTap(ev, id) {
      if (suppressTap) return;
      if (openSwipe) { closeOpenSwipe(); return; }
      if (ev.target.closest('button, input, .drag-handle')) return;
      const item = current.items.find(i => i.id === id);
      if (item) toggleItem(id, !item.checked);
    }

    // On touch devices renaming goes through the swipe actions; a tap on the
    // title toggles the done-items collapse instead.
    function catTitleTap(ev, id) {
      if (suppressTap) return;
      if (openSwipe) { closeOpenSwipe(); return; }
      if (IS_TOUCH) { toggleCatDone(id); return; }
      renameCategory(id);
    }

    function renderItem(i) {
      return `
        <div class="swipe-wrap card-row relative overflow-hidden" data-tray="204">
          <div class="swipe-actions absolute inset-y-0 right-0 flex">
            <button onclick="toggleItem(${i.id}, ${i.checked ? 'false' : 'true'})" class="w-[68px]" style="background: var(--tint)">${i.checked ? 'Undo' : 'Complete'}</button>
            <button onclick="editItem(${i.id})" class="w-[68px]" style="background: var(--gray)">Rename</button>
            <button onclick="deleteItem(${i.id})" class="act-del w-[68px]" style="background: var(--danger)">Delete</button>
          </div>
          <div class="swipe-front item-row group row-press flex items-center gap-2.5 px-4 py-2.5 cursor-pointer" style="background: var(--card)"
               data-item="${i.id}" data-cat="${i.category_id}" data-checked="${i.checked ? 1 : 0}" draggable="${IS_TOUCH || searchActive() ? 'false' : 'true'}"
               onclick="rowTap(event, ${i.id})">
            ${searchActive() ? '' : `<span class="drag-handle select-none text-sm shrink-0" style="color: var(--label3)" title="Drag to reorder">⠿</span>`}
            <input type="checkbox" ${i.checked ? 'checked' : ''} onchange="toggleItem(${i.id}, this.checked)"
                   class="todo-check">
            <span class="flex-1 text-[16px] break-words ${i.checked ? 'line-through' : ''}"${i.checked ? ' style="color: var(--label2)"' : ''}>${esc(i.text)}</span>
            ${i.last_checked_by ? `<span class="shrink-0 text-[11px]" style="color: var(--label3)" title="Last ${i.checked ? 'checked' : 'unchecked'} by @${esc(i.last_checked_by)}">${i.checked ? '✓' : '↺'} @${esc(i.last_checked_by)}</span>` : ''}
            <button onclick="editItem(${i.id})" title="Edit"
                    class="hover-action opacity-0 group-hover:opacity-100 text-xs px-1" style="color: var(--label2)">✎</button>
            <button onclick="deleteItem(${i.id})" title="Delete"
                    class="hover-action opacity-0 group-hover:opacity-100 hover:!text-red-500 text-xs px-1" style="color: var(--label2)">✕</button>
          </div>
        </div>`;
    }

    // Targeted repaints — swap just the affected category section so the rest
    // of the screen (and input focus elsewhere) is untouched.
    function repaintCategory(catId) {
      // Mid-search an edit can hide the category entirely or leave zero
      // matches overall (the "No items match" note), so repaint everything.
      if (searchActive()) return repaintAllCategories();
      const c = current.categories.find(x => x.id === catId);
      const el = document.getElementById('cat-' + catId);
      if (!c || !el) return;
      openSwipe = null;
      el.outerHTML = renderCategory(c);
    }
    function repaintAllCategories() {
      const el = document.getElementById('cats');
      openSwipe = null;
      if (el) el.innerHTML = renderCats();
    }

    // --- search handlers -------------------------------------------------------
    // The input lives outside #cats, so these repaints never touch it and
    // focus survives typing naturally.
    function onSearchInput(v) {
      searchQuery = v;
      syncSearchChrome();
      repaintAllCategories();
    }
    function clearSearch() {
      if (!searchQuery) return;
      searchQuery = '';
      const input = document.getElementById('search-input');
      if (input) { input.value = ''; input.focus({ preventScroll: true }); }
      syncSearchChrome();
      repaintAllCategories();
    }
    // Bits outside #cats that depend on the query: the ✕ clear button and the
    // "New category…" form (hidden while filtering).
    function syncSearchChrome() {
      const btn = document.getElementById('search-clear');
      if (btn) btn.classList.toggle('hidden', !searchQuery);
      const form = document.getElementById('new-cat-form');
      if (form) form.classList.toggle('hidden', searchActive());
    }

    // --- list actions ------------------------------------------------------------
    async function renameList() {
      const name = await askText('Rename list:', current.list.name);
      if (!name || !name.trim() || name.trim() === current.list.name) return;
      try {
        await api('/api/lists/' + current.list.id, { method: 'PATCH', body: JSON.stringify({ name: name.trim() }) });
        current.list.name = name.trim();
        renderList(current);
      } catch (e) { toast(e.message); }
    }

    async function deleteList() {
      if (!await askConfirm('Delete "' + current.list.name + '" and all its items? This can\'t be undone.')) return;
      try {
        await api('/api/lists/' + current.list.id, { method: 'DELETE' });
        location.hash = '#/';
      } catch (e) { toast(e.message); }
    }

    // --- category actions ----------------------------------------------------------
    async function addCategory(ev) {
      ev.preventDefault();
      const input = ev.target.elements.name;
      const name = input.value.trim();
      if (!name) return false;
      input.value = ''; // before the await: a trailing keyboard-done blur finds it empty
      try {
        const { category } = await api('/api/lists/' + current.list.id + '/categories', { method: 'POST', body: JSON.stringify({ name }) });
        current.categories.push(category);
        // The form itself isn't re-rendered, so input focus (when it still
        // has it) survives on its own.
        repaintAllCategories();
      } catch (e) { toast(e.message); input.value = name; }
      return false;
    }

    async function renameCategory(id) {
      const cat = current.categories.find(c => c.id === id);
      const name = await askText('Rename category:', cat ? cat.name : '');
      if (!name || !name.trim()) return;
      try {
        await api('/api/categories/' + id, { method: 'PATCH', body: JSON.stringify({ name: name.trim() }) });
        cat.name = name.trim();
        repaintCategory(id);
      } catch (e) { toast(e.message); }
    }

    // Any category can be deleted (with its items) except the last one.
    async function deleteCategory(id) {
      if (current.categories.length <= 1) {
        return toast("Can't delete the only category — lists need at least one");
      }
      const cat = current.categories.find(c => c.id === id);
      const n = current.items.filter(i => i.category_id === id).length;
      const msg = 'Delete category "' + (cat ? cat.name : '') + '"' +
        (n ? ' and its ' + n + ' item' + (n > 1 ? 's' : '') : '') + '?';
      if (!await askConfirm(msg)) return;
      try {
        await api('/api/categories/' + id, { method: 'DELETE' });
        current.categories = current.categories.filter(c => c.id !== id);
        current.items = current.items.filter(i => i.category_id !== id);
        const el = document.getElementById('cat-' + id);
        if (el) el.remove();
      } catch (e) { toast(e.message); }
    }

    // --- item actions ---------------------------------------------------------------
    async function addItem(ev, categoryId) {
      ev.preventDefault();
      const input = ev.target.elements.text;
      const text = input.value.trim();
      if (!text) return false;
      input.value = ''; // before the await: a trailing keyboard-done blur finds it empty
      const wasFullyDone = isCatFullyDone(categoryId);
      try {
        const { item } = await api('/api/categories/' + categoryId + '/items', { method: 'POST', body: JSON.stringify({ text }) });
        current.items.push(item); // server gives it the smallest sort_order → top of the active list
        if (wasFullyDone) {
          // The section was rendered compact (inline done toggle, tight
          // spacing) and is now active again — a surgical insert would leave
          // that stale, so repaint the whole section and restore focus.
          repaintCategory(categoryId);
          const fresh = document.querySelector('#cat-' + categoryId + ' input[name=text]');
          if (fresh) fresh.focus({ preventScroll: true });
        } else {
          // Insert just the new row; the form (and its focus) is untouched,
          // so the view stays perfectly still.
          const body = document.querySelector('#cat-' + categoryId + ' .active-items');
          if (body) {
            const ph = body.querySelector('.empty-note');
            if (ph) ph.remove();
            body.insertAdjacentHTML('afterbegin', renderItem(item));
          }
        }
      } catch (e) { toast(e.message); input.value = text; }
      return false;
    }

    async function toggleItem(id, checked) {
      try {
        const { item } = await api('/api/items/' + id, { method: 'PATCH', body: JSON.stringify({ checked }) });
        const idx = current.items.findIndex(i => i.id === id);
        if (idx !== -1) current.items[idx] = item;
        // Checking the last open item flips the category to fully done, which
        // defaults to collapsed — keep it expanded for this session so the
        // rows the user is looking at don't vanish mid-interaction.
        if (checked && isCatFullyDone(item.category_id)) catDoneOverrides[item.category_id] = true;
        repaintCategory(item.category_id);
      } catch (e) { toast(e.message); refreshList(); }
    }

    async function editItem(id) {
      const item = current.items.find(i => i.id === id);
      const text = await askText('Edit item:', item ? item.text : '');
      if (!text || !text.trim()) return;
      try {
        const { item: updated } = await api('/api/items/' + id, { method: 'PATCH', body: JSON.stringify({ text: text.trim() }) });
        const idx = current.items.findIndex(i => i.id === id);
        if (idx !== -1) current.items[idx] = updated;
        repaintCategory(updated.category_id);
      } catch (e) { toast(e.message); }
    }

    async function deleteItem(id) {
      const item = current.items.find(i => i.id === id);
      try {
        await api('/api/items/' + id, { method: 'DELETE' });
        current.items = current.items.filter(i => i.id !== id);
      } catch (e) { toast(e.message); }
      // Repaint on failure too: a full-swipe delete already collapsed the row
      // out of the DOM, so a failed API delete must restore it.
      if (item) repaintCategory(item.category_id);
    }

    // --- drag & drop reordering -------------------------------------------------
    // Rows and category sections are draggable, but a drag only starts from the
    // ⠿ handle (checked via mousedown) so text selection and taps still work.
    let drag = null;     // { type: 'item'|'cat', id, catId?, checked? }
    let dropCue = null;  // items: { catId, id?, after?, end? } · cats: { id, after }
    let handleArmed = false;

    document.addEventListener('mousedown', e => { handleArmed = !!e.target.closest('.drag-handle'); });

    const appEl = document.getElementById('app');

    // Edge auto-scroll while dragging. The touch drag preventDefault()s every
    // touchmove (so the page never scrolls natively under a drag), and desktop
    // HTML5 DnD window auto-scroll is unreliable cross-browser (Firefox has
    // none) — so both paths drive this rAF loop: near the top/bottom of the
    // viewport the page scrolls, and the drop cue is re-hit-tested on every
    // step that actually moved, because the content slides under a stationary
    // pointer without firing new pointer events.
    const SCROLL_ZONE_FRACTION = 0.15; // of visual viewport height
    const SCROLL_ZONE_MIN = 48;        // px
    const SCROLL_ZONE_MAX = 120;       // px
    const SCROLL_MAX_SPEED = 600;      // px/s at the very edge
    let dragX = 0, dragY = 0;          // last known pointer position (viewport coords)
    let scrollRaf = null, scrollLastTs = 0;

    function startAutoScroll() {
      if (scrollRaf) return;
      scrollLastTs = 0;
      scrollRaf = requestAnimationFrame(autoScrollStep);
    }
    function stopAutoScroll() {
      if (scrollRaf) cancelAnimationFrame(scrollRaf);
      scrollRaf = null;
    }
    function autoScrollStep(ts) {
      if (!drag) { scrollRaf = null; return; }
      const dt = scrollLastTs ? (ts - scrollLastTs) / 1000 : 0;
      scrollLastTs = ts;
      const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      const zone = Math.max(SCROLL_ZONE_MIN, Math.min(SCROLL_ZONE_MAX, vh * SCROLL_ZONE_FRACTION));
      let v = 0; // signed px/s, ramping linearly with depth into the zone
      if (dragY < zone) v = -SCROLL_MAX_SPEED * Math.min(1, (zone - dragY) / zone);
      else if (dragY > vh - zone) v = SCROLL_MAX_SPEED * Math.min(1, (dragY - (vh - zone)) / zone);
      if (v && dt) {
        const before = window.scrollY;
        window.scrollBy(0, v * dt);
        if (window.scrollY !== before) {
          cueFromPoint(document.elementFromPoint(dragX, dragY), dragY);
        }
      }
      scrollRaf = requestAnimationFrame(autoScrollStep);
    }

    appEl.addEventListener('dragstart', e => {
      // No reordering while filtered: the visible order no longer matches
      // sectionItems(), so a drop would compute wrong positions.
      if (!handleArmed || !current || searchActive()) { e.preventDefault(); return; }
      const row = e.target.closest && e.target.closest('.item-row');
      const sec = e.target.closest && e.target.closest('.cat-section');
      if (row) {
        drag = { type: 'item', id: +row.dataset.item, catId: +row.dataset.cat, checked: row.dataset.checked === '1' };
        row.classList.add('dragging');
      } else if (sec) {
        drag = { type: 'cat', id: +sec.dataset.cat };
        sec.classList.add('dragging');
      } else { e.preventDefault(); return; }
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', ''); } catch (_) {}
      dragX = e.clientX; dragY = e.clientY;
      startAutoScroll();
    });

    function clearDropCue() {
      document.querySelectorAll('.drop-before, .drop-after, .drop-into').forEach(el =>
        el.classList.remove('drop-before', 'drop-after', 'drop-into'));
      dropCue = null;
    }

    // Deadspace fallback: when the pointer isn't over any row or section
    // (gaps between categories, header, padding, beside the column), snap
    // to the nearest valid drop position by vertical distance and paint
    // the same cue a direct hover there would have painted. Vertical-only —
    // the layout is a single centered column, so horizontal distance
    // carries no information. Ties break by document order.
    function nearestDropCue(clientY) {
      if (!drag) { clearDropCue(); return false; }
      const distTo = r =>
        clientY < r.top ? r.top - clientY : clientY > r.bottom ? clientY - r.bottom : 0;
      let best = null, bestDist = Infinity;
      if (drag.type === 'item') {
        // Nearest visible row of the matching checked-state, any category.
        document.querySelectorAll('.item-row').forEach(row => {
          if (+row.dataset.item === drag.id) return;
          if ((row.dataset.checked === '1') !== drag.checked) return;
          if (!row.offsetParent) return;
          const r = row.getBoundingClientRect();
          const d = distTo(r);
          if (d < bestDist) { bestDist = d; best = { row, r }; }
        });
        // Sections whose matching subsection has no visible rows (empty
        // categories, collapsed done-subsections) are end-drop targets.
        document.querySelectorAll('.cat-section').forEach(sec => {
          const hasRow = Array.from(sec.querySelectorAll('.item-row')).some(row =>
            +row.dataset.item !== drag.id &&
            (row.dataset.checked === '1') === drag.checked && row.offsetParent);
          if (hasRow) return;
          const d = distTo(sec.getBoundingClientRect());
          if (d < bestDist) { bestDist = d; best = { sec } }
        });
        if (!best) { clearDropCue(); return false; }
        clearDropCue();
        if (best.row) {
          const after = clientY > best.r.top + best.r.height / 2;
          (best.row.closest('.swipe-wrap') || best.row).classList.add(after ? 'drop-after' : 'drop-before');
          dropCue = { catId: +best.row.dataset.cat, id: +best.row.dataset.item, after };
        } else {
          best.sec.classList.add('drop-into');
          dropCue = { catId: +best.sec.dataset.cat, end: true };
        }
        return true;
      } else {
        document.querySelectorAll('.cat-section').forEach(sec => {
          if (+sec.dataset.cat === drag.id) return;
          const r = sec.getBoundingClientRect();
          const d = distTo(r);
          if (d < bestDist) { bestDist = d; best = { sec, r }; }
        });
        if (!best) { clearDropCue(); return false; }
        clearDropCue();
        const after = clientY > best.r.top + best.r.height / 2;
        best.sec.classList.add(after ? 'drop-after' : 'drop-before');
        dropCue = { id: +best.sec.dataset.cat, after };
        return true;
      }
    }

    // Shared by desktop dragover and touch (long-press) drag. Computes the
    // drop cue for the element under the pointer; returns true when that
    // position is a valid drop target. Row cues paint on the swipe wrapper —
    // the row itself sits inside overflow-hidden, which clips box-shadows.
    function cueFromPoint(targetEl, clientY) {
      if (!drag) { clearDropCue(); return false; }
      if (!targetEl || !targetEl.closest) return nearestDropCue(clientY);
      if (drag.type === 'item') {
        // Over a row of the same checked-state (any category): insert
        // before/after it. Elsewhere in a category section: append to the
        // end of that category's matching section. Over the dragged row
        // itself: keep the last cue so a drop there still lands somewhere.
        const row = targetEl.closest('.item-row');
        if (row && +row.dataset.item === drag.id) return true;
        clearDropCue();
        if (row && (row.dataset.checked === '1') === drag.checked) {
          const r = row.getBoundingClientRect();
          const after = clientY > r.top + r.height / 2;
          (row.closest('.swipe-wrap') || row).classList.add(after ? 'drop-after' : 'drop-before');
          dropCue = { catId: +row.dataset.cat, id: +row.dataset.item, after };
          return true;
        }
        const sec = targetEl.closest('.cat-section');
        if (!sec) return nearestDropCue(clientY);
        sec.classList.add('drop-into');
        dropCue = { catId: +sec.dataset.cat, end: true };
        return true;
      } else {
        const sec = targetEl.closest('.cat-section');
        if (!sec) return nearestDropCue(clientY);
        // Over the dragged section itself (it's tall — this is the common
        // case mid-drag): keep the last cue instead of wiping it.
        if (+sec.dataset.cat === drag.id) return true;
        clearDropCue();
        const r = sec.getBoundingClientRect();
        const after = clientY > r.top + r.height / 2;
        sec.classList.add(after ? 'drop-after' : 'drop-before');
        dropCue = { id: +sec.dataset.cat, after };
        return true;
      }
    }

    // Bound to document (not #app) so deadspace outside the centered
    // column — body margins, header, bottom padding — still snaps to the
    // nearest drop position. The `drag` guard keeps foreign drags
    // (files, text) untouched.
    document.addEventListener('dragover', e => {
      if (!drag) return;
      dragX = e.clientX; dragY = e.clientY;
      if (cueFromPoint(e.target, e.clientY)) e.preventDefault();
    });

    document.addEventListener('drop', e => {
      if (!drag) return;
      e.preventDefault();
      stopAutoScroll();
      const d = drag, cue = dropCue;
      drag = null;
      clearDropCue();
      if (!cue) return;
      if (d.type === 'item') applyItemReorder(d, cue);
      else applyCategoryReorder(d, cue);
    });

    appEl.addEventListener('dragend', () => {
      stopAutoScroll();
      document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
      drag = null;
      handleArmed = false;
      clearDropCue();
    });

    // --- touch gestures (mobile) --------------------------------------------------
    // One arbiter for all four outcomes of a touch: horizontal swipe on a row,
    // long-press drag to reorder, pull-to-refresh from the page top, or plain
    // vertical scroll. Swipe motion is 1:1 with the finger while dragging and
    // spring-driven (interruptible, velocity-seeded) on release — never a
    // fixed-duration CSS transition.
    const IS_TOUCH = window.matchMedia('(hover: none) and (pointer: coarse)').matches ||
                     'ontouchstart' in window;
    let swipe = null;      // in-flight swipe: { wrap, startX, startY, base, mode, samples, armed }
    let openSwipe = null;  // .swipe-wrap currently left open
    let lpTimer = null;    // long-press timer
    let touchDragging = false;
    let suppressTap = false;

    function trayW(wrap) { return +wrap.dataset.tray || 136; }

    // Positions the front layer and the action tray as one unit: at offset 0
    // the tray sits just past the right edge; at -trayW it's fully revealed;
    // past that the tray pins to the edge while the row keeps going
